    ["Qual estrutura o InnoDB usa nos índices?","B-tree (valores ordenados para busca rápida)."]] },
{ id:"transacoes", num:"26", cat:"MySQL na prática", title:"Transações e ACID", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 06 (DML) e 09 (DTL — transação de dados).</p>"},
   {t:"concept",l:"O que é",h:"<p>Uma transação é um conjunto de comandos que devem acontecer como um bloco único: ou todos têm efeito, ou nenhum tem.</p><p>Exemplo clássico: transferir dinheiro tira de uma conta e põe em outra. As duas etapas precisam valer juntas. Se uma falha, a outra é desfeita.</p>"},
   {t:"concept",l:"Por que é importante",h:"<p>Sem transação, uma falha no meio deixa os dados inconsistentes (dinheiro saiu de uma conta e não entrou na outra). Transação protege a integridade dos dados.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Sempre que duas ou mais alterações dependem uma da outra. Operações de leitura simples não precisam. O InnoDB suporta transações; o MyISAM, mecanismo antigo, não.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>Inicia-se com START TRANSACTION. Se tudo deu certo, COMMIT confirma e grava em definitivo. Se algo deu errado, ROLLBACK desfaz tudo, voltando ao estado anterior.</p>"},
   {t:"code",h:"START TRANSACTION;\n\nUPDATE conta SET saldo = saldo - 100 WHERE id = 1;\nUPDATE conta SET saldo = saldo + 100 WHERE id = 2;\n\n<span class='cm'>-- Deu tudo certo: confirma</span>\nCOMMIT;\n\n<span class='cm'>-- Se algo falhasse, usaríamos no lugar:</span>\n<span class='cm'>-- ROLLBACK;</span>"},
   {t:"table",h:"<table class='cmd'><tr><th>Letra de ACID</th><th>O que garante</th></tr><tr><td>Atomicidade</td><td>Tudo ou nada: o bloco não fica pela metade.</td></tr><tr><td>Consistência</td><td>Os dados saem de um estado válido para outro válido.</td></tr><tr><td>Isolamento</td><td>Transações simultâneas não se atrapalham.</td></tr><tr><td>Durabilidade</td><td>Após COMMIT, o dado persiste mesmo se cair a energia.</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Esquecer o COMMIT: as mudanças ficam pendentes e podem se perder.</p><p>Usar tabelas MyISAM e esperar ROLLBACK: ele não existe nesse mecanismo.</p><p>Manter uma transação aberta por muito tempo, travando outras (problema de bloqueio, em inglês lock).</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Mantenha a transação curta. Trate o erro e decida entre COMMIT e ROLLBACK. Use InnoDB. Entenda o nível de isolamento padrão do MySQL antes de assumir o comportamento.</p>"},
   {t:"plain",l:"Exercícios graduais",h:"<p><b>1.</b> Escreva uma transação que debita 50 de uma conta e credita 50 em outra.</p><p><b>2.</b> Explique o que ROLLBACK faria se o segundo UPDATE falhasse.</p><p><b>3.</b> Diga, com suas palavras, o que cada letra de ACID protege.</p>"},
   {t:"code",l:"Soluções",h:"<span class='cm'>-- 1</span>\nSTART TRANSACTION;\nUPDATE conta SET saldo = saldo - 50 WHERE id = 10;\nUPDATE conta SET saldo = saldo + 50 WHERE id = 20;\nCOMMIT;\n\n<span class='cm'>-- 2: ROLLBACK desfaz o primeiro UPDATE, voltando os saldos ao estado inicial.</span>\n<span class='cm'>-- 3: Atomicidade (tudo ou nada), Consistência (estado válido),</span>\n<span class='cm'>--    Isolamento (sem interferência) e Durabilidade (persiste após COMMIT).</span>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>Transação = bloco tudo ou nada. START TRANSACTION, COMMIT confirma, ROLLBACK desfaz. ACID: Atomicidade, Consistência, Isolamento, Durabilidade. Precisa de InnoDB.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p>O que significa ACID? Explique cada letra. Qual a diferença entre COMMIT e ROLLBACK? Qual o nível de isolamento padrão do MySQL? Resposta oficial: REPEATABLE READ no InnoDB.</p>"},
   {t:"plain",l:"Mapa mental",h:"<ul><li>Transação<ul><li>START TRANSACTION</li><li>COMMIT (confirma)</li><li>ROLLBACK (desfaz)</li><li>ACID<ul><li>Atomicidade</li><li>Consistência</li><li>Isolamento</li><li>Durabilidade</li></ul></li><li>Mecanismo: InnoDB</li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><b>Mini-projeto:</b> modele uma transferência entre contas com START TRANSACTION, dois UPDATE e COMMIT, e descreva quando usaria ROLLBACK.</p><p><b>Conexão:</b> liga-se ao tema 09 (DTL). O isolamento conecta com concorrência, um tema de sistemas que você verá em Engenharia de Software.</p>"}
  ],
  cards:[
    ["O que é uma transação?","Um bloco de comandos que vale por inteiro: tudo ou nada."],
    ["O que faz COMMIT e ROLLBACK?","COMMIT confirma em definitivo; ROLLBACK desfaz tudo."],
    ["O que significa ACID?","Atomicidade, Consistência, Isolamento e Durabilidade."],
    ["Qual o isolamento padrão do InnoDB?","REPEATABLE READ (conforme a documentação oficial)."]] },
{ id:"normaliza", num:"27", cat:"MySQL na prática", title:"Normalização (1FN, 2FN, 3FN)", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 11 (chaves), 12 (relacionamentos) e 13 (modelos de dados).</p>"},
   {t:"concept",l:"O que é",h:"<p>Normalização é o processo de organizar as tabelas para evitar dados repetidos e inconsistências. As regras vêm em etapas chamadas formas normais (em inglês normal forms): 1FN, 2FN e 3FN.</p>"},
   {t:"concept",l:"Por que é importante",h:"<p>Dado repetido em vários lugares causa anomalias: você atualiza em um lugar e esquece no outro, gerando contradição. Normalizar deixa cada fato guardado em um único lugar.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Ao projetar o banco. Em sistemas de operação (cadastros, vendas), normaliza-se para manter integridade. Em análise de dados, às vezes desnormaliza-se de propósito, para ganhar velocidade de leitura. São objetivos diferentes.</p>"},
   {t:"concept",l:"Como funciona",h:"<p><b>1FN:</b> cada coluna guarda um único valor, sem listas dentro da célula.</p><p><b>2FN:</b> estando na 1FN, toda coluna depende da chave inteira, não de parte dela.</p><p><b>3FN:</b> estando na 2FN, nenhuma coluna depende de outra coluna comum, apenas da chave.</p>"},
   {t:"code",h:"<span class='cm'>-- Fora da 1FN: telefones em uma célula só</span>\n<span class='cm'>-- cliente(id, nome, telefones = '111, 222')</span>\n\n<span class='cm'>-- Na 1FN: um telefone por linha, em tabela própria</span>\nCREATE TABLE telefone (\n  id INT PRIMARY KEY,\n  cliente_id INT,\n  numero VARCHAR(20),\n  FOREIGN KEY (cliente_id) REFERENCES cliente(id)\n);"},
   {t:"table",h:"<table class='cmd'><tr><th>Forma normal</th><th>Regra central</th></tr><tr><td>1FN</td><td>Um valor por célula, sem listas.</td></tr><tr><td>2FN</td><td>Depende da chave inteira, não de parte.</td></tr><tr><td>3FN</td><td>Sem depender de coluna que não seja a chave.</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Guardar lista de valores em uma coluna (quebra a 1FN).</p><p>Repetir o nome do produto em toda linha de venda em vez de referenciar por id.</p><p>Normalizar ao extremo e criar JOINs demais, prejudicando a leitura quando não era necessário.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Mire a 3FN em bancos de operação. Use chave estrangeira para ligar tabelas. Avalie desnormalizar apenas em cenários de análise com leitura intensa, de forma consciente, não por descuido.</p>"},
   {t:"plain",l:"Exercícios graduais",h:"<p><b>1.</b> Aponte a violação de 1FN em uma coluna que guarda 'azul, verde' como texto.</p><p><b>2.</b> Separe pedido e item_pedido para respeitar a 2FN.</p><p><b>3.</b> Explique por que guardar nome_cidade junto de cep na mesma tabela pode ferir a 3FN.</p>"},
   {t:"code",l:"Soluções",h:"<span class='cm'>-- 1: 'azul, verde' é uma lista em uma célula. Crie uma linha por cor.</span>\n\n<span class='cm'>-- 2: itens em tabela própria, ligada ao pedido</span>\nCREATE TABLE item_pedido (\n  id INT PRIMARY KEY,\n  pedido_id INT,\n  produto_id INT,\n  quantidade INT,\n  FOREIGN KEY (pedido_id) REFERENCES pedido(id)\n);\n\n<span class='cm'>-- 3: cep determina a cidade; cidade depende do cep, não da chave da tabela.</span>\n<span class='cm'>--    O ideal é uma tabela de cep separada.</span>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>Normalizar evita repetição e anomalias. 1FN: um valor por célula. 2FN: depende da chave inteira. 3FN: não depende de coluna que não seja a chave. Operação normaliza; análise às vezes desnormaliza.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p>Explique 1FN, 2FN e 3FN com um exemplo. Quando desnormalizar? Em leitura intensa de análise, trocando integridade por velocidade, de forma consciente.</p>"},
   {t:"plain",l:"Mapa mental",h:"<ul><li>Normalização<ul><li>Objetivo: sem repetição, sem anomalia</li><li>1FN: um valor por célula</li><li>2FN: depende da chave inteira</li><li>3FN: só depende da chave</li><li>Análise: às vezes desnormaliza</li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><b>Mini-projeto:</b> pegue uma planilha bagunçada (cliente com vários telefones na mesma célula) e redesenhe em tabelas até a 3FN.</p><p><b>Conexão:</b> liga aos temas 11 a 13 (chaves, relacionamentos e modelos) e prepara o terreno para JOINs (tema 21) bem desenhados.</p>"}
  ],
  cards:[
    ["O que normalização evita?","Dados repetidos e anomalias de atualização."],
    ["Qual a regra da 1FN?","Um único valor por célula, sem listas."],
    ["Qual a regra da 3FN?","Nenhuma coluna depende de outra que não seja a chave."],
    ["Quando se desnormaliza de propósito?","Em análise com leitura intensa, trocando integridade por velocidade."]] },
{ id:"explain", num:"28", cat:"MySQL na prática", title:"Performance e EXPLAIN", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 14 (WHERE), 21 (JOINs) e 25 (índices).</p>"},
   {t:"concept",l:"O que é",h:"<p>EXPLAIN é um comando que mostra o plano de execução: como o MySQL pretende rodar a sua consulta, qual índice vai usar e quantas linhas espera examinar.</p><p>É como ver a rota que o aplicativo de mapas escolheu antes de dirigir.</p>"},
   {t:"concept",l:"Por que é importante",h:"<p>Otimizar no chute não funciona. EXPLAIN mostra, com base em fatos, se a consulta usa índice ou faz varredura completa. É a ferramenta oficial para diagnosticar consultas lentas.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Quando uma consulta está lenta, ou antes de subir uma consulta importante para produção. Coloque EXPLAIN na frente do SELECT e leia o resultado.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>O resultado traz colunas como <b>type</b> (como as linhas são acessadas), <b>key</b> (qual índice foi escolhido) e <b>rows</b> (estimativa de linhas lidas). Quanto menor o rows e melhor o type, mais eficiente.</p>"},
   {t:"code",h:"<span class='cm'>-- Ver o plano de execução de uma consulta</span>\nEXPLAIN\nSELECT * FROM cliente WHERE email = 'a@b.com';\n\n<span class='cm'>-- Lendo o resultado:</span>\n<span class='cm'>-- key = idx_cliente_email  -> usou o índice (bom)</span>\n<span class='cm'>-- key = NULL               -> varredura completa (ruim em tabela grande)</span>"},
   {t:"table",h:"<table class='cmd'><tr><th>Coluna do EXPLAIN</th><th>O que observar</th></tr><tr><td>type</td><td>const e ref são bons; ALL indica varredura completa.</td></tr><tr><td>key</td><td>O índice usado. NULL significa nenhum.</td></tr><tr><td>rows</td><td>Estimativa de linhas lidas. Menor é melhor.</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Otimizar sem medir, mudando a consulta no escuro.</p><p>Ver type = ALL e ignorar: é o sinal de varredura completa.</p><p>Usar SELECT * quando só precisa de poucas colunas, lendo dados à toa.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Meça com EXPLAIN antes e depois de uma mudança. Selecione só as colunas necessárias. Garanta índice nas colunas de WHERE e JOIN. Evite função sobre a coluna filtrada.</p>"},
   {t:"plain",l:"Exercícios graduais",h:"<p><b>1.</b> Rode EXPLAIN em um SELECT com WHERE sobre uma coluna sem índice e observe type e key.</p><p><b>2.</b> Crie o índice e rode EXPLAIN de novo, comparando rows.</p><p><b>3.</b> Reescreva um SELECT * pedindo só as três colunas necessárias.</p>"},
   {t:"code",l:"Soluções",h:"<span class='cm'>-- 1</span>\nEXPLAIN SELECT * FROM venda WHERE cliente_id = 7;\n\n<span class='cm'>-- 2</span>\nCREATE INDEX idx_venda_cliente ON venda (cliente_id);\nEXPLAIN SELECT * FROM venda WHERE cliente_id = 7;\n<span class='cm'>-- Espera-se key preenchida e rows bem menor.</span>\n\n<span class='cm'>-- 3</span>\nSELECT id, data_venda, valor FROM venda WHERE cliente_id = 7;"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>EXPLAIN mostra o plano. Olhe type (evite ALL), key (índice usado) e rows (menor é melhor). Meça antes e depois. Índice e SELECT enxuto ajudam.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p>Como investigar uma consulta lenta? Resposta forte: rodo EXPLAIN, vejo se há varredura completa (type = ALL, key = NULL), crio o índice adequado e comparo o rows antes e depois.</p>"},
   {t:"plain",l:"Mapa mental",h:"<ul><li>Performance<ul><li>EXPLAIN → plano de execução</li><li>type → ALL é ruim</li><li>key → índice usado</li><li>rows → menor é melhor</li><li>Ações: índice, SELECT enxuto, sem função na coluna</li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><b>Mini-projeto:</b> escolha uma consulta com JOIN, rode EXPLAIN, crie os índices certos e registre a queda no rows.</p><p><b>Conexão:</b> fecha o ciclo com o tema 25 (índices) e com observabilidade, um conceito de Engenharia de Software: decidir com base em medição, não em achismo.</p>"}
  ],
  cards:[
    ["Para que serve o EXPLAIN?","Mostrar o plano de execução: índice usado e linhas estimadas."],
    ["O que significa type = ALL?","Varredura completa da tabela, ruim em tabelas grandes."],
    ["O que ver na coluna key?","Qual índice foi usado; NULL significa nenhum."],
    ["Como investigar consulta lenta?","Rodar EXPLAIN, achar varredura completa, criar índice e comparar rows."]] }
];

const SQL_QUIZ = [

 {q:"Quais são as 5 sublinguagens do SQL?",o:["SELECT, INSERT, UPDATE, DELETE, CREATE","DDL, DML, DQL, DCL, DTL","ANSI, ISO, IBM, SQL, BI","PK, FK, NULL, UNIQUE, INDEX"],c:1,e:"DDL (definição), DML (manipulação), DQL (consulta), DCL (controle), DTL (transação)."},
 {q:"Qual comando da DDL apaga a tabela inteira, com os dados?",o:["DELETE","TRUNCATE","DROP TABLE","ALTER TABLE"],c:2,e:"DROP TABLE remove a estrutura inteira. DELETE apaga linhas; é da DML."},

 {q:"Uma chave surrogada é:",o:["O CPF do cliente","Uma chave artificial, geralmente numérica, criada só para ser primária","Uma chave estrangeira","Uma coluna que aceita NULL"],c:1,e:"Surrogada = artificial, sem significado de negócio (ex.: id auto-incremento). Substitui uma chave natural."},
 {q:"Como o relacionamento N:M é implementado na prática?",o:["Diretamente entre as duas tabelas","Com uma tabela intermediária (associativa)","Usando apenas uma PRIMARY KEY","Não é possível em bancos relacionais"],c:1,e:"Cria-se uma tabela intermediária, transformando o N:M em dois relacionamentos 1:N."},
 {q:"COMMIT e ROLLBACK pertencem a qual sublinguagem?",o:["DDL","DCL","DTL","DQL"],c:2,e:"DTL (transação). COMMIT confirma; ROLLBACK desfaz."},

 {q:"Qual operador filtra valores dentro de um intervalo, incluindo as pontas?",o:["IN","BETWEEN","LIKE","DISTINCT"],c:1,e:"BETWEEN x AND y inclui x e y. Ex.: IDADE BETWEEN 20 AND 23 traz o 20 e o 23."},
 {q:"No LIKE, o caractere % representa:",o:["Exatamente um caractere","Zero ou muitos caracteres","Apenas números","Um espaço em branco"],c:1,e:"% = zero ou muitos caracteres; _ = exatamente um. 'M%' significa: começa com M."},
 {q:"Numa consulta com AND, a linha aparece quando:",o:["Pelo menos uma condição é verdadeira","Todas as condições são verdadeiras","Nenhuma condição é verdadeira","A primeira condição é falsa"],c:1,e:"AND exige todas as condições verdadeiras ao mesmo tempo. Com OR, bastaria uma."},
 {q:"A função COUNT(coluna) conta:",o:["Todas as linhas, inclusive NULL","Apenas as linhas em que a coluna não é NULL","Somente valores negativos","Apenas a primeira linha"],c:1,e:"COUNT(coluna) ignora NULL. Para contar todas as linhas use COUNT(*)."},

 {q:"Quantos bytes ocupa o tipo INT?",o:["1 byte","2 bytes","4 bytes","8 bytes"],c:2,e:"INT ocupa 4 bytes (faixa de cerca de -2,1 bi a +2,1 bi). BIGINT ocupa 8."},

 {q:"Qual tipo armazena data e hora juntas?",o:["DATE","TIME","DATETIME","INT"],c:2,e:"DATETIME guarda data e hora (8 bytes). DATE só data; TIME só hora."},
 {q:"Qual função retorna o primeiro valor não-nulo de uma lista?",o:["NULLIF","COALESCE","CASE","TRIM"],c:1,e:"COALESCE percorre a lista e retorna o primeiro valor que não for NULL."},
 {q:"NULLIF(a, b) retorna o que quando a e b são iguais?",o:["O valor de a","O valor de b","NULL","Um erro"],c:2,e:"NULLIF retorna NULL quando os dois são iguais; senão retorna o primeiro."},
 {q:"Qual a diferença entre ROUND e TRUNC?",o:["São iguais","ROUND arredonda; TRUNC corta os decimais","TRUNC arredonda; ROUND corta","Só funcionam com texto"],c:1,e:"ROUND arredonda para o mais próximo; TRUNC simplesmente corta os decimais."},
 {q:"Para decidir um valor conforme condições dentro do SELECT, usa-se:",o:["WHERE","CASE WHEN ... THEN ... END","GROUP BY","DISTINCT"],c:1,e:"CASE WHEN condição THEN resultado ELSE padrão END cria a lógica condicional na consulta."},
 {q:"O INNER JOIN retorna:",o:["Tudo das duas tabelas","Só as linhas que casam nas duas tabelas","Tudo da tabela da esquerda","Tudo da tabela da direita"],c:1,e:"INNER JOIN traz apenas a interseção: linhas com par nas duas tabelas."},
 {q:"O LEFT JOIN retorna:",o:["Só o que casa","Todas as linhas da esquerda; sem par na direita vem NULL","Todas as linhas da direita","Nada quando não há par"],c:1,e:"LEFT JOIN traz todas as linhas da tabela da esquerda; onde não há correspondência, as colunas da direita ficam NULL."},
 {q:"Para encontrar registros que NÃO têm correspondência em outra tabela, usa-se:",o:["INNER JOIN","LEFT JOIN com WHERE coluna IS NULL","GROUP BY","DISTINCT"],c:1,e:"Um LEFT JOIN seguido de WHERE coluna_da_direita IS NULL isola o que existe só na tabela da esquerda."},
 {q:"Qual a diferença entre UNION e UNION ALL?",o:["São iguais","UNION remove duplicatas; UNION ALL mantém todas","UNION ALL remove duplicatas; UNION mantém","UNION só funciona com números"],c:1,e:"UNION remove as linhas repetidas; UNION ALL mantém tudo e é mais rápido."},
 {q:"Para usar UNION, as duas consultas precisam ter:",o:["O mesmo nome de tabela","O mesmo número de colunas e tipos compatíveis","Um JOIN antes","Uma cláusula GROUP BY"],c:1,e:"As consultas devem ter o mesmo número de colunas, com tipos e ordem compatíveis."},
 {q:"JOIN e UNION se diferenciam porque:",o:["JOIN junta linhas e UNION junta colunas","JOIN junta colunas (lado a lado) e UNION empilha linhas","São a mesma coisa","UNION só funciona com uma tabela"],c:1,e:"JOIN combina colunas de tabelas lado a lado; UNION empilha linhas de consultas, uma embaixo da outra."},
 {q:"O que é uma subquery (subconsulta)?",o:["Uma tabela nova","Uma consulta dentro de outra consulta","Um tipo de JOIN","Uma chave primária"],c:1,e:"É um SELECT dentro de outro SELECT, usado como coluna ou como filtro."},
 {q:"O que é uma View?",o:["Uma cópia física da tabela","Uma tabela virtual: um SELECT salvo que não armazena dados","Um índice","Um backup"],c:1,e:"A view é uma tabela virtual (consulta salva); reflete os dados atuais e não ocupa espaço."},
 {q:"DROP VIEW apaga os dados das tabelas originais?",o:["Sim, apaga tudo","Não, apaga só a view","Só apaga metade","Depende do SGBD"],c:1,e:"DROP VIEW remove apenas a visão; os dados das tabelas permanecem."}
,
 {q:"Qual o principal benefício de um índice?",o:["Economiza espaço em disco","Encontra linhas sem varrer a tabela inteira","Impede dados duplicados","Cria backup automático"],c:1,e:"O índice acelera a busca, evitando a varredura completa da tabela."},
 {q:"Por que não criar índice em todas as colunas?",o:["O MySQL não permite","Ocupa espaço e deixa as gravações mais lentas","Some os dados","Quebra os JOINs"],c:1,e:"Cada índice precisa ser atualizado em INSERT, UPDATE e DELETE, e ocupa espaço."},
 {q:"O que ROLLBACK faz em uma transação?",o:["Confirma em definitivo","Desfaz tudo, voltando ao estado anterior","Cria um índice","Salva um backup"],c:1,e:"ROLLBACK reverte as alterações; COMMIT é quem confirma."},

 {q:"Na 1FN (primeira forma normal), cada célula deve conter:",o:["Uma lista de valores","Um único valor","Uma fórmula","Uma chave estrangeira"],c:1,e:"A 1FN exige um valor por célula, sem listas dentro do campo."},
 {q:"No resultado do EXPLAIN, type = ALL indica:",o:["Uso ideal de índice","Varredura completa da tabela","Erro de sintaxe","Transação aberta"],c:1,e:"type = ALL significa full table scan, ruim em tabelas grandes."}

function initDB(){
  if(dbStarted)return; dbStarted=true;
  if(typeof initSqlJs==='undefined'){ dbError="Motor SQL não encontrado (arquivo sql-asm.js)."; if(mode==='practice')renderPractice(); return; }
  initSqlJs().then(function(SQL){ SQLjs=SQL; DB=new SQL.Database(); DB.run(SEED); dbReady=true; if(mode==='practice')renderPractice(); }).catch(function(e){ dbError=String(e&&e.message||e); if(mode==='practice')renderPractice(); });
}
function freshDB(){ const d=new SQLjs.Database(); d.run(SEED); return d; }
function execLast(db,sql){ const r=db.exec(sql); if(!r.length)return {empty:true}; const l=r[r.length-1]; return {columns:l.columns,values:l.values}; }
function runSQL(sql){ if(!dbReady)return {error:"Motor ainda carregando, tente novamente em instantes."}; try{ return execLast(DB,sql); }catch(e){ return {error:String(e&&e.message||e)}; } }
function esc(s){ return String(s).replace(/[&<>]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m];}); }
function gridHTML(r){ if(r.error)return '<div class="sql-err">'+esc(r.error)+'</div>'; if(r.empty||!r.values||!r.values.length)return '<div class="sql-empty">Consulta executada. Nenhuma linha retornada.</div>'; let h='<div class="grid-wrap"><table class="grid"><tr>'+r.columns.map(function(c){return '<th>'+esc(c)+'</th>';}).join('')+'</tr>'; r.values.forEach(function(row){ h+='<tr>'+row.map(function(v){return '<td>'+(v===null?'<i>NULL</i>':esc(String(v)))+'</td>';}).join('')+'</tr>'; }); return h+'</table></div>'; }
function normRows(vals,ordered){ const rows=(vals||[]).map(function(r){return JSON.stringify(r);}); return ordered?rows.join('|'):rows.slice().sort().join('|'); }

function exItemHTML(e,i){ return '<div class="exercise"><div class="ex-q"><span class="ex-n">'+(i+1)+'</span>'+esc(e.q)+'</div><textarea class="ex-input" id="ex'+i+'" spellcheck="false" placeholder="Escreva sua consulta SQL..."></textarea><div class="ex-actions"><button class="btn primary" onclick="checkEx('+i+')">Rodar e verificar</button><button class="btn" onclick="toggleSol('+i+')">Ver solução</button><span class="ex-badge" id="exbadge'+i+'"></span></div><div class="ex-out" id="exout'+i+'"></div><div class="ex-sol hidden" id="exsol'+i+'"><b>Solução:</b> <code>'+esc(e.sol)+'</code></div></div>'; }
function renderExList(list){ activeEx=list; let h=''; for(let i=0;i<list.length;i++)h+=exItemHTML(list[i],i); return h; }
function setBadge(i,s){ const b=document.getElementById('exbadge'+i); if(!b)return; b.className='ex-badge '+s; b.textContent=s==='ok'?'✓ Correto':s==='no'?'✗ Ainda não':s==='err'?'⚠ Erro':''; }
function checkEx(i){
  const e=activeEx[i]; if(!e)return;
  const out=document.getElementById('exout'+i);
  const sql=(document.getElementById('ex'+i).value||'').trim();
  if(!sql){ setBadge(i,'no'); out.innerHTML='<div class="sql-empty">Escreva uma consulta antes de verificar.</div>'; return; }
  if(!dbReady){ out.innerHTML='<div class="sql-empty">Motor ainda carregando, tente em instantes.</div>'; return; }
  try{
    let got,exp;
    if(e.check){ const g=freshDB(); g.run(sql); got=execLast(g,e.check); g.close(); const x=freshDB(); x.run(e.sol); exp=execLast(x,e.check); x.close(); }
    else { const g=freshDB(); got=execLast(g,sql); g.close(); const x=freshDB(); exp=execLast(x,e.sol); x.close(); }
    const ok=normRows(got.values,e.ordered)===normRows(exp.values,e.ordered)&&(got.columns||[]).length===(exp.columns||[]).length;
    setBadge(i,ok?'ok':'no');
    out.innerHTML=gridHTML(got)+(ok?'<div class="sql-ok-msg">Resultado igual ao esperado. Muito bem.</div>':'<div class="sql-no-msg">Ainda não bate. Compare as linhas e ajuste. Dica: '+esc(e.dica)+'</div>');
  }catch(err){ setBadge(i,'err'); out.innerHTML='<div class="sql-err">'+esc(String(err&&err.message||err))+'</div>'; }
}
function toggleSol(i){ const el=document.getElementById('exsol'+i); if(el)el.classList.toggle('hidden'); }
function runFree(){ const sql=(document.getElementById('freebox').value||'').trim(); document.getElementById('freeout').innerHTML=sql?gridHTML(runSQL(sql)):'<div class="sql-empty">Escreva uma consulta.</div>'; }
function renderPractice(){
  sidebar.style.display='none';

  if(!dbReady){ content.innerHTML='<div class="theme-wrap"><div class="loading">Carregando o banco de dados de prática...</div></div>'; return; }
  const combined=[]; let exHTML='';
  THEMES.forEach(function(t){ const lst=THEME_EX[t.id]; if(lst&&lst.length){ exHTML+='<h3 class="sub">'+esc(t.num+'. '+t.title)+'</h3>'; lst.forEach(function(e){ const i=combined.length; combined.push(e); exHTML+=exItemHTML(e,i); }); } });
  activeEx=combined;
  content.innerHTML='<div class="theme-wrap"><div class="crumb">Praticar</div><div class="theme-head"><h2><span class="tnum">DB</span>Pratique e valide</h2></div><div class="block concept"><span class="label">Como funciona</span><p>Há um banco de dados <strong>real</strong> rodando dentro do app (SQLite, offline). Escreva a consulta, clique em <strong>Rodar e verificar</strong> e o app compara o seu resultado com o esperado. Os exercícios cobrem os temas do caderno.</p></div><h3 class="sub">Tabelas disponíveis</h3>'+gridHTML(runSQL("SELECT * FROM PESSOAS"))+gridHTML(runSQL("SELECT * FROM PRODUTOS"))+gridHTML(runSQL("SELECT * FROM COMPRAS"))+exHTML+'<h3 class="sub">Área livre</h3><textarea class="ex-input" id="freebox" spellcheck="false">SELECT P.NOME, PR.NOME AS PRODUTO, C.QTD FROM COMPRAS C JOIN PESSOAS P ON P.ID=C.ID_PESSOA JOIN PRODUTOS PR ON PR.ID=C.ID_PRODUTO;</textarea><div class="ex-actions"><button class="btn primary" onclick="runFree()">Rodar</button></div><div class="ex-out" id="freeout"></div></div>';
  content.scrollTop=0;
}

const VIZ_THEMES = [
{ id:"viz-intro", num:"01", cat:"Fundamentos", title:"O que é Visualização de Dados", date:DATE1,
  blocks:[
   {t:"concept",l:"Conceito",h:"<p><strong>Visualização de dados</strong> é a prática de transformar informações e números em <strong>imagens</strong> (gráficos, mapas) para facilitar o entendimento. O cérebro humano processa imagens <strong>muito mais rápido</strong> do que textos ou tabelas numéricas.</p>"},
   {t:"tip",l:"Um pouco de história",h:"<p>No século 14, <strong>Nicole Oresme</strong> criou um dos primeiros gráficos de barras da história (obra \"The Latitude of Forms\") para mostrar a velocidade de um objeto acelerando ao longo do tempo. Ou seja: usar formas para entender fenômenos é coisa de séculos.</p>"},
   {t:"concept",l:"O que é um gráfico",h:"<p>É a <strong>representação geométrica</strong> de um conjunto de dados: usar figuras (linhas, círculos, barras) para mostrar quantidades. Serve para a <strong>análise e interpretação rápida</strong>, sem precisar fazer contas manuais.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Visualização é a ponte entre o dado bruto e a decisão. <strong>Próxima ação:</strong> ao olhar um número, pergunte \"que imagem deixaria isso óbvio para quem vai ler?\".</p>"}
  ],
  cards:[["Por que a visualização de dados funciona?","Porque o cérebro processa imagens muito mais rápido do que textos ou tabelas numéricas."],
         ["O que é um gráfico, tecnicamente?","A representação geométrica de um conjunto de dados, para análise e interpretação rápida."]] },

{ id:"viz-preatentivos", num:"02", cat:"Percepção visual", title:"Atributos pré-atentivos", date:DATE1,
  blocks:[
   {t:"concept",l:"O que são",h:"<p><strong>Atributos pré-atentivos</strong> são informações que o cérebro processa <strong>instantaneamente</strong> (em milissegundos), antes mesmo da atenção consciente. São divididos em quatro grupos: forma, cor, posição e movimento.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Forma</th><th>Como destaca</th></tr><tr><td>Comprimento</td><td>Tamanhos diferentes comparam quantidades (barra maior = valor maior).</td></tr><tr><td>Espessura</td><td>Linhas mais grossas ou finas.</td></tr><tr><td>Orientação</td><td>Mudar o ângulo (uma diagonal entre verticais) chama atenção para anomalias.</td></tr><tr><td>Tamanho</td><td>Círculos maiores/menores indicam volume.</td></tr><tr><td>Forma / Curvatura</td><td>Um quadrado entre círculos; uma curva entre retas.</td></tr><tr><td>Encapsulamento</td><td>Uma borda em volta destaca que o dado pertence a um grupo.</td></tr><tr><td>Desfoque</td><td>Algo borrado parece menos importante / em segundo plano.</td></tr></table>"},
   {t:"table",h:"<table class='cmd'><tr><th>Cor</th><th>Como destaca</th></tr><tr><td>Matiz (hue)</td><td>Cores diferentes separam categorias (Maçã = vermelho, Limão = verde).</td></tr><tr><td>Intensidade</td><td>Tons mais claros ou escuros da mesma cor; escuro costuma indicar valor maior.</td></tr></table>"},
   {t:"table",h:"<table class='cmd'><tr><th>Posição / Movimento</th><th>Como destaca</th></tr><tr><td>Posição 2D</td><td>Um ponto fora da linha indica um outlier (fora da curva).</td></tr><tr><td>Agrupamento espacial</td><td>Elementos próximos formam aglomerados (clusters) relacionados.</td></tr><tr><td>Direção do movimento</td><td>Se todos vão para um lado e um vai para o oposto, este se destaca na hora.</td></tr></table>"},
   {t:"recap",l:"Na prática",h:"<p>Use um atributo pré-atentivo para destacar <strong>o que importa</strong> (uma cor diferente no item crítico, uma barra mais alta). Quem olha percebe na hora.</p>"}
  ],
  cards:[["O que são atributos pré-atentivos?","Informações que o cérebro processa instantaneamente, antes da atenção consciente."],
         ["Quais são os 4 grupos pré-atentivos?","Forma, cor, posição e movimento."],
         ["Para que serve o matiz (hue) da cor?","Separar categorias (cores diferentes para coisas diferentes)."]] },

{ id:"viz-precisao", num:"03", cat:"Percepção visual", title:"Escala de precisão e tipos de análise", date:DATE1,
  blocks:[
   {t:"concept",l:"Escala de precisão visual",h:"<p>Nem toda forma de mostrar dados é igualmente precisa. Existe uma escala do <strong>mais preciso</strong> (acurado) ao <strong>menos preciso</strong> (genérico) para o olho humano comparar.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Codificação</th><th>Precisão</th></tr><tr><td>Comprimento alinhado</td><td>Mais precisa (barras na mesma base — fácil de comparar).</td></tr><tr><td>Comprimento desalinhado</td><td>Precisa, mas exige mais esforço.</td></tr><tr><td>Inclinação / ângulo</td><td>Intermediária (pizza, linhas): difícil distinguir 30° de 35°.</td></tr><tr><td>Área / intensidade de cor</td><td>Menos precisa (bom para \"quem é maior\", não para o valor exato).</td></tr><tr><td>Volume (3D)</td><td>A mais difícil de julgar.</td></tr><tr><td>Matiz de cor</td><td>Serve só para diferenciar categorias, sem ordem de grandeza.</td></tr></table>"},
   {t:"tip",l:"Conclusão de design",h:"<p>Para comparar valores com precisão, prefira <strong>barras alinhadas</strong>. Evite 3D e pizza quando o leitor precisa ler valores exatos.</p>"},
   {t:"concept",l:"Os quatro tipos de análise",h:"<p>O objetivo do gráfico define a escolha. Há quatro perguntas-tipo:</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Tipo</th><th>Pergunta que responde</th></tr><tr><td>Comparação</td><td>Diferenças entre itens ou ao longo do tempo (qual vendeu mais?).</td></tr><tr><td>Relação</td><td>Como uma variável afeta a outra (mais propaganda = mais vendas?).</td></tr><tr><td>Distribuição</td><td>Com que frequência os dados aparecem (qual faixa etária predomina?).</td></tr><tr><td>Composição</td><td>As partes que formam o todo (quanto do gasto foi aluguel?).</td></tr></table>"},
   {t:"map",l:"Mapa de escolha — qual gráfico usar?",h:SVG_VIZ_ANALYSIS()},
   {t:"map",l:"Galeria — os principais gráficos",h:SVG_GALLERY()},
   {t:"recap",l:"Na prática",h:"<p>Antes de escolher o gráfico, defina a pergunta: comparação, relação, distribuição ou composição? Isso já elimina metade das opções. <strong>Exemplo no seu contexto:</strong> \"qual canal de atendimento teve mais chamados?\" é comparação (barras); \"o tempo de espera afeta a nota de satisfação?\" é relação (dispersão).</p>"}
  ],
  cards:[["Qual codificação é a mais precisa para comparar valores?","Comprimento alinhado (barras começando na mesma base)."],
         ["Quais os 4 tipos de análise em visualização?","Comparação, relação, distribuição e composição."],
         ["Análise de \"partes que formam o todo\" é qual tipo?","Composição."],
         ["Análise de \"como uma variável afeta outra\" é qual tipo?","Relação."]] },

{ id:"viz-comparacao", num:"04", cat:"Gráficos", title:"Gráficos de comparação", date:DATE1,
  blocks:[
   {t:"concept",l:"O que são",h:"<p>Gráficos de <strong>comparação</strong> colocam dados <strong>lado a lado</strong> para mostrar diferenças de tamanho ou intensidade. O cérebro identifica rápido o que é maior ou menor, sem ler tabelas longas.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Para achar o <strong>valor mais alto ou mais baixo</strong> de um conjunto, ou comparar valores atuais com antigos (este ano vs. ano passado) e ver crescimento ou queda.</p>"},
   {t:"h3",h:"Caminho 1 — Comparação entre itens"},
   {t:"plain",h:"<p>Quando você compara categorias que não dependem de ordem no tempo (marcas, produtos, regiões):</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Situação</th><th>Gráfico indicado</th></tr><tr><td>Duas variáveis por item</td><td>Colunas de largura variável (altura = um dado, largura = outro).</td></tr><tr><td>Uma variável, muitas categorias</td><td>Tabela com gráficos embutidos (evita poluição visual).</td></tr><tr><td>Uma variável, poucas categorias</td><td>Barras horizontais ou verticais.</td></tr></table>"},
   {t:"h3",h:"Caminho 2 — Comparação ao longo do tempo"},
   {t:"table",h:"<table class='cmd'><tr><th>Situação</th><th>Gráfico indicado</th></tr><tr><td>Muitos períodos, dados cíclicos (estações, horas)</td><td>Gráfico de área circular (como um relógio).</td></tr><tr><td>Muitos períodos, não-cíclicos (preço ao longo de 10 anos)</td><td>Gráfico de linha.</td></tr><tr><td>Poucos períodos, poucas categorias (jan vs. fev)</td><td>Barras verticais.</td></tr><tr><td>Poucos períodos, muitas categorias</td><td>Gráfico de linhas (para ver se seguem a mesma tendência).</td></tr></table>"},
   {t:"recap",l:"Na prática",h:"<p>Primeiro decida: comparar <strong>entre itens</strong> ou <strong>ao longo do tempo</strong>? E quantas categorias/períodos? Isso aponta direto para o gráfico certo. Para poucas categorias, barra simples resolve.</p>"}
  ],
  cards:[["Para que servem gráficos de comparação?","Colocar dados lado a lado para ver diferenças de tamanho/intensidade (maior/menor, atual vs. antigo)."],
         ["Poucas categorias, uma variável: qual gráfico?","Barras horizontais ou verticais."],
         ["Dados cíclicos ao longo do tempo: qual gráfico?","Gráfico de área circular (funciona como um relógio)."]] },

{ id:"viz-composicao", num:"05", cat:"Gráficos", title:"Gráficos de composição", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é composição",h:"<p>Composição é a análise de como um <strong>valor total se divide em partes</strong>. Mostra a \"fatia\" que cada categoria ocupa e a importância relativa de cada componente.</p>"},
   {t:"attr",l:"Relativo vs. absoluto",h:"<p><strong>Relativo:</strong> foca na porcentagem (\"temos 30% do mercado\").<br><strong>Absoluto:</strong> foca no valor real (\"vendemos 300 de um total de 1.000\"). A escolha do gráfico depende de qual dos dois importa.</p>"},
   {t:"h3",h:"Quando muda ao longo do tempo"},
   {t:"table",h:"<table class='cmd'><tr><th>Gráfico</th><th>Quando usar</th></tr><tr><td>Barras empilhadas 100%</td><td>Poucos períodos, só a diferença relativa (proporção).</td></tr><tr><td>Barras empilhadas</td><td>Poucos períodos, relativo E absoluto importam.</td></tr><tr><td>Área empilhada 100%</td><td>Muitos períodos, só a diferença relativa.</td></tr><tr><td>Área empilhada</td><td>Muitos períodos, relativo e absoluto importam.</td></tr></table>"},
   {t:"h3",h:"Estático (um único momento)"},
   {t:"table",h:"<table class='cmd'><tr><th>Gráfico</th><th>Quando usar</th></tr><tr><td>Pizza</td><td>Divisão simples, poucas categorias que somam 100%.</td></tr><tr><td>Cascata (waterfall)</td><td>Acumulação/subtração até um total (receita &rarr; impostos &rarr; custos &rarr; lucro).</td></tr><tr><td>Barras 100% com subcomponentes</td><td>Analisar os componentes dos componentes (gasto por área e, dentro, por subárea).</td></tr><tr><td>Tree map</td><td>Blocos proporcionais ao valor; bom para muitos dados hierárquicos de uma vez.</td></tr></table>"},
   {t:"tip",l:"Cuidado com a pizza",h:"<p>Pizza só funciona com <strong>poucas fatias</strong> (até 5-6). Com muitas categorias, as fatias ficam pequenas e impossíveis de comparar — prefira barras.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Pergunte: a composição muda <strong>no tempo</strong> ou é uma <strong>fotografia</strong>? E importa a porcentagem, o valor absoluto, ou os dois? Isso define o gráfico.</p>"}
  ],
  cards:[["O que é composição em visualização?","Como um valor total se divide em partes (a fatia de cada categoria)."],
         ["Relativo vs. absoluto?","Relativo = porcentagem; absoluto = valor real."],
         ["Quando o gráfico de pizza é adequado?","Para poucas categorias que somam 100%."],
         ["Para que serve o gráfico de cascata (waterfall)?","Mostrar acumulação/subtração até chegar a um total (ex.: da receita ao lucro)."]] },

{ id:"viz-distrib", num:"06", cat:"Gráficos", title:"Distribuição e relação", date:DATE1,
  blocks:[
   {t:"concept",l:"Distribuição",h:"<p>Mostra como os dados numéricos se <strong>espalham</strong>, do menor ao maior. Revela o \"formato\" dos dados: onde a maioria se concentra, a média e os valores fora do comum.</p>"},
   {t:"tip",l:"Termos",h:"<p><strong>Tendência central:</strong> valor em torno do qual os dados se agrupam. <strong>Outlier:</strong> valor muito fora do padrão. <strong>Range:</strong> distância entre o menor e o maior valor.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Gráfico</th><th>Quando usar</th></tr><tr><td>Histograma de barras</td><td>Uma variável, poucos pontos de dados.</td></tr><tr><td>Histograma de linha</td><td>Uma variável, muitos pontos (linha suaviza o \"contorno da montanha\").</td></tr><tr><td>Dispersão (scatter)</td><td>Distribuição considerando duas variáveis ao mesmo tempo.</td></tr></table>"},
   {t:"concept",l:"Relação",h:"<p>Mostra como duas ou mais variáveis se <strong>conectam ou influenciam</strong>. <strong>Correlação:</strong> padrão de dependência. <strong>Clusters:</strong> grupos que se formam por semelhança.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Gráfico</th><th>Quando usar</th></tr><tr><td>Dispersão simples</td><td>Relação entre duas variáveis (ex.: altura x peso).</td></tr><tr><td>Dispersão com bolha</td><td>Três variáveis: posição X, posição Y e o tamanho da bolha.</td></tr></table>"},
   {t:"recap",l:"Na prática",h:"<p><strong>Distribuição</strong> = formato e frequência (quantos? onde estão?). <strong>Relação</strong> = conexão entre variáveis (como um afeta o outro?).</p>"}
  ],
  cards:[["Para que serve um histograma?","Mostrar a distribuição/frequência de uma variável."],
         ["O que mostra um gráfico de dispersão?","A relação entre duas variáveis."],
         ["O que é um outlier?","Um valor muito fora do padrão do restante dos dados."]] },

{ id:"viz-cores", num:"07", cat:"Design", title:"Cores e posicionamento", date:DATE1,
  blocks:[
   {t:"concept",l:"Atenção e sobrecarga",h:"<p>Quanto <strong>mais gráficos</strong> numa tela, <strong>menos tempo</strong> as pessoas dedicam a cada um. Gráficos maiores prendem a atenção. Muitos elementos causam <strong>sobrecarga cognitiva</strong>.</p>"},
   {t:"attr",l:"Convenção dos 7 elementos",h:"<p>Use no máximo cerca de <strong>7 grandes elementos por dashboard</strong>, para não sobrecarregar a memória de trabalho de quem lê.</p>"},
   {t:"concept",l:"Teoria das cores",h:"<p><strong>Primárias:</strong> amarelo, vermelho, azul. <strong>Secundárias:</strong> laranja, roxo, verde (misturas de duas primárias). <strong>Terciárias:</strong> tons da mistura das anteriores. <strong>Complementares</strong> ficam em lados opostos do círculo e geram o maior contraste.</p>"},
   {t:"map",l:"Círculo cromático",h:SVG_COLORWHEEL()},
   {t:"table",h:"<table class='cmd'><tr><th>Uso da cor</th><th>Como aplicar</th></tr><tr><td>Avaliação qualitativa</td><td>Mostrar categorias/qualidade (\"melhor\", \"pior\"): cor primária + sua complementar (contraste).</td></tr><tr><td>Avaliação quantitativa</td><td>Mostrar números (0 a 100): gradiente (transição suave); só indica magnitude, sem julgamento.</td></tr></table>"},
   {t:"tip",l:"Posicionamento — a regra de ouro",h:"<p>O <strong>canto superior esquerdo</strong> é o melhor lugar para a informação mais importante, porque lemos de cima para baixo e da esquerda para a direita. Não espalhe estatísticas em locais aleatórios.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Menos é mais: poucos elementos grandes, cor com propósito (categoria = matiz; magnitude = gradiente) e o essencial no topo à esquerda.</p>"}
  ],
  cards:[["Quantos grandes elementos por dashboard?","No máximo cerca de 7, para evitar sobrecarga cognitiva."],
         ["Cor para categorias vs. para magnitude?","Categorias: matizes diferentes. Magnitude/números: gradiente da mesma cor."],
         ["Onde colocar a informação mais importante?","No canto superior esquerdo (início da leitura)."]] },

{ id:"viz-story", num:"08", cat:"Análise", title:"Storytelling e EDA", date:DATE1,
  blocks:[
   {t:"concept",l:"Storytelling com dados",h:"<p>Todo gráfico deve servir a uma mensagem. Valide sempre três pontos: a <strong>História</strong> (a narrativa dos dados), o <strong>Público</strong> (quem vai ler) e a <strong>Pergunta</strong> (o que o gráfico responde). Se não ajuda a responder a pergunta, é desnecessário.</p>"},
   {t:"concept",l:"EDA — Análise Exploratória de Dados",h:"<p><strong>EDA</strong> (Exploratory Data Analysis) é a <strong>investigação inicial</strong> dos dados: resumir características, identificar padrões, detectar outliers e entender relações. É o <strong>primeiro passo</strong>, antes de aplicar qualquer modelo.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Ferramentas da EDA</th><th>Exemplos</th></tr><tr><td>Estatística descritiva</td><td>Média, mediana, moda, variância, desvio padrão, quartis.</td></tr><tr><td>Gráficos</td><td>Histograma, dispersão, boxplot.</td></tr></table>"},
   {t:"tip",l:"Tipos de variáveis",h:"<p><strong>Categórica:</strong> rótulos sem ordem (gênero, cor). <strong>Quantitativa contínua:</strong> medições com casas decimais (altura, peso). <strong>Quantitativa discreta:</strong> contagens inteiras (nº de filhos, de carros).</p>"},
   {t:"tip",l:"Ferramentas e prática",h:"<p>Python (pandas, matplotlib, seaborn), R, Power BI e Tableau. Para praticar com dados reais, use o <strong>Kaggle</strong> (datasets públicos e notebooks).</p>"},
   {t:"recap",l:"Na prática",h:"<p>Antes de modelar, faça EDA: conheça o formato, os outliers e as relações. E ao apresentar, lembre da história, do público e da pergunta.</p>"}
  ],
  cards:[["Quais os 3 pilares do storytelling com dados?","História, Público e Pergunta."],
         ["O que é EDA?","Análise Exploratória de Dados: investigação inicial para resumir, achar padrões e outliers antes de modelar."],
         ["Variável contínua vs. discreta?","Contínua = medições com casas decimais (altura); discreta = contagens inteiras (nº de filhos)."]] }
,
{ id:"viz-enganosos", num:"09", cat:"Boas práticas", title:"Gráficos que enganam", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 03 (escala de precisão) e 04 a 06 (tipos de gráfico).</p>"},
   {t:"concept",l:"O que é",h:"<p>São gráficos que, por escolhas erradas, levam o leitor a uma conclusão falsa. Às vezes por descuido, às vezes de propósito.</p>"},
   {t:"concept",l:"Por que é importante",h:"<p>Um gráfico enganoso destrói a confiança no seu trabalho e leva a decisões erradas. Reconhecer os truques protege a sua análise e a sua leitura das análises dos outros.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Use esta lista como verificação final antes de publicar qualquer gráfico, e como filtro crítico ao ler relatórios de terceiros.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>Os erros mais comuns: eixo que não começa no zero (exagera diferenças), pizza com muitas fatias (impossível comparar), eixo invertido, escalas diferentes lado a lado e gráfico 3D que distorce proporções.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Truque</th><th>O efeito enganoso</th></tr><tr><td>Eixo sem o zero</td><td>Faz uma diferença pequena parecer enorme.</td></tr><tr><td>Pizza com muitas fatias</td><td>Impossível comparar tamanhos.</td></tr><tr><td>3D</td><td>Distorce a proporção das barras.</td></tr><tr><td>Escalas diferentes</td><td>Comparação injusta entre gráficos.</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Cortar o eixo vertical para dramatizar uma alta.</p><p>Usar pizza para mais de quatro ou cinco categorias.</p><p>Aplicar efeito 3D que engorda visualmente algumas barras.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Comece o eixo de valores no zero em gráficos de barra. Prefira barras à pizza quando há muitas categorias. Evite 3D. Use a mesma escala ao comparar gráficos lado a lado.</p>"},
   {t:"plain",l:"Exercícios graduais",h:"<p><b>1.</b> Explique por que um gráfico de barras deve começar no zero.</p><p><b>2.</b> Diga quando a pizza deixa de funcionar.</p><p><b>3.</b> Aponte o problema de comparar dois gráficos com escalas diferentes.</p>"},
   {t:"plain",l:"Soluções",h:"<p><b>1.</b> Sem o zero, a altura das barras deixa de ser proporcional ao valor e exagera diferenças.</p><p><b>2.</b> Com muitas fatias parecidas, o olho não distingue tamanhos.</p><p><b>3.</b> Escalas diferentes fazem valores iguais parecerem diferentes, levando a conclusões erradas.</p>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>Barra começa no zero. Pizza só para poucas categorias. Sem 3D. Mesma escala ao comparar. O gráfico deve revelar, não distorcer.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p>Por que barras começam no zero? Para manter a proporção entre altura e valor. Quando evitar pizza? Com muitas categorias ou valores próximos.</p>"},
   {t:"plain",l:"Mapa mental",h:"<ul><li>Gráficos que enganam<ul><li>Eixo sem zero → exagera</li><li>Pizza demais → não compara</li><li>3D → distorce</li><li>Escalas diferentes → injusto</li><li>Regra: revelar, não distorcer</li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><b>Mini-projeto:</b> pegue um gráfico com eixo cortado e refaça começando no zero, comparando a impressão.</p><p><b>Conexão:</b> aplica-se direto ao Power BI e ao próximo tema, sobre escolher o gráfico certo.</p>"}
  ],
  cards:[
    ["Por que barras devem começar no zero?","Para manter a altura proporcional ao valor."],
    ["Quando a pizza falha?","Com muitas categorias ou valores próximos."],
    ["Qual o problema do 3D?","Distorce a proporção das formas."],
    ["E escalas diferentes lado a lado?","Tornam a comparação injusta e enganosa."]] },
{ id:"viz-escolha", num:"10", cat:"Boas práticas", title:"Como escolher o gráfico certo", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 04 a 06 (tipos de gráfico) e 09 (gráficos que enganam).</p>"},
   {t:"concept",l:"O que é",h:"<p>É um método para escolher o gráfico a partir da pergunta que você quer responder, em vez de escolher pela aparência.</p>"},
   {t:"concept",l:"Por que é importante",h:"<p>O gráfico certo torna a mensagem óbvia em segundos. O errado esconde a informação. A escolha vem da pergunta, não do gosto.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Antes de criar qualquer visual. Defina primeiro a intenção: comparar, mostrar partes de um todo, ver evolução no tempo, ver relação ou ver distribuição.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>Cada intenção tem gráficos naturais. Comparar: barras. Evolução no tempo: linha. Partes de um todo: barras empilhadas (melhor que pizza). Relação entre dois números: dispersão. Distribuição: histograma ou box plot.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Sua pergunta</th><th>Gráfico indicado</th></tr><tr><td>Comparar categorias</td><td>Barras.</td></tr><tr><td>Evolução no tempo</td><td>Linha.</td></tr><tr><td>Partes de um todo</td><td>Barras empilhadas.</td></tr><tr><td>Relação entre dois números</td><td>Dispersão.</td></tr><tr><td>Distribuição</td><td>Histograma ou box plot.</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Escolher o gráfico pela beleza e depois forçar os dados nele.</p><p>Usar linha para categorias sem ordem temporal.</p><p>Usar pizza onde barras comparariam melhor.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Escreva a pergunta em uma frase antes de escolher. Use linha só quando há ordem no eixo (tempo). Prefira barras para comparar. Mantenha o visual simples e rotulado.</p>"},
   {t:"plain",l:"Exercícios graduais",h:"<p><b>1.</b> Que gráfico mostra a venda mês a mês ao longo do ano?</p><p><b>2.</b> Que gráfico compara o faturamento de cinco lojas?</p><p><b>3.</b> Que gráfico mostra a relação entre horas de estudo e nota?</p>"},
   {t:"plain",l:"Soluções",h:"<p><b>1.</b> Linha: há evolução no tempo.</p><p><b>2.</b> Barras: comparação entre categorias.</p><p><b>3.</b> Dispersão: relação entre dois números.</p>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>A pergunta define o gráfico. Comparar: barras. Tempo: linha. Todo: empilhadas. Relação: dispersão. Distribuição: histograma ou box plot.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p>Como escolher um gráfico? Pela pergunta a responder. Quando usar linha? Quando há ordem temporal no eixo. Por que barras antes de pizza? Porque o olho compara comprimentos melhor que ângulos.</p>"},
   {t:"plain",l:"Mapa mental",h:"<ul><li>Escolher o gráfico<ul><li>Comparar → barras</li><li>Tempo → linha</li><li>Todo → empilhadas</li><li>Relação → dispersão</li><li>Distribuição → histograma / box plot</li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><b>Mini-projeto:</b> para três perguntas de negócio, escolha e justifique o gráfico de cada uma.</p><p><b>Conexão:</b> fecha o caderno de Visualização e orienta as escolhas de visual no Power BI.</p>"}
  ],
  cards:[
    ["O que define a escolha do gráfico?","A pergunta que você quer responder."],
    ["Qual gráfico para evolução no tempo?","Linha."],
    ["Qual gráfico para comparar categorias?","Barras."],
    ["Qual gráfico para relação entre dois números?","Dispersão."]] }
];

const EST_THEMES = [
{ id:"est-central", num:"01", cat:"Resumo dos dados", title:"Medidas de centralidade", date:DATE1,
  blocks:[
   {t:"concept",l:"O que são",h:"<p>Resumem um conjunto de dados num <strong>único número</strong> representativo (um valor \"típico\" ou central). Servem de referência para comparar grupos.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Medida</th><th>O que é</th></tr><tr><td>Média</td><td>Soma dos valores dividida pela quantidade. Sensível a valores extremos.</td></tr><tr><td>Mediana</td><td>Valor central com os dados ordenados (divide em duas metades). É robusta a extremos.</td></tr><tr><td>Moda</td><td>Valor que mais se repete. Serve até para dados não numéricos (categorias).</td></tr></table>"},
   {t:"tip",l:"Exemplo passo a passo",h:"<p>Dados ordenados: 1, 2, 2, 3, 3, 3, 4, 4, 6, 7 (10 valores).<br><strong>Média:</strong> soma = 35; 35 ÷ 10 = <strong>3,5</strong>.<br><strong>Mediana:</strong> média dos dois centrais (5º e 6º) = (3 + 3) ÷ 2 = <strong>3</strong>.<br><strong>Moda:</strong> o número 3 aparece três vezes = <strong>3</strong>.</p>"},
   {t:"tip",l:"Por que a mediana é robusta",h:"<p>Dados {1,2,2,3,3,3,4,4,6,7}: média 3,5, mediana 3. Trocando o 4 por <strong>40</strong>: a média salta para 7,1, mas a <strong>mediana continua 3</strong>. Por isso, com valores discrepantes, a mediana representa melhor a realidade.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Use a <strong>média</strong> em dados bem distribuídos; use a <strong>mediana</strong> quando houver outliers que distorcem a média.</p>"}
  ],
  cards:[["Média é sensível a quê?","A valores extremos (outliers), que a puxam para cima ou para baixo."],
         ["O que é a mediana?","O valor central com os dados ordenados; divide o conjunto em duas metades."],
         ["Quando preferir a mediana à média?","Quando há valores muito discrepantes (outliers)."],
         ["A moda serve para dados não numéricos?","Sim. A moda é o valor mais frequente e funciona até para categorias (ex.: cor mais vendida)."]] },

{ id:"est-dispersao", num:"02", cat:"Resumo dos dados", title:"Desvio padrão e variância", date:DATE1,
  blocks:[
   {t:"concept",l:"Desvio padrão",h:"<p>Mede o quanto os dados estão <strong>espalhados em relação à média</strong>. Quanto <strong>menor</strong>, mais homogêneos (e previsíveis) são os dados.</p>"},
   {t:"tip",l:"Exemplo",h:"<p>Notas (5, 5, 5): média 5, desvio <strong>zero</strong> (todos iguais). Notas (0, 5, 10): mesma média 5, mas desvio padrão <strong>alto</strong> (dados muito diferentes).</p>"},
   {t:"concept",l:"Variância",h:"<p>É a média dos <strong>quadrados</strong> das distâncias de cada ponto à média. O desvio padrão é a <strong>raiz quadrada</strong> da variância (volta à unidade original).</p>"},
   {t:"recap",l:"Na prática",h:"<p>Só a média não basta: dois grupos podem ter a mesma média e dispersões muito diferentes. O desvio padrão revela a confiabilidade dos dados.</p>"}
  ],
  cards:[["O que mede o desvio padrão?","O quanto os dados estão espalhados em relação à média."],
         ["Desvio padrão pequeno indica o quê?","Dados homogêneos e mais previsíveis."],
         ["Relação entre variância e desvio padrão?","O desvio padrão é a raiz quadrada da variância."]] },

{ id:"est-normal", num:"03", cat:"Distribuições", title:"Distribuição normal e box plot", date:DATE1,
  blocks:[
   {t:"concept",l:"Distribuição normal (curva de sino)",h:"<p>Também chamada de distribuição de <strong>Gauss</strong>: a maioria dos valores se agrupa no centro (em torno da média) e fica mais rara nas extremidades. Muitos fenômenos seguem esse padrão (altura, erros de medição).</p>"},
   {t:"map",l:"A curva de sino",h:SVG_NORMAL()},
   {t:"tip",l:"Testes de normalidade",h:"<p><strong>Shapiro-Wilk</strong> (amostras pequenas) e <strong>Shapiro-Francia</strong> (grandes) verificam se os dados realmente seguem o formato de sino.</p>"},
   {t:"concept",l:"Box plot (diagrama de caixa)",h:"<p>Resume os dados em cinco números: mínimo, 1º quartil (Q1), <strong>mediana</strong>, 3º quartil (Q3) e máximo. A caixa contém os 50% centrais; pontos fora dela são <strong>outliers</strong>.</p>"},
   {t:"map",l:"Anatomia do box plot",h:SVG_BOXPLOT()},
   {t:"tip",l:"Curtose e assimetria",h:"<p><strong>Curtose</strong> = achatamento: leptocúrtica (pico alto, dados concentrados) vs. platicúrtica (achatada, dados espalhados). <strong>Assimetria (skew):</strong> cauda para a esquerda (negativa, média &lt; mediana) ou para a direita (positiva, média &gt; mediana).</p>"},
   {t:"recap",l:"Na prática",h:"<p>O box plot é ótimo para comparar grupos e enxergar dispersão e outliers de relance; a curva normal é a base de muitos testes estatísticos.</p>"}
  ],
  cards:[["Qual o formato da distribuição normal?","De sino: maioria no centro, extremos raros."],
         ["O que o box plot mostra?","Mediana, quartis (Q1, Q3), mínimo, máximo e os outliers."],
         ["Assimetria positiva: média e mediana?","Cauda à direita; a média tende a ser maior que a mediana."]] },

{ id:"est-amostra", num:"04", cat:"Amostragem", title:"População e amostra", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é amostragem",h:"<p>Técnicas para selecionar uma <strong>amostra</strong> (parte) de uma <strong>população</strong> (o todo) e tirar conclusões sobre o todo. Existe porque medir todos costuma ser inviável (custo, tempo, acesso).</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Probabilística (aleatória)</th><th>Como funciona</th></tr><tr><td>Aleatória simples</td><td>Sorteio: todos têm a mesma chance.</td></tr><tr><td>Estratificada</td><td>Divide em estratos homogêneos e sorteia dentro de cada um.</td></tr><tr><td>Sistemática</td><td>Sorteia um início e segue um intervalo fixo (ex.: de 13 em 13).</td></tr><tr><td>Conglomerado</td><td>Divide em grupos heterogêneos e sorteia grupos inteiros.</td></tr></table>"},
   {t:"table",h:"<table class='cmd'><tr><th>Não probabilística</th><th>Como funciona</th></tr><tr><td>Conveniência</td><td>Escolhe os mais acessíveis (rápida e barata, mas pouco representativa).</td></tr><tr><td>Quotas</td><td>Por julgamento, até preencher uma quantidade definida de cada perfil.</td></tr></table>"},
   {t:"attr",l:"Representatividade",h:"<p>Uma boa amostra precisa: <strong>pertencer</strong> à população-alvo, ser <strong>isenta de tendência</strong> (não viciada), ter <strong>aleatoriedade</strong> e <strong>tamanho</strong> suficiente.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Probabilística quando precisa de rigor e generalização; não probabilística quando agilidade e custo importam mais que a precisão.</p>"}
  ],
  cards:[["População vs. amostra?","População = o todo; amostra = uma parte selecionada do todo."],
         ["Estratificada vs. conglomerado?","Estratificada: grupos homogêneos, sorteia dentro de cada. Conglomerado: grupos heterogêneos, sorteia grupos inteiros."],
         ["O que é uma amostra tendenciosa?","Uma amostra viciada, que não representa a população (ex.: entrevistar só torcedores na porta do estádio)."]] },

{ id:"est-correlacao", num:"05", cat:"Relações", title:"Correlação de Pearson", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é",h:"<p>Mede a <strong>força e a direção</strong> da relação <strong>linear</strong> entre duas variáveis quantitativas. O coeficiente <strong>r</strong> varia de <strong>-1 a +1</strong>.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Valor de r</th><th>Interpretação</th></tr><tr><td>+1</td><td>Positiva perfeita (sobem juntas).</td></tr><tr><td>-1</td><td>Negativa perfeita (uma sobe, a outra desce).</td></tr><tr><td>perto de ±1</td><td>Relação forte.</td></tr><tr><td>perto de 0</td><td>Relação fraca ou nenhuma.</td></tr></table>"},
   {t:"map",l:"As três correlações em dispersão",h:SVG_CORR()},
   {t:"attr",l:"Limitações",h:"<p>Só mede relação <strong>linear</strong> (relações curvas ela não enxerga); é <strong>sensível a outliers</strong>; exige variáveis contínuas.</p>"},
   {t:"tip",l:"Correlação não é causalidade",h:"<p>Duas variáveis subirem juntas <strong>não prova</strong> que uma causa a outra. Exemplo clássico: buscas por \"memes de gato\" se correlacionam com recalls de airbag — pura coincidência.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Use Pearson para medir associação linear, mas sempre com olhar crítico: confirme com gráfico de dispersão e nunca confunda correlação com causa.</p>"}
  ],
  cards:[["A correlação de Pearson varia de quanto a quanto?","De -1 a +1."],
         ["r próximo de +1 significa?","Relação linear positiva forte (as variáveis sobem juntas)."],
         ["\"Correlação não implica...\"?","Causalidade. Subir junto não prova causa e efeito."]] },

{ id:"est-hipotese", num:"06", cat:"Inferência", title:"Teste de hipótese e teste t", date:DATE1,
  blocks:[
   {t:"concept",l:"Teste de hipótese",h:"<p>Método para tomar decisões sobre uma <strong>população</strong> a partir de uma <strong>amostra</strong>. Ajuda a separar uma diferença <strong>real</strong> de uma diferença por <strong>acaso</strong>.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Hipótese</th><th>O que afirma</th></tr><tr><td>H0 (nula)</td><td>Não há diferença/efeito (o \"padrão\"). É inocente até prova em contrário.</td></tr><tr><td>H1 (alternativa)</td><td>Há uma diferença/efeito real (o que se quer provar).</td></tr></table>"},
   {t:"concept",l:"Nível de significância (α) e valor-p",h:"<p><strong>α</strong> é o risco aceito de errar ao rejeitar H0 (padrão <strong>0,05</strong> = 5%). Se o <strong>valor-p &lt; α</strong>, rejeitamos H0 (resultado significativo).</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Erro</th><th>O que é</th></tr><tr><td>Tipo I (falso positivo)</td><td>Rejeitar H0 quando ela é verdadeira. Probabilidade = α.</td></tr><tr><td>Tipo II (falso negativo)</td><td>Não rejeitar H0 quando H1 é verdadeira.</td></tr></table>"},
   {t:"tip",l:"Teste t de Student",h:"<p>Compara as <strong>médias de dois grupos</strong> para ver se a diferença é significativa. É útil para <strong>amostras pequenas</strong> (criado por William Gosset, na cervejaria Guinness).</p>"},
   {t:"recap",l:"Na prática",h:"<p>Defina H0 e H1 e o α <strong>antes</strong> de olhar os dados; calcule o valor-p; se for menor que α, há evidência de diferença real. Significância estatística não é o mesmo que importância prática.</p>"}
  ],
  cards:[["O que é a hipótese nula (H0)?","A afirmação de que não há diferença/efeito; mantida até os dados a contrariarem."],
         ["O que é o nível de significância α?","O risco aceito de erro tipo I (falso positivo); padrão 0,05."],
         ["Erro tipo I vs. tipo II?","Tipo I = falso positivo (rejeitar H0 verdadeira). Tipo II = falso negativo (não rejeitar H0 falsa)."],
         ["Para que serve o teste t de Student?","Comparar as médias de dois grupos, útil em amostras pequenas."]] }
,
{ id:"est-variaveis", num:"07", cat:"Fundamentos", title:"Tipos de variáveis", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Tema 01 (medidas de centralidade).</p>"},
   {t:"concept",l:"O que é",h:"<p>Variável é cada característica que você mede ou observa nos dados, como idade, sexo ou valor da compra. Os tipos dizem que conta cada uma aceita.</p><p>Dividem-se em qualitativas (categorias) e quantitativas (números).</p>"},
   {t:"concept",l:"Por que é importante",h:"<p>O tipo da variável decide o que faz sentido fazer com ela: calcular média só vale para número, contar frequência vale para categoria. Escolher o gráfico e o teste certo também depende do tipo.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Logo no início de qualquer análise, ao olhar as colunas. Classificar cada variável evita erros como tirar média de um código que parece número, mas é categoria (por exemplo, CEP).</p>"},
   {t:"concept",l:"Como funciona",h:"<p>Qualitativa nominal: categorias sem ordem (cor, cidade). Qualitativa ordinal: categorias com ordem (escolaridade). Quantitativa discreta: contagem inteira (número de filhos). Quantitativa contínua: medição com casas decimais (altura).</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Tipo</th><th>Exemplo</th></tr><tr><td>Nominal</td><td>Cor dos olhos, cidade.</td></tr><tr><td>Ordinal</td><td>Escolaridade, nota A/B/C.</td></tr><tr><td>Discreta</td><td>Número de filhos.</td></tr><tr><td>Contínua</td><td>Altura, peso, valor.</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Tirar média de uma categoria codificada como número (CEP, código de produto).</p><p>Tratar nota ordinal como se as distâncias fossem iguais.</p><p>Usar gráfico de número para uma variável que é categoria.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Classifique cada coluna antes de analisar. Para categoria, conte frequência. Para número, use média e desvio. Combine o tipo da variável com o gráfico e o teste corretos.</p>"},
   {t:"plain",l:"Exercícios graduais",h:"<p><b>1.</b> Classifique: cor favorita, idade, número de irmãos, faixa de renda.</p><p><b>2.</b> Diga por que não faz sentido a média de uma variável nominal.</p><p><b>3.</b> Dê um exemplo de variável contínua e um de discreta.</p>"},
   {t:"plain",l:"Soluções",h:"<p><b>1.</b> Cor: nominal. Idade: contínua. Número de irmãos: discreta. Faixa de renda: ordinal.</p><p><b>2.</b> Nominal não tem ordem nem distância numérica, então somar e dividir não tem sentido.</p><p><b>3.</b> Contínua: peso. Discreta: quantidade de produtos vendidos.</p>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>Qualitativa: nominal (sem ordem) e ordinal (com ordem). Quantitativa: discreta (contagem) e contínua (medição). O tipo define o cálculo, o gráfico e o teste.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p>Diferença entre variável contínua e discreta? Contínua admite casas decimais (altura); discreta é contagem inteira (filhos). Por que classificar variáveis? Porque guia todo o resto da análise.</p>"},
   {t:"plain",l:"Mapa mental",h:"<ul><li>Variáveis<ul><li>Qualitativa<ul><li>Nominal (sem ordem)</li><li>Ordinal (com ordem)</li></ul></li><li>Quantitativa<ul><li>Discreta (contagem)</li><li>Contínua (medição)</li></ul></li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><b>Mini-projeto:</b> pegue uma planilha e classifique cada coluna em um dos quatro tipos.</p><p><b>Conexão:</b> liga ao caderno de Visualização (o tipo guia o gráfico) e aos tipos de dados do SQL (tema 17).</p>"}
  ],
  cards:[
    ["Quais os dois grandes grupos de variáveis?","Qualitativas (categorias) e quantitativas (números)."],
    ["Diferença entre nominal e ordinal?","Nominal não tem ordem; ordinal tem ordem entre as categorias."],
    ["Diferença entre discreta e contínua?","Discreta é contagem inteira; contínua admite casas decimais."],
    ["Por que classificar variáveis?","Porque define cálculo, gráfico e teste adequados."]] },
{ id:"est-probabilidade", num:"08", cat:"Probabilidade", title:"Probabilidade básica", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Tema 07 (tipos de variáveis).</p>"},
   {t:"concept",l:"O que é",h:"<p>Probabilidade é a chance de um evento acontecer, medida de 0 a 1 (ou de 0% a 100%). Zero é impossível, um é certo.</p><p>É a base da estatística que tira conclusões a partir de amostras.</p>"},
   {t:"concept",l:"Por que é importante",h:"<p>Toda inferência (testes, intervalos de confiança, modelos) se apoia em probabilidade. Entender a chance evita conclusões exageradas a partir do acaso.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Sempre que houver incerteza: prever, estimar risco, avaliar se um resultado é raro ou comum. É o alicerce do teste de hipótese (tema 06).</p>"},
   {t:"concept",l:"Como funciona",h:"<p>Para casos igualmente prováveis, a probabilidade é casos favoráveis dividido por casos possíveis. A soma de todas as possibilidades dá 1. Eventos independentes multiplicam suas chances.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Regra</th><th>Ideia</th></tr><tr><td>Intervalo</td><td>Toda probabilidade fica entre 0 e 1.</td></tr><tr><td>Complemento</td><td>P(não A) = 1 menos P(A).</td></tr><tr><td>Soma (excludentes)</td><td>P(A ou B) = P(A) mais P(B).</td></tr><tr><td>Produto (independentes)</td><td>P(A e B) = P(A) vezes P(B).</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Achar que resultados passados mudam a próxima jogada de uma moeda justa (falácia do apostador).</p><p>Somar probabilidades de eventos que podem ocorrer juntos.</p><p>Confundir evento raro com impossível.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Verifique se os eventos são independentes antes de multiplicar. Use o complemento quando calcular o contrário for mais fácil. Pense em frequência: em muitas repetições, qual a proporção esperada.</p>"},
   {t:"plain",l:"Exercícios graduais",h:"<p><b>1.</b> Qual a probabilidade de sair cara em uma moeda justa?</p><p><b>2.</b> Qual a chance de tirar um número par em um dado de seis faces?</p><p><b>3.</b> Qual a probabilidade de duas caras em dois lançamentos independentes?</p>"},
   {t:"plain",l:"Soluções",h:"<p><b>1.</b> 1 dividido por 2, ou seja, 0,5 (50%).</p><p><b>2.</b> 3 favoráveis (2, 4, 6) em 6 possíveis, ou seja, 0,5.</p><p><b>3.</b> 0,5 vezes 0,5 = 0,25 (25%).</p>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>Probabilidade vai de 0 a 1. Complemento é 1 menos a chance. Excludentes somam, independentes multiplicam. É a base da inferência.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p>O que é a falácia do apostador? Achar que o passado influencia eventos independentes. Quando multiplicar probabilidades? Quando os eventos são independentes.</p>"},
   {t:"plain",l:"Mapa mental",h:"<ul><li>Probabilidade<ul><li>Entre 0 e 1</li><li>Complemento: 1 menos P(A)</li><li>Excludentes: somam</li><li>Independentes: multiplicam</li><li>Base da inferência</li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><b>Mini-projeto:</b> calcule as chances de eventos simples com moeda e dado, conferindo se somam 1.</p><p><b>Conexão:</b> sustenta o teste de hipótese (tema 06) e o valor-p, e aparece nos modelos de Machine Learning.</p>"}
  ],
  cards:[
    ["Entre quais valores fica a probabilidade?","Entre 0 (impossível) e 1 (certo)."],
    ["Como se calcula o complemento?","1 menos a probabilidade do evento."],
    ["Quando se multiplicam probabilidades?","Quando os eventos são independentes."],
    ["O que é a falácia do apostador?","Achar que o passado altera eventos independentes."]] },
{ id:"est-regressao", num:"09", cat:"Modelos", title:"Regressão linear simples", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 05 (correlação) e 08 (probabilidade).</p>"},
   {t:"concept",l:"O que é",h:"<p>Regressão linear simples encontra a reta que melhor descreve a relação entre duas variáveis numéricas, para estimar uma a partir da outra.</p><p>Exemplo: estimar o gasto a partir da renda.</p>"},
   {t:"concept",l:"Por que é importante",h:"<p>É o primeiro modelo preditivo e a porta de entrada para Machine Learning. Mostra a ideia central: aprender uma relação dos dados para fazer previsões.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Quando há relação aproximadamente linear entre duas variáveis numéricas e você quer prever ou entender o efeito de uma sobre a outra. Não use quando a relação é claramente curva.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>O modelo tem a forma y = a + b vezes x. O <b>a</b> é onde a reta corta o eixo (valor base), o <b>b</b> é a inclinação (quanto y muda quando x sobe uma unidade). O método ajusta a e b minimizando o erro.</p>"},
   {t:"code",h:"from sklearn.linear_model import LinearRegression\nimport numpy as np\n\nx = np.array([[1],[2],[3],[4]])\ny = np.array([2, 4, 5, 8])\n\nmodelo = LinearRegression().fit(x, y)\nprint(modelo.coef_)        <span class='cm'># inclinação (b)</span>\nprint(modelo.intercept_)   <span class='cm'># valor base (a)</span>\nprint(modelo.predict([[5]]))  <span class='cm'># previsão para x = 5</span>"},
   {t:"table",h:"<table class='cmd'><tr><th>Termo</th><th>O que significa</th></tr><tr><td>a (intercepto)</td><td>Valor de y quando x é zero.</td></tr><tr><td>b (coeficiente)</td><td>Quanto y muda a cada unidade de x.</td></tr><tr><td>R quadrado</td><td>Quanto da variação de y o modelo explica (0 a 1).</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Confundir correlação com causa: a reta não prova que x causa y.</p><p>Aplicar reta em relação claramente curva.</p><p>Prever muito fora da faixa dos dados observados (extrapolação arriscada).</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Olhe o gráfico de dispersão antes de ajustar. Avalie o R quadrado para saber se o modelo explica bem. Lembre que relação não é causa. Separe dados de treino e teste, como no caderno de IA.</p>"},
   {t:"plain",l:"Exercícios graduais",h:"<p><b>1.</b> Explique o que significam a e b na reta y = a + b x.</p><p><b>2.</b> Diga o que um R quadrado de 0,9 indica.</p><p><b>3.</b> Aponte o risco de prever y para um x muito maior que os dados observados.</p>"},
   {t:"plain",l:"Soluções",h:"<p><b>1.</b> a é o valor base de y quando x é zero; b é o quanto y muda a cada unidade de x.</p><p><b>2.</b> O modelo explica 90% da variação de y, um ajuste forte.</p><p><b>3.</b> Extrapolar para fora da faixa observada pode dar previsões sem base real.</p>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>Regressão linear ajusta y = a + b x. a é base, b é inclinação. R quadrado mede o ajuste. Relação não é causa. É a base preditiva da IA.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p>O que o coeficiente b representa? A variação de y por unidade de x. Correlação prova causa? Não. O que é R quadrado? A fração da variação explicada pelo modelo.</p>"},
   {t:"plain",l:"Mapa mental",h:"<ul><li>Regressão linear<ul><li>y = a + b x</li><li>a → valor base</li><li>b → inclinação</li><li>R quadrado → qualidade do ajuste</li><li>Relação não é causa</li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><b>Mini-projeto:</b> com scikit-learn, ajuste uma reta a poucos pontos e faça uma previsão.</p><p><b>Conexão:</b> liga a correlação (tema 05) ao caderno de IA e ao scikit-learn do Guia de Referência.</p>"}
  ],
  cards:[
    ["O que a regressão linear simples faz?","Ajusta a reta que melhor relaciona duas variáveis numéricas."],
    ["O que é o coeficiente b?","A inclinação: quanto y muda a cada unidade de x."],
    ["O que mede o R quadrado?","Quanto da variação de y o modelo explica (0 a 1)."],
    ["Correlação prova causa?","Não; relação estatística não implica causa."]] }
];

{ id:"bi-powerquery", num:"02", cat:"Tratamento", title:"Power Query: importar e tratar", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é",h:"<p>O <strong>Power Query Editor</strong> é onde os dados são <strong>limpos e moldados</strong> antes da análise (com a linguagem M). É a \"cozinha\": os dados chegam sujos e você prepara antes de cozinhar os gráficos.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Fontes</th><th>Exemplos</th></tr><tr><td>Arquivos</td><td>Excel, CSV, PDF, JSON, pasta.</td></tr><tr><td>Bancos</td><td>SQL Server, MySQL, Oracle, Access.</td></tr><tr><td>Nuvem</td><td>Azure, serviços online, conjuntos do Power BI.</td></tr></table>"},
   {t:"table",h:"<table class='cmd'><tr><th>Transformação</th><th>O que faz</th></tr><tr><td>Usar 1ª linha como cabeçalho</td><td>Transforma a primeira linha em títulos das colunas.</td></tr><tr><td>Dividir coluna</td><td>Separa por delimitador (ex.: \"código-nome\").</td></tr><tr><td>Mesclar colunas</td><td>Une colunas (ex.: cidade + estado).</td></tr><tr><td>Transformar colunas em linhas (unpivot)</td><td>Normaliza dados espalhados em muitas colunas.</td></tr><tr><td>Combinar arquivos</td><td>Junta vários arquivos de uma pasta com a mesma estrutura.</td></tr></table>"},
   {t:"tip",l:"Exemplo — dividir coluna",h:"<p>Uma coluna com \"10501109-Marisa Lima\" pode ser separada em duas pelo delimitador <strong>-</strong>: vira o \"código\" (10501109) e o \"nome\" (Marisa Lima). Caminho: Página Inicial &rarr; Dividir Coluna &rarr; Por Delimitador.</p>"},
   {t:"tip",l:"Etapas aplicadas e Transformar vs. Adicionar",h:"<p>Cada mudança vira um <strong>passo</strong> no histórico (dá para voltar e editar). <strong>Transformar</strong> altera a coluna atual; <strong>Adicionar Coluna</strong> cria uma nova, preservando a original.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Sempre limpe os dados no Power Query antes de criar visuais. Dados bem tratados = relatório confiável e rápido. Ao final, \"Fechar e Aplicar\".</p>"}
  ],

{ id:"bi-modelagem", num:"03", cat:"Modelagem", title:"Fato, dimensão e relacionamentos", date:DATE1,
  blocks:[
   {t:"concept",l:"Fato e dimensão",h:"<p><strong>Tabela fato:</strong> registra os eventos/transações com valores numéricos (ex.: vendas, pedidos). <strong>Tabela dimensão:</strong> o cadastro descritivo que dá contexto (quem, onde, quando — ex.: vendedores, produtos).</p>"},
   {t:"map",l:"Modelo estrela (star schema)",h:SVG_STAR()},
   {t:"table",h:"<table class='cmd'><tr><th>Chave</th><th>Onde aparece</th></tr><tr><td>Primária (PK)</td><td>Única na tabela dimensão (ex.: cód. do vendedor).</td></tr><tr><td>Estrangeira (FK)</td><td>O mesmo código repetido na tabela fato (o vendedor faz várias vendas).</td></tr></table>"},
   {t:"table",h:"<table class='cmd'><tr><th>Relacionamento</th><th>Propriedade</th></tr><tr><td>Cardinalidade</td><td>1:1, 1:N (o mais comum) ou N:M.</td></tr><tr><td>Direção do filtro</td><td>Unidirecional ou ambas.</td></tr><tr><td>Status</td><td>Ativo (usado por padrão) ou inativo.</td></tr></table>"},
   {t:"tip",l:"Dica de filtro",h:"<p>A seta do relacionamento deve apontar da <strong>dimensão para a fato</strong>. Isso garante que filtrar por um atributo (ex.: cliente) afete corretamente as vendas.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Modelo bem feito (fato no centro, dimensões ao redor) é o que faz os filtros e cálculos funcionarem. Sem relacionamento, os dados ficam isolados.</p>"}
  ],
  cards:[["Tabela fato vs. dimensão?","Fato: eventos/transações com números (vendas). Dimensão: cadastro descritivo (vendedores, produtos)."],
         ["PK e FK na modelagem?","PK é única na dimensão; FK é o mesmo código repetido na fato."],
         ["Para onde a seta do relacionamento deve apontar?","Da dimensão para a fato, para os filtros funcionarem."]] },

{ id:"bi-dax", num:"04", cat:"Cálculos", title:"DAX: medidas e colunas calculadas", date:DATE1,
