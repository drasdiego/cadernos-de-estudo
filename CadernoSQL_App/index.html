{ id:"py-tipos", num:"02", cat:"Fundamentos", title:"Tipos embutidos e variáveis", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Tema 01 (saber rodar um print e importar um módulo).</p>"},
   {t:"concept",l:"O que é",h:"<p>Uma <strong>variável</strong> é um nome que aponta para um valor guardado na memória. Um <strong>tipo</strong> diz que espécie de valor é: número, texto, verdadeiro/falso.</p>"},
   {t:"concept",l:"Por que importa",h:"<p>Quase todo programa guarda e transforma dados. Errar o tipo (texto onde devia ser número) é uma das causas mais comuns de bug.</p>"},
   {t:"concept",l:"Quando usar cada tipo",h:"<p>int para contagens, float para medidas com decimais, str para texto, bool para sim/não, None para \"ainda não tem valor\".</p>"},
   {t:"concept",l:"Como funciona",h:"<p>O tipo pertence ao valor, não ao nome. Por isso o mesmo nome pode receber um número e depois um texto. Você descobre o tipo com <code>type(x)</code>.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Tipo</th><th>Para que serve</th></tr><tr><td>int</td><td>Inteiros, sem limite fixo de tamanho.</td></tr><tr><td>float</td><td>Números com casas decimais.</td></tr><tr><td>str</td><td>Texto (imutável).</td></tr><tr><td>bool</td><td>True ou False (é um subtipo de int).</td></tr><tr><td>None</td><td>Ausência de valor.</td></tr></table>"},
   {t:"code",h:"<span class='cm'># Exemplo concreto</span>\nnome = <span class='st'>\"Ana\"</span>     <span class='cm'># str</span>\nidade = 28        <span class='cm'># int</span>\naltura = 1.65     <span class='cm'># float</span>\nprint(type(idade))           <span class='cm'># &lt;class 'int'&gt;</span>\nprint(<span class='st'>f\"{nome}, {idade} anos\"</span>)  <span class='cm'># f-string</span>"},
   {t:"attr",l:"Erros comuns",h:"<p><strong>float não é exato:</strong> <code>0.1 + 0.2</code> dá 0.30000000000000004. Para dinheiro, arredonde ou use <code>decimal</code>. Comparar com None com <code>==</code>: o certo é <code>is None</code>.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Use f-strings (texto começando com <code>f</code> e variáveis entre chaves) para montar mensagens. Dê nomes que dizem o que a variável guarda.</p>"},
   {t:"plain",h:"<p><strong>Exercícios graduais</strong></p><ul><li><strong>Básico:</strong> crie nome (str), idade (int), altura (float) e imprima os três numa f-string.</li><li><strong>Intermediário:</strong> some duas strings de número convertendo com <code>int()</code>.</li><li><strong>Avançado:</strong> mostre que <code>0.1 + 0.2 == 0.3</code> é False e conserte com <code>round(x, 2)</code>.</li></ul>"},
   {t:"code",h:"<span class='cm'># Soluções</span>\nnome, idade, altura = <span class='st'>\"Ana\"</span>, 28, 1.65\nprint(<span class='st'>f\"{nome}, {idade} anos, {altura}m\"</span>)\nprint(int(<span class='st'>\"3\"</span>) + int(<span class='st'>\"4\"</span>))           <span class='cm'># 7</span>\nprint(round(0.1 + 0.2, 2) == 0.3)  <span class='cm'># True</span>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>int (inteiro), float (decimal, inexato), str (texto), bool (True/False), None. O tipo é do valor. Formate com f-strings. Compare None com <code>is</code>.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p><strong>O que cai:</strong> por que 0.1 + 0.2 não é 0.3; diferença entre <code>==</code> (valor) e <code>is</code> (mesmo objeto). <strong>Pergunta de recrutador:</strong> \"Como você guardaria um valor em dinheiro com segurança?\" Resposta: usar <code>decimal.Decimal</code>, não float.</p>"},
   {t:"plain",h:"<p><strong>Mapa mental</strong></p><ul><li>Tipos<ul><li>Números: int, float</li><li>Texto: str (imutável)</li><li>Lógico: bool</li><li>Vazio: None</li></ul></li><li>Ferramentas: type(), f-strings, is None</li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><strong>Mini-projeto:</strong> peça nome e ano de nascimento com <code>input()</code> e imprima a idade. <strong>Conecta com o próximo:</strong> para guardar muitos valores juntos, você usa estruturas de dados, que é o tema 03.</p>"}
  ],
  cards:[["O que é uma variável em Python?","Um nome que aponta para um valor na memória; o tipo pertence ao valor."],
         ["Por que 0.1 + 0.2 não é igual a 0.3?","Porque float usa representação binária, que não guarda esses decimais com exatidão."],
         ["== versus is?","== compara o valor; is compara se é o mesmo objeto. Use is None."],
         ["Como guardar dinheiro com segurança?","Com decimal.Decimal (ou arredondando), nunca com float puro."]] },

{ id:"py-estruturas", num:"03", cat:"Estruturas de dados", title:"list, tuple, dict e set", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 01 e 02 (variáveis e tipos).</p>"},
   {t:"concept",l:"O que é",h:"<p>São coleções: formas de guardar vários valores numa só variável. O Python tem quatro principais: <strong>list, tuple, dict e set</strong>.</p>"},
   {t:"concept",l:"Por que importa",h:"<p>Escolher a coleção certa deixa o código mais claro e mais rápido. É um dos temas que mais aparece em entrevista.</p>"},
   {t:"concept",l:"Quando usar (analogia)",h:"<p><strong>list:</strong> uma fila de tarefas que muda. <strong>tuple:</strong> uma coordenada (x, y) que não muda. <strong>dict:</strong> uma agenda (nome do contato leva ao telefone). <strong>set:</strong> um saco de etiquetas, sem repetidas.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>list e tuple guardam por <strong>ordem</strong> (posição). dict guarda por <strong>chave</strong>. set guarda valores <strong>únicos</strong>. list e dict e set podem mudar; tuple não muda (é imutável).</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Coleção</th><th>Característica</th></tr><tr><td>list</td><td>Ordenada, muda. [1, 2, 3]</td></tr><tr><td>tuple</td><td>Ordenada, não muda. (1, 2)</td></tr><tr><td>dict</td><td>Chave para valor. {'a': 1}</td></tr><tr><td>set</td><td>Sem repetidos, sem ordem. {1, 2}</td></tr></table>"},
   {t:"code",h:"<span class='cm'># Exemplo concreto de cada uma</span>\nnums = [3, 1, 2]; nums.sort()   <span class='cm'># list -&gt; [1, 2, 3]</span>\nponto = (10, 20)                 <span class='cm'># tuple</span>\npessoa = {<span class='st'>\"nome\"</span>: <span class='st'>\"Ana\"</span>}     <span class='cm'># dict</span>\nprint(pessoa.get(<span class='st'>\"email\"</span>, <span class='st'>\"sem\"</span>))  <span class='cm'># default seguro</span>\nprint(set([1, 1, 2]))            <span class='cm'># {1, 2}</span>"},
   {t:"attr",l:"Erros comuns",h:"<p><strong>Apelido (aliasing):</strong> <code>b = a</code> não copia a lista; mexer em b mexe em a. Copie com <code>a.copy()</code>. Chave de dict precisa ser imutável: tupla pode, lista não. Não apague itens de uma lista enquanto a percorre.</p>"},
   {t:"tip",l:"Boas práticas e performance (fato)",h:"<p>Procurar um item é <strong>O(1)</strong> em set e dict (quase instantâneo) e <strong>O(n)</strong> em list (percorre tudo). O(1) e O(n) descrevem como o tempo cresce com o tamanho. Para muitas buscas, use set ou dict.</p>"},
   {t:"plain",h:"<p><strong>Exercícios graduais</strong></p><ul><li><strong>Básico:</strong> ordene [5, 3, 9, 1] e pegue o maior e o menor.</li><li><strong>Intermediário:</strong> conte quantas vezes cada palavra aparece numa frase, com um dict.</li><li><strong>Avançado:</strong> ache os itens em comum entre duas listas, sem repetir, com set.</li></ul>"},
   {t:"code",h:"<span class='cm'># Soluções</span>\nl = sorted([5, 3, 9, 1]); print(l[0], l[-1])   <span class='cm'># 1 9</span>\n\ncont = {}\n<span class='kw'>for</span> p <span class='kw'>in</span> <span class='st'>\"a casa a flor\"</span>.split():\n    cont[p] = cont.get(p, 0) + 1\nprint(cont)\n\nprint(set([1,2,3]) &amp; set([2,3,4]))   <span class='cm'># {2, 3}</span>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>list (ordenada, muda), tuple (ordenada, não muda), dict (chave para valor), set (únicos). Busca rápida (O(1)) em dict e set. Cuidado com apelido; use .copy e .get.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p><strong>O que cai:</strong> complexidade de busca em list vs dict/set; por que tupla pode ser chave e lista não. <strong>Pergunta de recrutador:</strong> \"Como você removeria duplicatas de uma lista?\" Resposta: <code>set(lista)</code>.</p>"},
   {t:"plain",h:"<p><strong>Mapa mental</strong></p><ul><li>Coleções<ul><li>Por ordem: list (muda), tuple (não muda)</li><li>Por chave: dict</li><li>Únicos: set</li></ul></li><li>Busca rápida: dict, set (O(1))</li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><strong>Mini-projeto:</strong> guarde 3 contatos num dict (nome para telefone) e imprima cada um. <strong>Conecta com o próximo:</strong> para percorrer essas coleções e decidir o que fazer, você usa controle de fluxo, o tema 04.</p>"}
  ],
  cards:[["Quando usar dict em vez de list?","Quando você busca por uma chave (ex.: nome para telefone) e quer busca rápida (O(1))."],
         ["Por que uma lista não pode ser chave de dict?","Porque chaves precisam ser imutáveis e hashable; a lista muda, a tupla não."],
         ["Como remover duplicatas de uma lista?","Convertendo para set: set(lista)."],
         ["O que é aliasing (apelido) de lista?","Quando b = a faz os dois nomes apontarem para a mesma lista; mudar um muda o outro. Copie com a.copy()."]] },

{ id:"py-fluxo", num:"04", cat:"Lógica", title:"Controle de fluxo e compreensões", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 02 e 03 (tipos e coleções).</p>"},
   {t:"concept",l:"O que é",h:"<p>Controle de fluxo é decidir <strong>o que o programa faz</strong> em cada situação e <strong>repetir</strong> ações. As peças são <code>if</code> (decisão), <code>for</code> e <code>while</code> (repetição).</p>"},
   {t:"concept",l:"Por que importa",h:"<p>Sem decisão e repetição, um programa só faz uma coisa fixa. É o que dá inteligência ao código.</p>"},
   {t:"concept",l:"Quando usar",h:"<p><code>if</code> quando há caminhos diferentes. <code>for</code> quando você sabe o que percorrer (uma lista). <code>while</code> quando repete até uma condição mudar.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>O Python usa <strong>indentação</strong> (recuo, 4 espaços) para marcar o que está dentro de cada bloco, em vez de chaves. O bloco recuado pertence ao if ou ao for acima.</p>"},
   {t:"code",h:"<span class='cm'># Decisão</span>\nidade = 20\n<span class='kw'>if</span> idade &gt;= 18:\n    print(<span class='st'>\"maior\"</span>)\n<span class='kw'>else</span>:\n    print(<span class='st'>\"menor\"</span>)\n\n<span class='cm'># Repetição com índice e valor</span>\n<span class='kw'>for</span> pos, nome <span class='kw'>in</span> enumerate([<span class='st'>\"Ana\"</span>, <span class='st'>\"Bia\"</span>]):\n    print(pos, nome)   <span class='cm'># 0 Ana / 1 Bia</span>"},
   {t:"concept",l:"Compreensão (comprehension)",h:"<p>Uma <strong>compreensão de lista</strong> (list comprehension) cria uma lista nova a partir de outra, em uma linha. É mais curto e legível que um loop com <code>append</code>.</p>"},
   {t:"code",h:"<span class='cm'># Lógica: para cada n de 0 a 9, se for par, guarde o quadrado</span>\nquad = [n*n <span class='kw'>for</span> n <span class='kw'>in</span> range(10) <span class='kw'>if</span> n % 2 == 0]\nprint(quad)   <span class='cm'># [0, 4, 16, 36, 64]</span>"},
   {t:"attr",l:"Erros comuns",h:"<p>Misturar tabulação e espaços (erro de indentação). Esquecer que <code>range(n)</code> vai de 0 a n-1. Fazer compreensões aninhadas demais, que ficam ilegíveis.</p>"},
   {t:"tip",l:"Boas práticas (comparação de abordagens)",h:"<p>Prefira <code>for item in lista</code> a <code>for i in range(len(lista))</code>. Use <code>enumerate</code> se precisar do índice. Use compreensão quando ela cabe em uma linha clara; senão, um loop normal é melhor.</p>"},
   {t:"plain",h:"<p><strong>Exercícios graduais</strong></p><ul><li><strong>Básico:</strong> imprima os pares de 1 a 10.</li><li><strong>Intermediário:</strong> com uma compreensão, gere o tamanho de cada palavra de uma frase.</li><li><strong>Avançado:</strong> com enumerate, crie um dict que liga cada nome à sua posição.</li></ul>"},
   {t:"code",h:"<span class='cm'># Soluções</span>\nprint([n <span class='kw'>for</span> n <span class='kw'>in</span> range(1, 11) <span class='kw'>if</span> n % 2 == 0])\nprint([len(p) <span class='kw'>for</span> p <span class='kw'>in</span> <span class='st'>\"o gato preto\"</span>.split()])\nnomes = [<span class='st'>\"Ana\"</span>, <span class='st'>\"Bia\"</span>]\nprint({n: i <span class='kw'>for</span> i, n <span class='kw'>in</span> enumerate(nomes)})"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>if decide; for e while repetem; indentação marca os blocos. enumerate dá índice e valor. Compreensão cria listas em uma linha.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p><strong>O que cai:</strong> diferença entre compreensão de lista (cria tudo na memória) e generator (gera sob demanda); o que é for/else. <strong>Pergunta de recrutador:</strong> \"Como percorrer índice e valor ao mesmo tempo?\" Resposta: <code>enumerate</code>.</p>"},
   {t:"plain",h:"<p><strong>Mapa mental</strong></p><ul><li>Fluxo<ul><li>Decisão: if / elif / else</li><li>Repetição: for, while</li><li>Ajudantes: range, enumerate, zip</li></ul></li><li>Atalho: compreensão (list/dict/set)</li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><strong>Mini-projeto:</strong> percorra uma lista de notas e imprima \"aprovado\" para nota maior ou igual a 7. <strong>Conecta com o próximo:</strong> para reaproveitar lógica, você agrupa tudo em funções, o próximo passo do caderno.</p>"}
  ],
  cards:[["Como o Python marca blocos de código?","Por indentação (recuo de 4 espaços), em vez de chaves."],
         ["Para que serve enumerate?","Percorrer obtendo índice e valor ao mesmo tempo, sem usar range(len(...))."],
         ["List comprehension versus generator?","A compreensão cria a lista toda na memória; o generator gera item a item sob demanda, poupando memória."],
         ["O que range(5) gera?","Os números de 0 a 4 (de 0 até n-1)."]] }
,
{ id:"py-funcoes", num:"05", cat:"Funções", title:"Funções", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 02 a 04 (tipos, coleções e controle de fluxo).</p>"},
   {t:"concept",l:"O que é",h:"<p>Uma <strong>função</strong> é um bloco de código com nome que faz uma tarefa. Ela pode receber entradas (os <strong>parâmetros</strong>) e devolver um resultado com <code>return</code>.</p>"},
   {t:"concept",l:"Por que importa",h:"<p>Funções evitam repetir código e organizam o programa em partes pequenas. Isso segue o princípio DRY (do inglês Don't Repeat Yourself, ou seja, \"não se repita\").</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Sempre que um trecho se repete, ou quando dar um nome a uma etapa deixa o código mais claro.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>Você define com <code>def nome(parâmetros):</code> e o corpo recuado. <code>return</code> devolve um valor e encerra a função. Se não houver return, a função devolve <code>None</code>.</p>"},
   {t:"code",h:"<span class='cm'># Exemplo concreto</span>\n<span class='kw'>def</span> saudacao(nome):\n    <span class='kw'>return</span> <span class='st'>f\"Olá, {nome}\"</span>\n\nprint(saudacao(<span class='st'>\"Ana\"</span>))   <span class='cm'># Olá, Ana</span>\n\n<span class='cm'># Parâmetro com valor padrão</span>\n<span class='kw'>def</span> potencia(base, expoente=2):\n    <span class='kw'>return</span> base ** expoente\nprint(potencia(5))      <span class='cm'># 25</span>\nprint(potencia(5, 3))   <span class='cm'># 125</span>"},
   {t:"table",h:"<table class='cmd'><tr><th>Tipo de parâmetro</th><th>Como é</th></tr><tr><td>Posicional</td><td>Pela ordem. f(1, 2)</td></tr><tr><td>Nomeado</td><td>Pelo nome. f(base=1)</td></tr><tr><td>Com padrão</td><td>Tem valor default. def f(x=2)</td></tr><tr><td>*args</td><td>Vários posicionais juntos numa tupla.</td></tr><tr><td>**kwargs</td><td>Vários nomeados juntos num dict.</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p><strong>Default mutável:</strong> nunca use lista ou dict como valor padrão (<code>def f(x=[])</code>); ela é criada uma vez e fica compartilhada entre chamadas. Use <code>x=None</code> e crie a lista dentro. Outro erro: confundir <code>return</code> (devolve) com <code>print</code> (só mostra).</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Escreva uma <strong>docstring</strong> (texto entre aspas triplas logo abaixo do def, que documenta o que a função faz). Mantenha a função curta, com um só propósito. Use type hints para indicar os tipos.</p>"},
   {t:"plain",h:"<p><strong>Exercícios graduais</strong></p><ul><li><strong>Básico:</strong> crie uma função que recebe dois números e devolve a soma.</li><li><strong>Intermediário:</strong> crie uma função media(notas) que recebe uma lista e devolve a média.</li><li><strong>Avançado:</strong> crie uma função que aceita vários números com *args e devolve o maior.</li></ul>"},
   {t:"code",h:"<span class='cm'># Soluções</span>\n<span class='kw'>def</span> soma(a, b): <span class='kw'>return</span> a + b\n\n<span class='kw'>def</span> media(notas): <span class='kw'>return</span> sum(notas) / len(notas)\n\n<span class='kw'>def</span> maior(*nums): <span class='kw'>return</span> max(nums)\nprint(maior(3, 9, 1))   <span class='cm'># 9</span>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>def cria a função; parâmetros são as entradas; return devolve o resultado (sem ele, vem None). Cuidado com default mutável. Documente com docstring.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p><strong>O que cai:</strong> o que são *args e **kwargs; o perigo do argumento padrão mutável; escopo de variáveis (regra LEGB: Local, Enclosing, Global, Built-in). <strong>Pergunta de recrutador:</strong> \"O que essa função retorna se não tiver return?\" Resposta: None.</p>"},
   {t:"plain",h:"<p><strong>Mapa mental</strong></p><ul><li>Função<ul><li>def nome(parâmetros)</li><li>return devolve (sem ele, None)</li><li>Parâmetros: posicional, nomeado, padrão, *args, **kwargs</li><li>Documentar: docstring</li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><strong>Mini-projeto:</strong> escreva uma função <code>boletim(notas)</code> que devolve a média e se está aprovado (média maior ou igual a 7). <strong>Conecta com o próximo:</strong> ao crescer, você separa funções em arquivos: são os módulos, o tema 06.</p>"}
  ],
  cards:[["O que uma função devolve se não tiver return?","None."],
         ["Por que não usar uma lista como valor padrão de parâmetro?","Porque ela é criada uma vez e fica compartilhada entre todas as chamadas, causando bugs. Use None e crie dentro."],
         ["O que são *args e **kwargs?","*args junta vários argumentos posicionais numa tupla; **kwargs junta vários nomeados num dict."],
         ["O que é uma docstring?","Um texto entre aspas triplas no início da função que documenta o que ela faz."]] },
{ id:"py-modulos", num:"06", cat:"Organização", title:"Módulos, pacotes e import", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Tema 05 (funções).</p>"},
   {t:"concept",l:"O que é",h:"<p>Um <strong>módulo</strong> é um arquivo <code>.py</code> com código (funções, variáveis). Um <strong>pacote</strong> é uma pasta com vários módulos. <code>import</code> traz esse código para o seu programa.</p>"},
   {t:"concept",l:"Por que importa",h:"<p>Permite dividir um projeto grande em partes e reaproveitar bibliotecas prontas, em vez de colocar tudo num arquivo só.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Para separar responsabilidades (cada arquivo com um tema) e para usar a biblioteca padrão ou pacotes do PyPI (Python Package Index, o repositório oficial de pacotes).</p>"},
   {t:"concept",l:"Como funciona",h:"<p><code>import math</code> traz o módulo inteiro (usa-se <code>math.sqrt</code>). <code>from math import sqrt</code> traz só um nome (usa-se <code>sqrt</code>). Pacotes externos são instalados com <code>pip install</code>.</p>"},
   {t:"code",h:"<span class='cm'># Duas formas de importar</span>\n<span class='kw'>import</span> math\nprint(math.pi)\n\n<span class='kw'>from</span> math <span class='kw'>import</span> sqrt\nprint(sqrt(25))   <span class='cm'># 5.0</span>\n\n<span class='cm'># Só roda quando o arquivo é executado direto, não quando é importado</span>\n<span class='kw'>if</span> __name__ == <span class='st'>\"__main__\"</span>:\n    print(<span class='st'>\"rodando direto\"</span>)"},
   {t:"table",h:"<table class='cmd'><tr><th>Forma</th><th>Quando usar</th></tr><tr><td>import modulo</td><td>Padrão. Deixa claro de onde vem (modulo.func).</td></tr><tr><td>from modulo import x</td><td>Quando usa muito um nome só.</td></tr><tr><td>from modulo import *</td><td>Evite: traz tudo e polui o espaço de nomes.</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Dar a um arquivo seu o mesmo nome de um módulo da biblioteca padrão (ex.: <code>random.py</code>): o Python importa o seu por engano. Import circular (dois arquivos que importam um ao outro).</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Coloque os imports no topo do arquivo. Use um ambiente virtual para os pacotes do projeto. Proteja o código executável com <code>if __name__ == \"__main__\":</code>.</p>"},
   {t:"plain",h:"<p><strong>Exercícios graduais</strong></p><ul><li><strong>Básico:</strong> importe <code>random</code> e sorteie um número de 1 a 6.</li><li><strong>Intermediário:</strong> crie um arquivo <code>utils.py</code> com a função soma e importe no seu programa.</li><li><strong>Avançado:</strong> instale com pip o pacote <code>requests</code> num venv e explique qual problema ele resolve (fazer requisições HTTP de forma simples).</li></ul>"},
   {t:"code",h:"<span class='cm'># Solução (básico)</span>\n<span class='kw'>import</span> random\nprint(random.randint(1, 6))\n\n<span class='cm'># utils.py</span>\n<span class='kw'>def</span> soma(a, b): <span class='kw'>return</span> a + b\n<span class='cm'># programa.py</span>\n<span class='kw'>from</span> utils <span class='kw'>import</span> soma\nprint(soma(2, 3))"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>Módulo = arquivo .py; pacote = pasta de módulos. import traz código. from x import y traz um nome. pip instala do PyPI. __name__ == \"__main__\" separa execução direta de importação.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p><strong>O que cai:</strong> diferença entre módulo e pacote; o que faz <code>if __name__ == \"__main__\"</code>; diferença entre a biblioteca padrão e o PyPI. <strong>Pergunta de recrutador:</strong> \"Como você isola as dependências de um projeto?\" Resposta: ambiente virtual (venv).</p>"},
   {t:"plain",h:"<p><strong>Mapa mental</strong></p><ul><li>Organização<ul><li>Módulo: arquivo .py</li><li>Pacote: pasta de módulos</li><li>import / from import</li><li>Externos: PyPI + pip + venv</li><li>__name__ == \"__main__\"</li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><strong>Mini-projeto:</strong> crie um módulo <code>calc.py</code> com soma, subtração e média, e use no programa principal. <strong>Conecta com o próximo:</strong> programas reais lidam com falhas (arquivo que não existe, entrada inválida); isso é tratado com exceções, o tema 07.</p>"}
  ],
  cards:[["Módulo versus pacote?","Módulo é um arquivo .py; pacote é uma pasta com vários módulos."],
         ["import math versus from math import sqrt?","O primeiro traz o módulo todo (math.sqrt); o segundo traz só o nome sqrt."],
         ["O que faz if __name__ == \"__main__\"?","Garante que um trecho só roda quando o arquivo é executado direto, e não quando é importado."],
         ["O que é o PyPI?","O Python Package Index, repositório oficial de pacotes de terceiros, instalados com pip."]] },
{ id:"py-excecoes", num:"07", cat:"Robustez", title:"Erros e exceções", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 04 e 05 (fluxo e funções).</p>"},
   {t:"concept",l:"O que é",h:"<p>Uma <strong>exceção</strong> é um erro que acontece durante a execução do programa. Se ninguém tratar, o programa para e mostra o erro.</p>"},
   {t:"concept",l:"Por que importa",h:"<p>Programas reais lidam com o inesperado: arquivo que falta, internet que cai, usuário que digita texto onde devia ser número. Tratar a exceção evita que tudo trave.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Quando uma operação pode falhar por algo fora do seu controle. Não use exceção para o fluxo normal do programa.</p>"},
   {t:"concept",l:"Como funciona",h:"<p><code>try</code> tenta o código. <code>except</code> captura o erro. <code>else</code> roda se deu tudo certo. <code>finally</code> roda sempre (deu certo ou não). <code>raise</code> levanta um erro de propósito.</p>"},
   {t:"code",h:"<span class='cm'># Exemplo concreto</span>\n<span class='kw'>try</span>:\n    idade = int(input(<span class='st'>\"Idade: \"</span>))\n<span class='kw'>except</span> ValueError:\n    print(<span class='st'>\"Digite um número válido\"</span>)\n<span class='kw'>else</span>:\n    print(<span class='st'>f\"Você tem {idade} anos\"</span>)\n<span class='kw'>finally</span>:\n    print(<span class='st'>\"fim\"</span>)"},
   {t:"table",h:"<table class='cmd'><tr><th>Exceção comum</th><th>Quando ocorre</th></tr><tr><td>ValueError</td><td>Valor de tipo certo, mas inválido. int('abc').</td></tr><tr><td>TypeError</td><td>Operação entre tipos incompatíveis. 'a' + 1.</td></tr><tr><td>KeyError</td><td>Chave que não existe no dict.</td></tr><tr><td>IndexError</td><td>Índice fora da lista.</td></tr><tr><td>FileNotFoundError</td><td>Arquivo não encontrado.</td></tr><tr><td>ZeroDivisionError</td><td>Divisão por zero.</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Capturar tudo com <code>except Exception</code> (ou pior, <code>except:</code> vazio): isso esconde bugs de verdade. Usar exceção para controlar o fluxo normal em vez de um if.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Capture a exceção <strong>específica</strong> que você espera (ValueError, FileNotFoundError). Dê uma mensagem clara. Nunca silencie um erro sem motivo. Use <code>raise</code> com uma mensagem quando quiser sinalizar um problema.</p>"},
   {t:"plain",h:"<p><strong>Exercícios graduais</strong></p><ul><li><strong>Básico:</strong> proteja uma divisão de ZeroDivisionError.</li><li><strong>Intermediário:</strong> peça um número e repita até o usuário digitar algo válido (try dentro de um while).</li><li><strong>Avançado:</strong> crie uma função que levanta (raise) ValueError se a idade for negativa.</li></ul>"},
   {t:"code",h:"<span class='cm'># Soluções</span>\n<span class='kw'>try</span>:\n    print(10 / 0)\n<span class='kw'>except</span> ZeroDivisionError:\n    print(<span class='st'>\"não dá para dividir por zero\"</span>)\n\n<span class='kw'>def</span> validar(idade):\n    <span class='kw'>if</span> idade &lt; 0:\n        <span class='kw'>raise</span> ValueError(<span class='st'>\"idade não pode ser negativa\"</span>)\n    <span class='kw'>return</span> idade"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>Exceção = erro em tempo de execução. try tenta, except captura, else roda se deu certo, finally sempre roda. raise levanta o erro. Capture o tipo específico.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p><strong>O que cai:</strong> o papel de try/except/else/finally; por que evitar except genérico; quando usar raise. <strong>Pergunta de recrutador:</strong> \"O que acontece no finally se houver um return no try?\" Resposta: o finally roda mesmo assim, antes de a função retornar.</p>"},
   {t:"plain",h:"<p><strong>Mapa mental</strong></p><ul><li>Exceções<ul><li>try: tenta</li><li>except: captura (específico)</li><li>else: se deu certo</li><li>finally: sempre</li><li>raise: levanta</li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><strong>Mini-projeto:</strong> peça dois números e mostre a divisão, tratando divisão por zero e entrada inválida. <strong>Conecta com o próximo:</strong> uma das fontes mais comuns de erro é ler arquivos; isso se faz com a instrução with, o próximo tema.</p>"}
  ],
  cards:[["Para que serve o bloco finally?","Para rodar um código sempre, tenha dado erro ou não (ex.: fechar um arquivo)."],
         ["Por que evitar except Exception genérico?","Porque ele captura qualquer erro, escondendo bugs reais. Capture o tipo específico esperado."],
         ["O que faz raise?","Levanta uma exceção de propósito, para sinalizar um problema (ex.: raise ValueError('...'))."],
         ["Qual exceção ocorre em int('abc')?","ValueError: o tipo é certo (texto), mas o valor não dá para converter."]] }
,
{ id:"py-arquivos", num:"08", cat:"Entrada e saída", title:"Arquivos e o comando with", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 02 (tipos), 05 (funções) e 07 (exceções).</p>"},
   {t:"concept",l:"O que é",h:"<p>Ler e escrever arquivos é pedir ao sistema operacional para abrir um arquivo, trabalhar com o conteúdo e depois fechar.</p><p>O comando <b>with</b> abre o arquivo e garante que ele será fechado sozinho ao final, mesmo se ocorrer um erro no meio.</p>"},
   {t:"concept",l:"Por que é importante",h:"<p>Arquivo aberto e não fechado consome recursos e pode corromper dados. Em Dados, quase todo trabalho começa lendo um arquivo (CSV, TXT, JSON) e termina gravando um resultado.</p><p>O <b>with</b> remove a parte mais fácil de esquecer: o fechamento.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Sempre que abrir um arquivo. A forma recomendada na documentação oficial é abrir com <b>with</b>, ler ou escrever dentro do bloco, e deixar o fechamento por conta dele.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>A função <b>open(caminho, modo)</b> devolve um objeto de arquivo. O <b>modo</b> diz a intenção: <code>r</code> ler, <code>w</code> escrever (apaga o que existia), <code>a</code> acrescentar ao final.</p><p>Acrescente <code>encoding='utf-8'</code> para acentos funcionarem em qualquer sistema.</p>"},
   {t:"code",h:"<span class='cm'># Escrever um arquivo de texto</span>\nwith open('notas.txt', 'w', encoding='utf-8') as f:\n    f.write('linha 1\\n')\n    f.write('linha 2\\n')\n\n<span class='cm'># Ler de volta, linha por linha</span>\nwith open('notas.txt', 'r', encoding='utf-8') as f:\n    for linha in f:\n        print(linha.strip())"},
   {t:"table",h:"<table class='cmd'><tr><th>Modo</th><th>O que faz</th></tr><tr><td>r</td><td>Lê. Dá erro se o arquivo não existe.</td></tr><tr><td>w</td><td>Escreve do zero. Apaga o conteúdo anterior.</td></tr><tr><td>a</td><td>Acrescenta no final. Mantém o que já existia.</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Abrir no modo <code>w</code> achando que vai só ler: apaga o arquivo inteiro.</p><p>Esquecer <code>encoding='utf-8'</code> e ver acentos quebrados.</p><p>Abrir sem <b>with</b> e esquecer de chamar <code>f.close()</code>.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Use sempre <b>with</b>. Use <code>encoding='utf-8'</code> de forma explícita. Para vários arquivos de dados reais, prefira bibliotecas próprias (como pandas, no tema 10) em vez de tratar texto na mão.</p>"},
   {t:"plain",l:"Exercícios graduais",h:"<p><b>1.</b> Crie um arquivo com três linhas e leia de volta mostrando cada uma.</p><p><b>2.</b> Abra um arquivo no modo <code>a</code> e acrescente uma linha sem apagar as anteriores.</p><p><b>3.</b> Leia um arquivo que pode não existir, tratando o erro com try/except para mostrar uma mensagem amigável.</p>"},
   {t:"code",l:"Soluções",h:"<span class='cm'># 1</span>\nwith open('x.txt','w',encoding='utf-8') as f:\n    f.write('a\\nb\\nc\\n')\nwith open('x.txt','r',encoding='utf-8') as f:\n    for l in f: print(l.strip())\n\n<span class='cm'># 2</span>\nwith open('x.txt','a',encoding='utf-8') as f:\n    f.write('d\\n')\n\n<span class='cm'># 3</span>\ntry:\n    with open('nao_existe.txt','r',encoding='utf-8') as f:\n        print(f.read())\nexcept FileNotFoundError:\n    print('Arquivo não encontrado.')"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>open abre, with fecha sozinho. Modo r lê, w apaga e escreve, a acrescenta. encoding='utf-8' para acentos. Erro de arquivo é FileNotFoundError.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p>Pergunta clássica: por que usar with? Resposta: garante o fechamento do arquivo mesmo com erro, evitando vazamento de recursos.</p>"},
   {t:"plain",l:"Mapa mental",h:"<ul><li>Arquivos<ul><li>open(caminho, modo, encoding)</li><li>with → fecha sozinho</li><li>Modos<ul><li>r ler</li><li>w escrever do zero</li><li>a acrescentar</li></ul></li><li>Erro: FileNotFoundError</li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><b>Mini-projeto:</b> grave em um arquivo o resultado de um cálculo feito por uma função do tema 05, depois leia e imprima.</p><p><b>Conexão:</b> ler arquivos é a porta de entrada para Dados. No tema 10, o pandas faz isso de forma direta com read_csv, e no SQL você fará o equivalente lendo tabelas.</p>"}
  ],
  cards:[
    ["Qual a vantagem do with?","Fecha o arquivo automaticamente, mesmo se houver erro."],
    ["O modo 'w' faz o quê com o conteúdo antigo?","Apaga tudo e escreve do zero."],
    ["Como evitar acentos quebrados?","Use encoding='utf-8' no open."],
    ["Qual erro ocorre ao ler um arquivo inexistente?","FileNotFoundError."]] },
{ id:"py-oop", num:"09", cat:"Organização", title:"Orientação a objetos (classes)", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 02 (tipos), 03 (estruturas) e 05 (funções).</p>"},
   {t:"concept",l:"O que é",h:"<p>Orientação a objetos (OOP, do inglês Object-Oriented Programming, programação orientada a objetos) é uma forma de organizar código juntando dados e as ações sobre esses dados em uma mesma estrutura, chamada <b>classe</b>.</p><p>A <b>classe</b> é a planta. O <b>objeto</b> é a casa construída a partir da planta.</p>"},
   {t:"concept",l:"Por que é importante",h:"<p>Conforme o programa cresce, espalhar variáveis soltas vira bagunça. Agrupar dados e comportamento em classes deixa o código mais previsível, fácil de manter e de reaproveitar.</p><p>Muitas bibliotecas que você vai usar (incluindo pandas) são feitas de objetos.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Quando há um conceito do mundo real com características (dados) e ações (funções) que andam juntas: um Cliente, uma Conta, um Relatório. Para scripts pequenos e diretos, funções soltas já bastam.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>Defina a classe com <b>class</b>. O método especial <b>__init__</b> roda na criação do objeto e guarda os dados em <b>self</b> (o próprio objeto). Os demais métodos são funções que agem sobre esse self.</p>"},
   {t:"code",h:"<span class='cm'># Uma classe simples: Conta</span>\nclass Conta:\n    def __init__(self, dono, saldo=0):\n        self.dono = dono\n        self.saldo = saldo\n\n    def depositar(self, valor):\n        self.saldo = self.saldo + valor\n\n    def extrato(self):\n        return f'{self.dono}: R$ {self.saldo}'\n\nc = Conta('Diego', 100)\nc.depositar(50)\nprint(c.extrato())  <span class='cm'># Diego: R$ 150</span>"},
   {t:"table",h:"<table class='cmd'><tr><th>Termo</th><th>O que significa</th></tr><tr><td>class</td><td>A planta que define o tipo.</td></tr><tr><td>objeto</td><td>Uma instância criada a partir da classe.</td></tr><tr><td>__init__</td><td>Roda ao criar o objeto, guarda os dados iniciais.</td></tr><tr><td>self</td><td>Referência ao próprio objeto dentro da classe.</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Esquecer o <b>self</b> como primeiro parâmetro dos métodos.</p><p>Acessar um atributo sem ter criado ele no __init__.</p><p>Confundir a classe (a planta) com o objeto (a instância concreta).</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Nomes de classe em CamelCase (Conta, ContaCorrente). Uma classe deve ter uma responsabilidade clara. Não crie classe para tudo: se uma função resolve, use a função.</p>"},
   {t:"plain",l:"Exercícios graduais",h:"<p><b>1.</b> Crie uma classe Produto com nome e preço, e um método que aplica desconto.</p><p><b>2.</b> Adicione um método que devolve o preço formatado como texto.</p><p><b>3.</b> Crie dois objetos Produto diferentes e mostre que cada um guarda seus próprios dados.</p>"},
   {t:"code",l:"Soluções",h:"class Produto:\n    def __init__(self, nome, preco):\n        self.nome = nome\n        self.preco = preco\n    def aplicar_desconto(self, pct):\n        self.preco = self.preco * (1 - pct/100)\n    def etiqueta(self):\n        return f'{self.nome}: R$ {self.preco:.2f}'\n\na = Produto('Caneta', 5.0)\nb = Produto('Caderno', 20.0)\na.aplicar_desconto(10)\nprint(a.etiqueta())  <span class='cm'># Caneta: R$ 4.50</span>\nprint(b.etiqueta())  <span class='cm'># Caderno: R$ 20.00</span>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>class define o tipo, objeto é a instância. __init__ guarda dados em self. Métodos são funções que recebem self. CamelCase nos nomes de classe.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p>Qual a diferença entre classe e objeto? Classe é a planta, objeto é a construção concreta. Para que serve self? Referenciar o próprio objeto e seus dados dentro dos métodos.</p>"},
   {t:"plain",l:"Mapa mental",h:"<ul><li>OOP<ul><li>class → a planta</li><li>objeto → instância concreta</li><li>__init__ → guarda dados em self</li><li>métodos → ações sobre self</li><li>nome em CamelCase</li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><b>Mini-projeto:</b> modele uma classe Aluno com nome e uma lista de notas, com métodos para adicionar nota e calcular a média.</p><p><b>Conexão:</b> no tema 10, um DataFrame do pandas é um objeto; chamar df.head() é chamar um método dele. Entender objeto e método torna o pandas natural.</p>"}
  ],
  cards:[
    ["O que é uma classe?","A planta que define um tipo, juntando dados e ações."],
    ["O que é um objeto?","Uma instância concreta criada a partir de uma classe."],
    ["Para que serve __init__?","Roda na criação do objeto e guarda os dados iniciais em self."],
    ["O que é self?","A referência ao próprio objeto dentro dos métodos da classe."]] },
{ id:"py-pandas", num:"10", cat:"Ponte para Dados", title:"Introdução ao pandas", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 03 (estruturas), 06 (módulos e import) e 09 (objetos e métodos).</p>"},
   {t:"concept",l:"O que é",h:"<p>pandas é uma biblioteca externa para trabalhar com dados em tabela. Sua estrutura principal é o <b>DataFrame</b>: uma tabela com linhas e colunas, parecida com uma planilha ou com uma tabela de banco de dados.</p>"},
   {t:"concept",l:"Por que é importante",h:"<p>É a ferramenta central do trabalho com Dados em Python. Ler arquivos, filtrar, agrupar e resumir, que no SQL você faz com comandos, no pandas você faz com métodos de um objeto DataFrame.</p><p>Para a sua transição para Dados, pandas é a ponte direta entre Python e a prática diária.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Sempre que os dados couberem em uma tabela e você precisar limpar, transformar ou resumir. Para bases muito grandes que vivem em banco, o SQL faz o trabalho pesado; o pandas costuma entrar depois, na análise.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>Importa-se com o apelido padrão <b>pd</b>. Lê-se um arquivo com <b>read_csv</b>, que devolve um DataFrame. A partir dele, métodos respondem perguntas: <code>head</code> mostra as primeiras linhas, colchetes filtram, <code>groupby</code> agrupa.</p>"},
   {t:"code",h:"import pandas as pd\n\n<span class='cm'># Lê um CSV e vira um DataFrame (tabela)</span>\ndf = pd.read_csv('vendas.csv')\n\n<span class='cm'># Primeiras linhas</span>\nprint(df.head())\n\n<span class='cm'># Filtra: vendas acima de 100</span>\naltas = df[df['valor'] > 100]\n\n<span class='cm'># Agrupa por cliente e soma o valor</span>\nresumo = df.groupby('cliente')['valor'].sum()"},
   {t:"table",h:"<table class='cmd'><tr><th>Ação (pandas)</th><th>Equivalente em SQL</th></tr><tr><td>df[df['x'] &gt; 100]</td><td>WHERE x &gt; 100</td></tr><tr><td>df.groupby('c')['v'].sum()</td><td>GROUP BY c com SUM(v)</td></tr><tr><td>df.sort_values('v')</td><td>ORDER BY v</td></tr><tr><td>df.head(5)</td><td>LIMIT 5</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Esquecer de instalar a biblioteca (pip install pandas) antes de importar.</p><p>Errar o nome da coluna entre aspas (diferencia maiúscula de minúscula).</p><p>Achar que filtrar cria uma cópia automática segura: para alterar com segurança, trabalhe sobre o resultado do filtro.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Use o apelido padrão <code>pd</code>. Olhe sempre df.head() e df.info() antes de analisar. Pense em paralelo com SQL: a mesma lógica de filtrar, agrupar e ordenar vale nos dois mundos.</p>"},
   {t:"plain",l:"Exercícios graduais",h:"<p><b>1.</b> Importe o pandas e crie um DataFrame a partir de um dicionário com colunas nome e nota.</p><p><b>2.</b> Filtre apenas as linhas com nota maior ou igual a 7.</p><p><b>3.</b> Agrupe por uma coluna de turma e calcule a média das notas.</p>"},
   {t:"code",l:"Soluções",h:"import pandas as pd\n\n<span class='cm'># 1</span>\ndf = pd.DataFrame({'nome':['Ana','Bia','Caio'],\n                   'turma':['A','A','B'],\n                   'nota':[8, 6, 9]})\n\n<span class='cm'># 2</span>\naprovados = df[df['nota'] >= 7]\n\n<span class='cm'># 3</span>\nmedia_turma = df.groupby('turma')['nota'].mean()\nprint(media_turma)"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>pandas trabalha com DataFrame (tabela). Importa como pd. read_csv lê arquivo. Filtrar, agrupar e ordenar no pandas espelham WHERE, GROUP BY e ORDER BY do SQL.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p>O que é um DataFrame? Uma tabela com linhas e colunas. Como filtrar linhas? Com uma condição entre colchetes. Saber traduzir SQL para pandas mostra maturidade em Dados.</p>"},
   {t:"plain",l:"Mapa mental",h:"<ul><li>pandas<ul><li>import pandas as pd</li><li>DataFrame → tabela</li><li>read_csv → ler arquivo</li><li>Operações<ul><li>filtrar (como WHERE)</li><li>groupby (como GROUP BY)</li><li>sort_values (como ORDER BY)</li></ul></li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><b>Mini-projeto:</b> leia um CSV de vendas, filtre um período, agrupe por produto e salve o resumo em um novo arquivo com to_csv.</p><p><b>Conexão:</b> este tema fecha a ponte Python → Dados. A partir daqui, o caderno de SQL aprofunda o mesmo raciocínio no banco, e o de Power BI leva o resultado para o visual.</p>"}
  ],
  cards:[
    ["O que é um DataFrame?","Uma tabela com linhas e colunas, base do trabalho no pandas."],
    ["Como se importa o pandas?","import pandas as pd."],
    ["Qual método lê um CSV?","pd.read_csv('arquivo.csv')."],
    ["groupby equivale a qual comando SQL?","GROUP BY."]] }
];

{ id:"ref-viz", num:"03", cat:"Guia de Referência", title:"Visualização de dados", date:DATE1,
  blocks:[
   {t:"concept",l:"Para que serve",h:"<p>São as bibliotecas que transformam tabelas em gráficos, para comunicar resultados de forma visual.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Biblioteca</th><th>Para que serve</th></tr><tr><td>Matplotlib</td><td>Base de gráficos em Python. Controle total, mais manual.</td></tr><tr><td>Seaborn</td><td>Gráficos estatísticos bonitos com pouco código. Usa o Matplotlib por baixo.</td></tr><tr><td>Plotly</td><td>Gráficos interativos, com zoom e dicas ao passar o mouse.</td></tr></table>"},
   {t:"concept",l:"Quando usar qual",h:"<p>Para um gráfico rápido durante a análise, Seaborn entrega bom resultado com pouco esforço. Quando precisa de controle fino de cada detalhe, vá para o Matplotlib. Quando o gráfico será explorado pelo usuário (web, dashboard), use o Plotly.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Comece pelo Seaborn para velocidade. Escolha o tipo de gráfico pela pergunta, não pela estética. Mantenha rótulos claros e evite excesso de cores, em linha com o caderno de Visualização.</p>"},
   {t:"plain",l:"Documentação oficial",h:"<ul><li>Matplotlib: <a href='https://matplotlib.org/stable/' target='_blank'>matplotlib.org/stable</a></li><li>Seaborn: <a href='https://seaborn.pydata.org/' target='_blank'>seaborn.pydata.org</a></li><li>Plotly: <a href='https://plotly.com/python/' target='_blank'>plotly.com/python</a></li></ul>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>Matplotlib é a base (controle). Seaborn é rápido (estatístico). Plotly é interativo. Escolha o gráfico pela pergunta.</p>"}

{ id:"ref-sql", num:"04", cat:"Guia de Referência", title:"SQL e MySQL", date:DATE1,
  blocks:[
   {t:"concept",l:"Para que serve",h:"<p>São o banco de dados e as ferramentas para consultar, administrar e conectar o SQL ao restante do trabalho.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Ferramenta</th><th>Para que serve</th></tr><tr><td>MySQL</td><td>O banco de dados (SGBD) onde os dados ficam.</td></tr><tr><td>MySQL Workbench</td><td>Cliente visual oficial para escrever e rodar consultas.</td></tr><tr><td>DBeaver</td><td>Cliente que conecta a vários bancos diferentes.</td></tr><tr><td>SQLAlchemy</td><td>Liga o Python ao banco para trazer dados ao pandas.</td></tr></table>"},
   {t:"concept",l:"Quando usar qual",h:"<p>SGBD significa Sistema de Gerenciamento de Banco de Dados: o programa que guarda e organiza os dados. O MySQL é o SGBD. Para escrever consultas no dia a dia, use um cliente como o Workbench ou o DBeaver.</p><p>Quando quiser analisar no Python, o SQLAlchemy traz o resultado do banco para um DataFrame.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Use a documentação oficial do MySQL como referência principal. Teste consultas no cliente antes de levar para o código. Lembre dos índices e do EXPLAIN (temas 25 e 28) ao buscar desempenho.</p>"},
   {t:"plain",l:"Documentação oficial",h:"<ul><li>MySQL: <a href='https://dev.mysql.com/doc/' target='_blank'>dev.mysql.com/doc</a></li><li>DBeaver: <a href='https://dbeaver.com/docs/' target='_blank'>dbeaver.com/docs</a></li><li>SQLAlchemy: <a href='https://docs.sqlalchemy.org/' target='_blank'>docs.sqlalchemy.org</a></li></ul>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>MySQL é o banco (SGBD). Workbench e DBeaver são clientes para consultar. SQLAlchemy conecta ao Python. Doc oficial é a referência.</p>"}
  ],
  cards:[
    ["O que é um SGBD?","Sistema de Gerenciamento de Banco de Dados; o MySQL é um deles."],
    ["Para que serve o MySQL Workbench?","É o cliente visual para escrever e rodar consultas."],
    ["O que liga o Python ao banco SQL?","SQLAlchemy."]] },
{ id:"ref-bi", num:"05", cat:"Guia de Referência", title:"Power BI", date:DATE1,
  blocks:[
   {t:"concept",l:"Para que serve",h:"<p>São as partes do Power BI que você combina para transformar dados em painéis (dashboards) interativos.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Recurso</th><th>Para que serve</th></tr><tr><td>Power BI Desktop</td><td>Programa onde você cria os relatórios.</td></tr><tr><td>Power Query</td><td>Limpa e transforma os dados antes da análise (etapa de ETL).</td></tr><tr><td>DAX</td><td>Linguagem de cálculo para medidas e colunas.</td></tr><tr><td>Power BI Service</td><td>Nuvem para publicar e compartilhar os painéis.</td></tr></table>"},
   {t:"concept",l:"Quando usar qual",h:"<p>ETL significa Extrair, Transformar e Carregar (em inglês Extract, Transform, Load): preparar o dado bruto. Isso é feito no Power Query. Os cálculos (total, média, percentual) vêm com o DAX, sigla de Data Analysis Expressions (Expressões de Análise de Dados).</p><p>Cria-se no Desktop e publica-se no Service.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Trate os dados no Power Query, não na mão. Escreva medidas DAX claras e nomeadas. Use a documentação oficial da Microsoft em português como referência. Conecte com o caderno de Visualização para escolher bem os gráficos.</p>"},
   {t:"plain",l:"Documentação oficial",h:"<ul><li>Power BI: <a href='https://learn.microsoft.com/pt-br/power-bi/' target='_blank'>learn.microsoft.com/pt-br/power-bi</a></li><li>DAX: <a href='https://learn.microsoft.com/pt-br/dax/' target='_blank'>learn.microsoft.com/pt-br/dax</a></li></ul>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>Desktop cria, Power Query limpa (ETL), DAX calcula, Service publica. Doc oficial da Microsoft em português é a referência.</p>"}
  ],
  cards:[
    ["O que significa ETL?","Extrair, Transformar e Carregar: preparar o dado bruto."],
    ["O que é DAX?","Data Analysis Expressions: a linguagem de cálculo do Power BI."],
    ["Onde se limpa o dado no Power BI?","No Power Query."]] },
{ id:"ref-ia", num:"06", cat:"Guia de Referência", title:"IA e Machine Learning", date:DATE1,
  blocks:[
   {t:"concept",l:"Para que serve",h:"<p>São as bibliotecas para criar modelos que aprendem com dados, do aprendizado de máquina clássico aos modelos de linguagem atuais.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Biblioteca</th><th>Para que serve</th></tr><tr><td>scikit-learn</td><td>Machine Learning clássico: classificação, regressão, agrupamento.</td></tr><tr><td>PyTorch</td><td>Deep Learning (redes neurais), pesquisa e produção.</td></tr><tr><td>TensorFlow</td><td>Deep Learning, alternativa ao PyTorch.</td></tr><tr><td>Hugging Face</td><td>Modelos prontos de linguagem e visão para reaproveitar.</td></tr></table>"},
   {t:"concept",l:"Quando usar qual",h:"<p>Machine Learning (aprendizado de máquina) é ensinar o computador a achar padrões em dados. Para a maioria dos problemas tabulares, comece pelo scikit-learn. Deep Learning (aprendizado profundo) usa redes neurais e entra em imagem, texto e voz, com PyTorch ou TensorFlow.</p><p>Para usar modelos de linguagem já treinados, o Hugging Face poupa muito trabalho.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Domine o scikit-learn antes do Deep Learning: a base estatística vem primeiro. Separe sempre dados de treino e de teste. Só vá para redes neurais quando o problema realmente pedir.</p>"},
   {t:"plain",l:"Documentação oficial",h:"<ul><li>scikit-learn: <a href='https://scikit-learn.org/stable/' target='_blank'>scikit-learn.org/stable</a></li><li>PyTorch: <a href='https://pytorch.org/docs/' target='_blank'>pytorch.org/docs</a></li><li>Hugging Face: <a href='https://huggingface.co/docs' target='_blank'>huggingface.co/docs</a></li></ul>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>scikit-learn para ML clássico (começo). PyTorch e TensorFlow para Deep Learning. Hugging Face para modelos prontos. Base estatística primeiro.</p>"}

   {t:"tip",l:"O que foi usado neste projeto",h:"<p>O aplicativo é um arquivo único feito com as tecnologias base da web: HTML (estrutura), CSS (visual) e JavaScript (interação), sem depender de frameworks externos.</p><p>No modo Praticar, o app roda um banco SQLite dentro do navegador por meio do sql.js, que traduz o SQLite para rodar em JavaScript. Assim a validação das consultas funciona sem internet.</p><p>Para abrir no celular como aplicativo, usa-se um manifesto PWA (Progressive Web App, aplicativo web instalável). O código fica no GitHub (da Microsoft) e a publicação é feita pela Vercel.</p>"},
