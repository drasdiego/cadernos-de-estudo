<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cadernos de Estudo</title>
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cadernos">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --bg:#f1f5f9; --panel:#ffffff; --panel2:#f8fafc; --ink:#0f172a; --ink2:#334155; --muted:#64748b;
    --line:#e2e8f0; --brand:#2563eb; --brand-d:#1e3a8a;
    --c-concept:#2563eb; --c-concept-bg:#eff6ff;
    --c-attr:#d97706; --c-attr-bg:#fffbeb; --c-attr-ink:#b45309;
    --c-tip:#7c3aed; --c-tip-bg:#f5f3ff; --c-tip-ink:#6d28d9;
    --c-recap:#16a34a; --c-recap-bg:#f0fdf4; --c-recap-ink:#15803d;
    --c-map:#0d9488; --c-map-bg:#f0fdfa; --c-map-ink:#0f766e;
    --c-code:#38bdf8; --shadow:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.06);
    --radius:14px;
  }
  [data-theme="dark"]{
    --bg:#0b1120; --panel:#111a2e; --panel2:#0f172a; --ink:#e8eefc; --ink2:#c2cde0; --muted:#8595b0;
    --line:#23314f; --c-concept-bg:#10213f; --c-attr-bg:#2a210f; --c-tip-bg:#1d1633; --c-recap-bg:#0f2418; --c-map-bg:#0c2420;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:'Inter','Lato','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink);
    font-size:15px;line-height:1.55;display:flex;flex-direction:column;height:100vh;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  code{font-family:'SF Mono','JetBrains Mono',ui-monospace,monospace;background:rgba(100,116,139,.16);
    color:inherit;padding:1px 6px;border-radius:5px;font-size:.86em}
  strong{color:var(--ink)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  .topbar{display:flex;align-items:center;gap:16px;padding:12px 22px;background:var(--panel);
    border-bottom:1px solid var(--line);flex:none;z-index:10}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(150deg,#0f172a,#2563eb);
    color:#fff;font-weight:800;font-size:15px;display:grid;place-items:center;letter-spacing:.5px;
    box-shadow:0 4px 12px rgba(37,99,235,.35)}
  .brand h1{font-size:15px;margin:0;font-weight:800;letter-spacing:-.2px}
  .brand p{font-size:11.5px;margin:0;color:var(--muted)}
  .modes{display:flex;gap:4px;background:var(--panel2);padding:4px;border-radius:11px;border:1px solid var(--line)}
  .modes button{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted)}
  .modes button.on{background:var(--panel);color:var(--brand);box-shadow:var(--shadow)}
  .icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);
    display:grid;place-items:center;font-size:16px}

  .stage{flex:1;display:flex;overflow:hidden}
  .sidebar{width:288px;flex:none;background:var(--panel);border-right:1px solid var(--line);
    overflow-y:auto;padding:16px 12px 40px}
  .progress-card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:16px}
  .progress-card .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  .progress-card b{font-size:13px}
  .progress-card .pct{font-size:20px;font-weight:800;color:var(--brand)}
  .bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,#2563eb,#0d9488);border-radius:99px;transition:width .4s}
  .cat-label{font-size:10.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);
    padding:14px 10px 6px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;width:100%;text-align:left;
    font-size:13.5px;color:var(--ink2);margin-bottom:2px}
  .nav-item:hover{background:var(--panel2)}
  .nav-item.on{background:var(--c-concept-bg);color:var(--brand);font-weight:600}
  .nav-item .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);flex:none;display:grid;place-items:center;font-size:11px}
  .nav-item.done .dot{background:var(--c-recap);border-color:var(--c-recap);color:#fff}
  .nav-item .nt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .content{flex:1;overflow-y:auto;padding:30px clamp(20px,5vw,60px) 80px}
  .theme-wrap{max-width:780px;margin:0 auto}
  .crumb{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px}
  .theme-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
    border-bottom:3px solid var(--brand);padding-bottom:12px;margin-bottom:6px}
  .theme-head h2{font-size:27px;margin:0;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:12px}
  .tnum{background:var(--brand);color:#fff;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:15px;flex:none}
  .when{font-size:12px;color:var(--muted);font-style:italic;white-space:nowrap;padding-top:8px}
  .th-meta{display:flex;align-items:center;gap:10px;flex:none}

  .block{border-radius:var(--radius);padding:15px 18px;margin:14px 0;border-left:5px solid;box-shadow:var(--shadow)}
  .block .label{font-size:10.5px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;display:block;margin-bottom:7px}
  .block p{margin:0 0 8px}.block p:last-child{margin-bottom:0}
  .block ul{margin:6px 0;padding-left:20px}.block li{margin-bottom:5px}
  .concept{background:var(--c-concept-bg);border-color:var(--c-concept)}.concept .label{color:var(--c-concept)}
  .attr{background:var(--c-attr-bg);border-color:var(--c-attr)}.attr .label{color:var(--c-attr-ink)}
  .tip{background:var(--c-tip-bg);border-color:var(--c-tip)}.tip .label{color:var(--c-tip-ink)}
  .recap{background:var(--c-recap-bg);border-color:var(--c-recap)}.recap .label{color:var(--c-recap-ink)}
  .map{background:var(--c-map-bg);border:1px solid var(--c-map);border-left:5px solid var(--c-map)}.map .label{color:var(--c-map-ink)}
  .map svg{display:block;width:100%;height:auto;margin-top:4px}
  h3.sub{font-size:16px;color:var(--brand-d);margin:22px 0 2px}
  [data-theme="dark"] h3.sub{color:#93c5fd}

  .code{background:#0f172a;border-radius:var(--radius);padding:8px 0 4px;margin:14px 0;border-left:5px solid var(--c-code);box-shadow:var(--shadow)}
  .code .label{color:var(--c-code);padding:8px 18px 4px;display:flex;justify-content:space-between;align-items:center}
  .code pre{margin:0;padding:6px 18px 12px;font-family:'SF Mono','JetBrains Mono',ui-monospace,monospace;
    font-size:13px;line-height:1.55;color:#e2e8f0;white-space:pre-wrap;overflow-x:auto}
  .copy{font-size:10.5px;font-weight:700;color:#94a3b8;background:rgba(148,163,184,.15);padding:4px 9px;border-radius:6px;letter-spacing:.3px}
  .copy:hover{color:#fff}
  .kw{color:#f472b6;font-weight:700}.ty{color:#38bdf8}.st{color:#86efac}.cm{color:#64748b;font-style:italic}.fn{color:#fbbf24}

  table.cmd{width:100%;table-layout:fixed;border-collapse:collapse;margin:12px 0;border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
  table.cmd th,table.cmd td{width:auto!important;word-break:break-word}
  table.cmd th{background:var(--brand-d);color:#fff;text-align:left;padding:9px 13px;font-size:13px}
  table.cmd td{border-bottom:1px solid var(--line);padding:9px 13px;font-size:13.5px;background:var(--panel);vertical-align:top}
  table.cmd td:first-child{font-family:'SF Mono',monospace;font-weight:700;color:var(--brand-d)}
  [data-theme="dark"] table.cmd td:first-child{color:#7dd3fc}

  .theme-foot{display:flex;align-items:center;justify-content:space-between;margin-top:30px;gap:12px;flex-wrap:wrap}
  .btn{padding:11px 18px;border-radius:11px;font-size:14px;font-weight:700;border:1px solid var(--line);background:var(--panel)}
  .btn:hover{border-color:var(--brand)}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
  .btn.done{background:var(--c-recap);color:#fff;border-color:var(--c-recap)}
  .navbtns{display:flex;gap:8px}

  .center-wrap{max-width:680px;margin:0 auto;text-align:center}
  .fc-counter{color:var(--muted);font-size:13px;font-weight:600;margin:6px 0 16px}
  .card{perspective:1600px;height:340px;margin:0 auto;max-width:560px}
  .card-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
  .card.flip .card-inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:34px;box-shadow:var(--shadow);border:1px solid var(--line)}
  .face .tag{font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;position:absolute;top:20px}
  .front{background:var(--panel)}
  .front .tag{color:var(--brand)}
  .front .q{font-size:22px;font-weight:700;line-height:1.35}
  .back{background:linear-gradient(160deg,#0f172a,#1e3a8a);color:#fff;transform:rotateY(180deg)}
  .back .tag{color:#93c5fd}
  .back .a{font-size:17px;line-height:1.5}
  .hint{color:var(--muted);font-size:12.5px;margin-top:14px}
  .fc-controls{display:flex;gap:10px;justify-content:center;margin-top:22px}

  .quiz-q{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:var(--shadow);text-align:left}
  .quiz-q .qn{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--brand);margin-bottom:10px}
  .quiz-q h3{font-size:19px;margin:0 0 18px;line-height:1.4}
  .opt{display:block;width:100%;text-align:left;padding:13px 16px;border:1.5px solid var(--line);border-radius:11px;
    margin-bottom:10px;font-size:14.5px;background:var(--panel2);transition:.15s}
  .opt:hover{border-color:var(--brand)}
  .opt.correct{border-color:var(--c-recap);background:var(--c-recap-bg);color:var(--c-recap-ink);font-weight:600}
  .opt.wrong{border-color:#dc2626;background:#fef2f2;color:#b91c1c}
  [data-theme="dark"] .opt.wrong{background:#2a1414}
  .explain{margin-top:6px;padding:13px 16px;border-radius:11px;background:var(--c-tip-bg);border-left:4px solid var(--c-tip);
    font-size:13.5px;color:var(--ink2)}
  .result{text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:40px;box-shadow:var(--shadow)}
  .result .score{font-size:54px;font-weight:800;color:var(--brand);line-height:1}
  .result p{color:var(--muted)}
  .loading{padding:44px;text-align:center;color:var(--muted);font-size:15px}
  .ex-input{width:100%;min-height:72px;font-family:'SF Mono','JetBrains Mono',ui-monospace,monospace;font-size:13.5px;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;background:var(--panel2);color:var(--ink);resize:vertical;outline:none;line-height:1.5}
  .ex-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
  .exercise{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin:12px 0;box-shadow:var(--shadow)}
  .ex-q{font-size:14.5px;font-weight:600;margin-bottom:10px;display:flex;gap:10px;align-items:baseline}
  .ex-n{background:var(--brand);color:#fff;min-width:24px;height:24px;border-radius:7px;display:inline-grid;place-items:center;font-size:12px;flex:none}
  .ex-actions{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .ex-badge{font-size:12.5px;font-weight:700}
  .ex-badge.ok{color:var(--c-recap-ink)}.ex-badge.no{color:#b91c1c}.ex-badge.err{color:var(--c-attr-ink)}
  .ex-out{margin-top:10px}
  .ex-sol{margin-top:8px;font-size:13px;color:var(--ink2);background:var(--c-tip-bg);padding:10px 12px;border-radius:9px;border-left:4px solid var(--c-tip)}
  .grid-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;margin:6px 0}
  table.grid{border-collapse:collapse;width:100%;font-size:13px}
  table.grid th{background:var(--brand-d);color:#fff;padding:7px 11px;text-align:left;font-family:'SF Mono',monospace}
  table.grid td{border-bottom:1px solid var(--line);padding:7px 11px;background:var(--panel);font-family:'SF Mono',monospace}
  table.grid td i{color:var(--muted)}
  .sql-err{background:#fef2f2;border-left:4px solid #dc2626;color:#b91c1c;padding:12px 14px;border-radius:9px;font-size:13.5px;font-family:'SF Mono',monospace}
  [data-theme="dark"] .sql-err{background:#2a1414}
  .sql-empty{color:var(--muted);font-size:13px;padding:8px 0}
  .sql-ok-msg{margin-top:8px;color:var(--c-recap-ink);font-weight:600;font-size:13.5px}
  .sql-no-msg{margin-top:8px;color:#b91c1c;font-size:13.5px}
  .subject-sel{padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);font-size:13.5px;font-weight:600;font-family:inherit;cursor:pointer;outline:none;max-width:210px}
  .subject-sel:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
  .theme-sel{display:none}
  .hidden{display:none!important}
  @media(max-width:820px){
    html,body{height:auto;overflow:visible}
    .topbar{flex-wrap:wrap;gap:8px;padding:10px 14px;position:sticky;top:0;z-index:20}
    .brand p{display:none}
    .stage{display:block;overflow:visible}
    .sidebar{display:none!important}
    .content{display:block;width:100%;height:auto;overflow:visible;padding:18px 15px 90px}
    .theme-wrap{max-width:none}
    .theme-sel{display:block;max-width:none;flex:1 1 160px}
    .subject-sel{max-width:none;flex:1 1 140px}
    .modes{flex:1 1 100%;justify-content:space-between}
    .modes button{padding:8px 10px;flex:1}
    .theme-head h2{font-size:22px}
    .card{height:300px}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="logo">SQL</div>
    <div><h1>Cadernos de Estudo</h1><p>App de estudos · offline</p></div>
  </div>
  <select id="subjectSel" class="subject-sel" title="Escolher matéria">
    <option value="sql">SQL</option>
    <option value="viz">Visualização de Dados</option>
    <option value="estatistica">Estatística</option>
    <option value="powerbi">Power BI</option>
    <option value="ia">Inteligência Artificial</option>
    <option value="python">Python</option>
  </select>
  <select id="themeSel" class="subject-sel theme-sel" title="Ir para o tema"></select>
  <div class="modes">
    <button data-mode="study" class="on">Estudar</button>
    <button data-mode="cards">Flashcards</button>
    <button data-mode="quiz">Quiz</button>
    <button data-mode="practice">Praticar</button>
  </div>
</div>

<div class="stage">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="content"></main>
</div>

<script src="sql-asm.js"></script>
<script>

const DATE1 = "26 jun 2026";

const SQL_THEMES = [
{ id:"bd", num:"01", cat:"Fundamentos", title:"O que é Banco de Dados", date:DATE1,
  blocks:[
   {t:"concept",l:"Conceito",h:"<p>Um <strong>banco de dados</strong> é uma coleção organizada de dados armazenados eletronicamente. Ele permite <strong>gerenciar, buscar e manipular</strong> informações de forma eficiente.</p>"},
   {t:"h3",h:"Tabelas: a estrutura básica"},
   {t:"plain",h:"<p>Os dados ficam em <strong>tabelas</strong>, organizadas em linhas e colunas:</p><ul><li><strong>Linha (registro):</strong> uma ocorrência completa, ex.: um cliente.</li><li><strong>Coluna (campo/atributo):</strong> uma característica, ex.: nome ou CPF.</li></ul>"},
   {t:"tip",l:"Analogia",h:"<p>Pense numa planilha do Excel: cada <strong>aba</strong> é uma tabela, cada <strong>linha</strong> é um cadastro e cada <strong>coluna</strong> uma informação. Um banco faz isso preparado para muitos dados e acessos simultâneos, com regras de integridade.</p>"},
   {t:"recap",l:"Na prática",h:"<p><strong>Em outras palavras:</strong> é onde a informação mora, organizada. <strong>O que significa:</strong> toda consulta SQL age sobre essas linhas e colunas.</p>"}
  ],
  cards:[["O que é um banco de dados?","Coleção organizada de dados armazenados eletronicamente, que permite gerenciar, buscar e manipular informações de forma eficiente."],
         ["Linha vs. coluna numa tabela","Linha = um registro (ocorrência completa). Coluna = um campo/atributo (uma característica do dado)."]] },

{ id:"sql", num:"02", cat:"Fundamentos", title:"O que é SQL", date:DATE1,
  blocks:[
   {t:"concept",l:"Conceito",h:"<p><strong>SQL</strong> (Structured Query Language) é a Linguagem Estruturada de Consulta. É o idioma para conversar com o banco: criar tabelas, inserir, alterar e consultar dados.</p>"},
   {t:"plain",h:"<ul><li>Criada no <strong>início dos anos 70</strong>, pela <strong>IBM</strong>.</li><li><strong>Altíssimo nível:</strong> próxima do inglês. <code>SELECT</code>, <code>INSERT</code>, <code>DELETE</code> já dizem o que fazem.</li><li><strong>Declarativa:</strong> você descreve o resultado que quer, não o passo a passo.</li><li>Surgiram novos <strong>dialetos</strong>, evoluindo o SQL.</li></ul>"},
   {t:"tip",l:"Declarativo vs. imperativo",h:"<p><strong>Declarativo (SQL):</strong> \"quero os clientes de SP\". O banco resolve como buscar.<br><strong>Imperativo (ex.: for em Python):</strong> você escreve cada passo. <strong>Por isso</strong> SQL é tão enxuto: você foca no \"o quê\".</p>"},
   {t:"tip",l:"O que é dialeto",h:"<p>Versão do SQL adaptada por um fabricante: <strong>MySQL, PostgreSQL, SQL Server (T-SQL), Oracle (PL/SQL)</strong>. O núcleo é o mesmo; mudam detalhes de sintaxe.</p>"}
  ],
  cards:[["Quem criou o SQL e quando?","A IBM, no início dos anos 70."],
         ["O que significa SQL ser \"declarativo\"?","Você descreve o resultado desejado, não o passo a passo. O motor do banco decide como executar."],
         ["O que é um \"dialeto\" do SQL?","Uma versão adaptada por um fabricante (MySQL, PostgreSQL, Oracle, SQL Server). Mesmo núcleo, sintaxe ligeiramente diferente."]] },

{ id:"padr", num:"03", cat:"Fundamentos", title:"Padronização", date:DATE1,
  blocks:[
   {t:"plain",h:"<p>Para o SQL funcionar de forma parecida em qualquer sistema, foi padronizado por dois órgãos:</p>"},
   {t:"table",h:"<table class='cmd'><tr><th style='width:30%'>Órgão</th><th>O que é</th><th style='width:14%'>Ano</th></tr><tr><td>ANSI</td><td>American National Standards Institute (padrões dos EUA).</td><td>1986</td></tr><tr><td>ISO</td><td>International Organization for Standardization (padrões internacionais).</td><td>1987</td></tr></table>"},
   {t:"concept",l:"Conceito",h:"<p>O SQL é usado em praticamente <strong>todos os SGBDs</strong> do mercado.</p>"},
   {t:"tip",l:"O que é SGBD",h:"<p><strong>SGBD</strong> = Sistema de Gerenciamento de Banco de Dados (DBMS). É o software que administra o banco: guarda dados, garante segurança e executa seus comandos. Ex.: MySQL, PostgreSQL, Oracle, SQL Server.</p>"},
   {t:"attr",l:"Atenção",h:"<p>Mesmo padronizado, <strong>cada fabricante tem características próprias</strong>. Um comando pode rodar no MySQL e exigir ajuste no SQL Server. Sempre confira a documentação.</p>"}
  ],
  cards:[["Quais órgãos padronizaram o SQL e quando?","ANSI em 1986 e ISO em 1987."],
         ["O que é um SGBD?","Sistema de Gerenciamento de Banco de Dados: o software que administra o banco e executa o SQL (MySQL, PostgreSQL, Oracle, SQL Server)."]] },

{ id:"sub", num:"04", cat:"Sublinguagens", title:"As 5 sublinguagens do SQL", date:DATE1,
  blocks:[
   {t:"plain",h:"<p>O SQL é formado por <strong>cinco conjuntos de comandos</strong>, cada um com uma finalidade. Essa divisão organiza toda a matéria.</p>"},
   {t:"map",l:"Mapa mental — o guarda-chuva SQL",h:SVG_SUB()},
   {t:"table",h:"<table class='cmd'><tr><th>Sigla</th><th>Nome</th><th>Para quê serve</th></tr><tr><td>DDL</td><td>Data Definition Language</td><td>Definir a estrutura (criar/alterar/excluir tabelas).</td></tr><tr><td>DML</td><td>Data Manipulation Language</td><td>Manipular dados (inserir, alterar, deletar registros).</td></tr><tr><td>DQL</td><td>Data Query Language</td><td>Consultar dados (SELECT).</td></tr><tr><td>DCL</td><td>Data Control Language</td><td>Controlar acessos e permissões.</td></tr><tr><td>DTL</td><td>Data Transaction Language</td><td>Gerenciar transações (confirmar/desfazer).</td></tr></table>"},
   {t:"recap",l:"Na prática",h:"<p>Ao ver um comando novo, pergunte: <strong>\"de qual sublinguagem ele faz parte?\"</strong>. Isso já revela o propósito.</p>"}
  ],
  cards:[["Quais são as 5 sublinguagens do SQL?","DDL (definição), DML (manipulação), DQL (consulta), DCL (controle), DTL (transação)."],
         ["Para que serve a DDL?","Definir a estrutura do banco: criar, alterar e excluir tabelas."],
         ["Para que serve a DML?","Manipular os dados: inserir, alterar e deletar registros."]] },

{ id:"ddl", num:"05", cat:"Sublinguagens", title:"DDL — Definição de Dados", date:DATE1,
  blocks:[
   {t:"concept",l:"Conceito",h:"<p>A <strong>DDL</strong> cuida da <strong>estrutura</strong> do banco (o esqueleto: tabelas e colunas), não dos dados em si.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Comando</th><th>Ação</th></tr><tr><td>CREATE</td><td>Cria uma estrutura.</td></tr><tr><td>ALTER</td><td>Altera uma estrutura existente.</td></tr><tr><td>DROP</td><td>Exclui uma estrutura.</td></tr></table>"},
   {t:"h3",h:"CREATE TABLE — criar tabela"},
   {t:"code",h:"<span class='cm'>-- Forma geral:</span>\n<span class='kw'>CREATE TABLE</span> <span class='fn'>nomeTabela</span> (campo tipo atributo, ... );\n\n<span class='cm'>-- Exemplo: tabela de clientes</span>\n<span class='kw'>CREATE TABLE</span> <span class='fn'>CLIENTE</span> (\n  <span class='fn'>codigo</span>     <span class='ty'>int</span>          <span class='kw'>NOT NULL PRIMARY KEY</span>,\n  <span class='fn'>nome</span>       <span class='ty'>varchar</span>(30)  <span class='kw'>NOT NULL</span>,\n  <span class='fn'>cpf</span>        <span class='ty'>int</span>          <span class='kw'>UNIQUE</span>,\n  <span class='fn'>uf</span>         <span class='ty'>char</span>(2)      <span class='kw'>DEFAULT</span> <span class='kw'>null</span>,\n  <span class='fn'>nascimento</span> <span class='ty'>date</span>         <span class='kw'>DEFAULT</span> <span class='st'>'0000-00-00'</span>,\n  <span class='fn'>telefone</span>   <span class='ty'>char</span>(8)      <span class='kw'>DEFAULT</span> <span class='kw'>null</span>,\n  <span class='fn'>sexo</span>       <span class='ty'>char</span>(1)\n);"},
   {t:"tip",l:"Lendo a sintaxe",h:"<p>Cada coluna segue <strong>nome · tipo · atributos</strong>. Ex.: <code>nome varchar(30) NOT NULL</code> = coluna nome, texto até 30 caracteres, não pode ficar vazia.</p>"},
   {t:"h3",h:"ALTER TABLE — alterar tabela"},
   {t:"code",h:"<span class='cm'>-- Incluir nova coluna:</span>\n<span class='kw'>ALTER TABLE</span> <span class='fn'>CLIENTE</span> <span class='kw'>ADD</span> <span class='fn'>email</span> <span class='ty'>VARCHAR</span>(20);\n<span class='kw'>ALTER TABLE</span> <span class='fn'>CLIENTE</span> <span class='kw'>ADD</span> <span class='fn'>fax</span> <span class='ty'>VARCHAR</span>(18) <span class='kw'>AFTER</span> <span class='fn'>uf</span>;\n\n<span class='cm'>-- Eliminar coluna:</span>\n<span class='kw'>ALTER TABLE</span> <span class='fn'>CLIENTE</span> <span class='kw'>DROP</span> <span class='fn'>fax</span>;\n\n<span class='cm'>-- Alterar tipo de dado:</span>\n<span class='kw'>ALTER TABLE</span> <span class='fn'>CLIENTE</span> <span class='kw'>MODIFY</span> <span class='fn'>email</span> <span class='ty'>VARCHAR</span>(40);"},
   {t:"h3",h:"DROP TABLE — excluir tabela"},
   {t:"code",h:"<span class='kw'>DROP TABLE</span> [nome da tabela];"},
   {t:"attr",l:"Atenção — DROP é destrutivo",h:"<p><strong>DROP TABLE</strong> apaga a tabela inteira com os dados, sem lixeira. <strong>ALTER...DROP coluna</strong> apaga só a coluna. Confirme o ambiente antes de rodar.</p>"}
  ],
  cards:[["Quais são os 3 comandos da DDL?","CREATE (cria), ALTER (altera), DROP (exclui)."],
         ["Como adicionar uma coluna a uma tabela existente?","ALTER TABLE nome ADD coluna TIPO; ex.: ALTER TABLE CLIENTE ADD email VARCHAR(20);"],
         ["Qual a diferença entre DROP TABLE e ALTER...DROP?","DROP TABLE apaga a tabela inteira; ALTER TABLE ... DROP coluna apaga só uma coluna."]] },

{ id:"dml", num:"06", cat:"Sublinguagens", title:"DML — Manipulação de Dados", date:DATE1,
  blocks:[
   {t:"concept",l:"Conceito",h:"<p>A <strong>DML</strong> trabalha com o <strong>conteúdo</strong> das tabelas: inserir, alterar e apagar <strong>registros</strong>. A estrutura já existe.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Comando</th><th>Ação</th></tr><tr><td>INSERT</td><td>Insere dados (novas linhas).</td></tr><tr><td>UPDATE</td><td>Altera dados existentes.</td></tr><tr><td>DELETE</td><td>Deleta dados.</td></tr></table>"},
   {t:"h3",h:"INSERT INTO"},
   {t:"code",h:"<span class='kw'>INSERT INTO</span> <span class='fn'>TABELA</span> <span class='kw'>VALUES</span> (valores);\n\n<span class='cm'>-- Exemplo:</span>\n<span class='kw'>INSERT INTO</span> <span class='fn'>TABELA</span> <span class='kw'>VALUES</span>\n(123, <span class='st'>'Allan Rocker'</span>, <span class='st'>'12345'</span>, <span class='st'>'SP'</span>,\n <span class='st'>'1234-12-12'</span>, <span class='st'>'123456'</span>, <span class='st'>'M'</span>, <span class='st'>'allan@email.com'</span>);"},
   {t:"h3",h:"UPDATE"},
   {t:"code",h:"<span class='kw'>UPDATE</span> <span class='fn'>table_name</span>\n<span class='kw'>SET</span> <span class='fn'>column1</span> = value1, <span class='fn'>column2</span> = value2, ...\n<span class='kw'>WHERE</span> condition;"},
   {t:"h3",h:"DELETE"},
   {t:"code",h:"<span class='kw'>DELETE FROM</span> <span class='fn'>table_name</span> <span class='kw'>WHERE</span> condition;"},
   {t:"attr",l:"Atenção — o perigo de esquecer o WHERE",h:"<p>Em UPDATE e DELETE, o <strong>WHERE</strong> define quais linhas são afetadas. <strong>Sem WHERE, atinge TODAS as linhas.</strong> Um <code>DELETE FROM CLIENTE;</code> apaga todos os clientes.</p>"},
   {t:"recap",l:"Na prática",h:"<p><strong>Hábito de segurança:</strong> antes de um UPDATE/DELETE, rode um <code>SELECT</code> com o mesmo <code>WHERE</code> para ver o que será afetado.</p>"}
  ],
  cards:[["Quais são os 3 comandos da DML?","INSERT (insere), UPDATE (altera), DELETE (deleta)."],
         ["Qual o risco de UPDATE/DELETE sem WHERE?","Afeta TODAS as linhas da tabela. DELETE FROM CLIENTE; apaga todos os registros."],
         ["Hábito de segurança antes de UPDATE/DELETE?","Rodar um SELECT com o mesmo WHERE para conferir quais linhas serão afetadas."]] },

{ id:"dql", num:"07", cat:"Sublinguagens", title:"DQL — Consulta de Dados", date:DATE1,
  blocks:[
   {t:"concept",l:"Conceito",h:"<p>A <strong>DQL</strong> é dedicada a <strong>consultar</strong> dados. O comando central é o <strong>SELECT</strong>, o mais usado no dia a dia de dados.</p>"},
   {t:"plain",h:"<p>O SELECT também permite:</p><ul><li><strong>Ordenação</strong> (ex.: por nome, data).</li><li><strong>Agrupamento</strong> (juntar por categoria).</li><li><strong>Funções aritméticas</strong> (somar, contar, média).</li><li><strong>Filtros</strong> de seleção.</li></ul>"},
   {t:"h3",h:"SELECT"},
   {t:"code",h:"<span class='kw'>SELECT</span> *\n<span class='kw'>FROM</span> <span class='fn'>TABELA</span>\n<span class='kw'>WHERE</span> <span class='fn'>nome</span> = <span class='st'>'Allan'</span>;"},
   {t:"tip",l:"Lendo a consulta",h:"<p><code>SELECT *</code> = todas as colunas. <code>FROM TABELA</code> = da tabela. <code>WHERE nome='Allan'</code> = só as linhas onde nome é Allan.<br><strong>Ordem real de leitura do banco:</strong> FROM → WHERE → SELECT.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Na transição para Dados, o <code>SELECT</code> será sua ferramenta mais frequente. Domine bem <code>WHERE</code>, <code>ORDER BY</code> e <code>GROUP BY</code>.</p>"}
  ],
  cards:[["Qual comando central da DQL?","SELECT — usado para consultar (retornar) dados."],
         ["Em que ordem o banco lê um SELECT simples?","Primeiro FROM, depois WHERE, por último SELECT."]] },

{ id:"dcl", num:"08", cat:"Sublinguagens", title:"DCL — Controle de Dados", date:DATE1,
  blocks:[
   {t:"concept",l:"Conceito",h:"<p>A <strong>DCL</strong> controla <strong>quem pode fazer o quê</strong> no banco. É a parte de <strong>permissões e segurança</strong>.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Comando</th><th>Ação</th></tr><tr><td>GRANT</td><td>Concede acesso a dados e operações.</td></tr><tr><td>REVOKE</td><td>Revoga acesso a dados e operações.</td></tr></table>"},
   {t:"tip",l:"Analogia — chaves de acesso",h:"<p><strong>GRANT</strong> = entregar a chave de uma sala. <strong>REVOKE</strong> = recolher a chave. O DCL define quem entra em quais \"salas\" (tabelas) e o que faz lá.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Em serviços financeiros, DCL garante que cada pessoa veja só o que tem permissão. É pilar de <strong>segurança e governança</strong> de dados.</p>"}
  ],
  cards:[["O que faz GRANT e REVOKE?","GRANT concede acesso/permissão; REVOKE retira o acesso."],
         ["Para que serve a DCL?","Controlar permissões e segurança de acesso: quem pode fazer o quê no banco."]] },

{ id:"dtl", num:"09", cat:"Sublinguagens", title:"DTL — Transação de Dados", date:DATE1,
  blocks:[
   {t:"concept",l:"Conceito",h:"<p>A <strong>DTL</strong> gerencia <strong>transações</strong>: um conjunto de operações tratado como <strong>unidade única</strong> — ou tudo é confirmado, ou nada é aplicado.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Comando</th><th>Ação</th></tr><tr><td>START TRANSACTION</td><td>Inicia a transação.</td></tr><tr><td>COMMIT</td><td>Concretiza (confirma).</td></tr><tr><td>ROLLBACK</td><td>Anula (desfaz).</td></tr></table>"},
   {t:"tip",l:"Analogia — transferência bancária",h:"<p>Debitar de uma conta e creditar em outra precisam acontecer juntos. <strong>COMMIT</strong> confirma os dois passos. <strong>ROLLBACK</strong>, se algo falhou, desfaz tudo. Ninguém perde dinheiro.</p>"},
   {t:"recap",l:"Na prática",h:"<p><strong>Em outras palavras:</strong> transação garante o \"tudo ou nada\". <strong>Por que importa:</strong> dá confiabilidade a sistemas financeiros, evitando estados pela metade.</p>"}
  ],
  cards:[["O que é uma transação?","Conjunto de operações tratado como unidade única: ou tudo confirma, ou nada é aplicado."],
         ["COMMIT vs. ROLLBACK?","COMMIT confirma/concretiza a transação; ROLLBACK desfaz e volta ao estado inicial."]] },

{ id:"attr", num:"10", cat:"Estrutura e Chaves", title:"Atributos de colunas", date:DATE1,
  blocks:[
   {t:"concept",l:"Conceito",h:"<p><strong>Atributos</strong> são regras/propriedades aplicadas a uma coluna ao criá-la. Controlam o que ela aceita ou como se comporta.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Atributo</th><th>O que faz</th></tr><tr><td>NULL / NOT NULL</td><td>Permite ou não valores nulos. NULL é diferente de vazio: nulo = ausência de valor.</td></tr><tr><td>SIGNED / UNSIGNED</td><td>Permite ou não negativos. UNSIGNED = só positivos (idade, quantidade).</td></tr><tr><td>AUTO_INCREMENT</td><td>Gera sequências automáticas (contadores).</td></tr><tr><td>ZEROFILL</td><td>Completa o número com zeros à esquerda (7 → 007).</td></tr></table>"},
   {t:"tip",l:"NULL não é zero nem espaço",h:"<p><strong>NULL</strong> = \"não há informação\". Diferente de <strong>0</strong> (número) e de <strong>''</strong> (texto vazio). Cliente sem telefone tem telefone <code>NULL</code>, não \"0\".</p>"},
   {t:"recap",l:"Na prática",h:"<p><strong>AUTO_INCREMENT</strong> liga ao próximo tema: é a forma mais comum de gerar uma chave primária automática (surrogada).</p>"}
  ],
  cards:[["Diferença entre NULL e vazio?","NULL é ausência de valor (desconhecido). Diferente de 0 (número) e '' (texto vazio)."],
         ["O que faz AUTO_INCREMENT?","Gera valores em sequência automaticamente — cada novo registro recebe o próximo número."]] },

{ id:"chaves", num:"11", cat:"Estrutura e Chaves", title:"Chaves: PK, FK, UNIQUE e Surrogada", date:DATE1,
  blocks:[
   {t:"concept",l:"O que são chaves",h:"<p><strong>Chaves</strong> são atributos (ou conjuntos de atributos) que identificam de forma única um registro numa tabela. São essenciais para a <strong>integridade dos dados</strong>: previnem duplicatas e permitem criar <strong>relacionamentos</strong> entre tabelas. Sem chaves, seria impossível gerenciar dados de forma eficaz.</p>"},
   {t:"concept",l:"Chave Primária (Primary Key — PK)",h:"<p>Atributo (ou conjunto) que identifica de forma única <strong>cada registro</strong> da tabela. Garante que não existam dois registros com a mesma PK. Só pode haver <strong>uma por tabela</strong> e é sempre <strong>NOT NULL</strong>.</p><p><strong>Exemplo:</strong> na tabela <code>Clientes</code>, o <code>ID do cliente</code> é a PK — cada cliente tem um identificador único.</p>"},
   {t:"concept",l:"Chave Estrangeira (Foreign Key — FK)",h:"<p>Campo de uma tabela que cria um <strong>vínculo</strong> com a PK de outra tabela. Mantém a <strong>integridade referencial</strong>: o valor da FK precisa sempre corresponder a uma PK válida na tabela relacionada.</p><p><strong>Exemplo:</strong> em <code>Pedidos</code>, o campo <code>id_cliente</code> é FK e aponta para a PK de <code>Clientes</code>. Não existe pedido de um cliente que não existe.</p>"},
   {t:"tip",l:"PK e FK trabalhando juntas",h:"<p>A <strong>PK</strong> identifica a linha dentro da própria tabela. A <strong>FK</strong> é a referência dessa PK em outra tabela, criando a ligação. É esse par que torna possível relacionar tabelas (próximo tema).</p>"},
   {t:"concept",l:"Restrições UNIQUE e PRIMARY KEY",h:"<p>Ambas <strong>asseguram valores únicos</strong> em cada linha. Evitam duplicidade (ex.: dois clientes com o mesmo CPF).</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Restrição</th><th>Característica</th></tr><tr><td>PRIMARY KEY</td><td>Identificador principal da linha. Só uma por tabela. Única e obrigatoriamente NOT NULL.</td></tr><tr><td>UNIQUE</td><td>Garante unicidade, mas pode haver várias por tabela (ex.: e-mail, CPF).</td></tr></table>"},
   {t:"attr",l:"Regra — relação com NOT NULL",h:"<p>Colunas PRIMARY KEY ou UNIQUE geralmente também são <strong>NOT NULL</strong>. O atributo NOT NULL impede valores nulos e é obrigatório em colunas PRIMARY KEY.</p>"},
   {t:"concept",l:"Chave Surrogada (Surrogate Key)",h:"<p>Chave <strong>artificial</strong>, geralmente numérica, criada só para ser chave primária. Substitui uma <strong>chave natural</strong> complexa ou não ideal.</p>"},
   {t:"tip",l:"Surrogada vs. natural",h:"<p><strong>Natural:</strong> um dado real que identifica a linha (ex.: CPF). <strong>Surrogada:</strong> número sem significado de negócio (ex.: <code>codigo</code> com AUTO_INCREMENT). <strong>Por que surrogada:</strong> simples, estável e rápida; resiste a mudanças de regra de negócio.</p>"}
  ],
  cards:[["O que é uma chave primária (PK)?","Atributo que identifica unicamente cada registro; uma por tabela e sempre NOT NULL. Ex.: ID do cliente."],
         ["O que é uma chave estrangeira (FK)?","Campo que vincula uma tabela à PK de outra, mantendo a integridade referencial. Ex.: id_cliente em Pedidos aponta para Clientes."],
         ["O que é integridade referencial?","Garantia de que toda FK corresponde a uma PK válida na tabela relacionada — não há pedido de cliente inexistente."],
         ["PRIMARY KEY vs. UNIQUE?","PRIMARY KEY: identificador principal, só uma por tabela, sempre NOT NULL. UNIQUE: garante unicidade, pode haver várias por tabela."],
         ["O que é chave surrogada?","Chave artificial (geralmente numérica) criada só para ser primária, substituindo uma chave natural complexa."],
         ["Chave natural vs. surrogada?","Natural = dado real do mundo (ex.: CPF). Surrogada = número sem significado de negócio (ex.: id auto-incremento)."]] },

{ id:"rel", num:"12", cat:"Modelagem", title:"Relacionamentos entre tabelas", date:DATE1,
  blocks:[
   {t:"concept",l:"Conceito",h:"<p>Relacionamento é a <strong>ligação</strong> entre tabelas por chaves: a <strong>PK</strong> de uma aparece em outra como <strong>FK</strong>. A cardinalidade diz <strong>quantas</strong> linhas de um lado se ligam ao outro.</p>"},
   {t:"tip",l:"O que é Foreign Key (FK)",h:"<p>A <strong>chave estrangeira</strong> aponta para a PK de outra tabela. Conecta, por exemplo, uma Compra ao Cliente que a fez, garantindo <strong>integridade referencial</strong> (não existe compra de cliente inexistente).</p>"},
   {t:"map",l:"Diagrama — os três tipos de cardinalidade",h:SVG_REL()},
   {t:"recap",l:"Na prática",h:"<p><strong>1:1</strong> → cada um, um só (Pessoa↔CPF). <strong>1:N</strong> → um para muitos (Cliente→Compras). <strong>N:M</strong> → muitos para muitos (Compras↔Produtos).<br><strong>Atenção:</strong> N:M não é implementado direto; cria-se uma <strong>tabela intermediária</strong> que vira dois relacionamentos 1:N.</p>"}
  ],
  cards:[["O que são PK e FK num relacionamento?","PK (chave primária) identifica a linha; FK (chave estrangeira) é a coluna que aponta para a PK de outra tabela, conectando-as."],
         ["1:1, 1:N e N:M — exemplos?","1:1 Pessoa↔CPF; 1:N Cliente→Compras; N:M Compras↔Produtos."],
         ["Como se implementa N:M na prática?","Com uma tabela intermediária (associativa), que transforma o N:M em dois relacionamentos 1:N."]] },

{ id:"modelos", num:"13", cat:"Modelagem", title:"Modelos de Dados", date:DATE1,
  blocks:[
   {t:"concept",l:"Conceito",h:"<p><strong>Modelos de dados</strong> são formas de organizar os dados. A escolha depende do objetivo: operação do dia a dia ou análise.</p>"},
   {t:"map",l:"Mapa mental — quando usar cada modelo",h:SVG_MOD()},
   {t:"concept",l:"Modelo Relacional",h:"<p>Tabelas inter-relacionadas por PK e FK. Ideal para <strong>operações transacionais</strong> (inserir, atualizar, excluir, consultar) com <strong>integridade referencial</strong>. É o modelo da maioria dos sistemas do dia a dia.</p>"},
   {t:"concept",l:"Modelo Dimensional",h:"<p>Usado em <strong>data warehouses</strong> e <strong>BI</strong>. Organiza dados em <strong>fatos</strong> (quantitativos, ex.: vendas) e <strong>dimensões</strong> (contexto: tempo, produto, local).</p>"},
   {t:"concept",l:"Star Schema (Esquema Estrela)",h:"<p>Tipo de modelo dimensional: uma <strong>tabela de fatos central</strong> ligada a várias <strong>dimensões</strong>, formando uma estrela. Simples e eficiente para análises rápidas e agregações.</p>"},
   {t:"recap",l:"Na prática — sua transição para Dados",h:"<p><strong>Relacional</strong> = mundo da operação (registrar). <strong>Dimensional/Star Schema</strong> = mundo da análise (entender). Na migração para Dados e BI, você caminha do relacional para o dimensional.</p>"}
  ],
  cards:[["Modelo relacional serve melhor para quê?","Operações transacionais (inserir/atualizar/consultar) com integridade referencial. É o do dia a dia."],
         ["O que é modelo dimensional?","Modelo de data warehouse/BI que separa fatos (dados quantitativos) de dimensões (contexto: tempo, produto, local)."],
         ["O que é Star Schema?","Modelo dimensional com uma tabela de fatos central ligada a várias dimensões, formando uma estrela."]] },

{ id:"where", num:"14", cat:"Consultas avançadas", title:"Filtros e a cláusula WHERE", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é o WHERE",h:"<p>O <strong>WHERE</strong> (\"onde\") filtra os resultados de uma consulta: define <strong>quais linhas</strong> aparecem. O banco testa a condição <strong>linha por linha</strong> — se for <strong>verdadeira</strong>, a linha aparece; se <strong>falsa</strong>, é ignorada.</p><p><strong>Por que usar:</strong> foco (ver só o que importa) e <strong>performance</strong> (processa menos dados, busca mais rápida).</p>"},
   {t:"tip",l:"Tabela de exemplo — PESSOAS",h:"<p>Todos os exemplos abaixo usam esta tabela:</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>ID</th><th>NOME</th><th>IDADE</th><th>FILHOS</th></tr><tr><td>1</td><td>Eliana</td><td>20</td><td>0</td></tr><tr><td>2</td><td>Miguel</td><td>39</td><td>3</td></tr><tr><td>3</td><td>Raquel</td><td>36</td><td>2</td></tr><tr><td>4</td><td>João</td><td>22</td><td>1</td></tr><tr><td>5</td><td>Marta</td><td>48</td><td>2</td></tr></table>"},
   {t:"h3",h:"Operadores de comparação"},
   {t:"concept",l:"O que são",h:"<p>Fazem uma <strong>pergunta</strong> aos dados e devolvem um valor <strong>booleano</strong> (verdadeiro ou falso). Booleano = tipo de dado com apenas dois estados possíveis.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Operador</th><th>Significado</th></tr><tr><td>=</td><td>Igual a</td></tr><tr><td>!= ou &lt;&gt;</td><td>Diferente de</td></tr><tr><td>&gt;</td><td>Maior que</td></tr><tr><td>&lt;</td><td>Menor que</td></tr><tr><td>&gt;=</td><td>Maior ou igual</td></tr><tr><td>&lt;=</td><td>Menor ou igual</td></tr></table>"},
   {t:"code",h:"<span class='cm'>-- Idade maior ou igual a 39:</span>\n<span class='kw'>SELECT</span> * <span class='kw'>FROM</span> <span class='fn'>PESSOAS</span> <span class='kw'>WHERE</span> <span class='fn'>IDADE</span> &gt;= 39;\n<span class='cm'>-- Resultado: Miguel (39) e Marta (48)</span>\n\n<span class='cm'>-- Diferente de zero filhos:</span>\n<span class='kw'>SELECT</span> * <span class='kw'>FROM</span> <span class='fn'>PESSOAS</span> <span class='kw'>WHERE</span> <span class='fn'>FILHOS</span> &lt;&gt; 0;\n<span class='cm'>-- Resultado: Miguel, Raquel, João, Marta</span>"},
   {t:"h3",h:"Álgebra booleana: AND, OR, NOT"},
   {t:"concept",l:"Combinando condições",h:"<p><strong>AND (E):</strong> só retorna se <strong>todas</strong> as condições forem verdadeiras. Analogia: receita que exige \"ovo E leite\" — falta um, não dá.<br><strong>OR (OU):</strong> retorna se <strong>pelo menos uma</strong> for verdadeira. Analogia: \"suco OU refrigerante\".<br><strong>NOT (NÃO):</strong> inverte — traz o oposto da condição.</p>"},
   {t:"code",h:"<span class='kw'>SELECT</span> * <span class='kw'>FROM</span> <span class='fn'>PESSOAS</span>\n<span class='kw'>WHERE</span> <span class='fn'>IDADE</span> <span class='kw'>IN</span> (39, 48)\n  <span class='kw'>AND</span> <span class='fn'>FILHOS</span> &gt; 2;\n<span class='cm'>-- Só Miguel: tem 39 anos E mais de 2 filhos (3).</span>\n<span class='cm'>-- Marta sai: tem 48, mas só 2 filhos.</span>"},
   {t:"h3",h:"Intervalo, lista, texto e nulos"},
   {t:"table",h:"<table class='cmd'><tr><th>Operador</th><th>O que faz</th></tr><tr><td>BETWEEN</td><td>Valor dentro de um intervalo (inclui as pontas). Ex.: IDADE BETWEEN 20 AND 23.</td></tr><tr><td>IN</td><td>Valor que coincide com algum item de uma lista. Ex.: UF IN ('SP','RJ','MG').</td></tr><tr><td>LIKE</td><td>Busca padrões em texto. % = vários caracteres; _ = um caractere.</td></tr><tr><td>IS NULL / IS NOT NULL</td><td>Campo vazio (sem informação) ou preenchido.</td></tr><tr><td>DISTINCT</td><td>Remove duplicatas; retorna só valores exclusivos.</td></tr></table>"},
   {t:"code",h:"<span class='cm'>-- Nomes que começam com M:</span>\n<span class='kw'>SELECT</span> * <span class='kw'>FROM</span> <span class='fn'>PESSOAS</span> <span class='kw'>WHERE</span> <span class='fn'>NOME</span> <span class='kw'>LIKE</span> <span class='st'>'M%'</span>;\n<span class='cm'>-- Miguel e Marta</span>\n\n<span class='cm'>-- Idade entre 20 e 23 (inclui as pontas):</span>\n<span class='kw'>SELECT</span> * <span class='kw'>FROM</span> <span class='fn'>PESSOAS</span> <span class='kw'>WHERE</span> <span class='fn'>IDADE</span> <span class='kw'>BETWEEN</span> 20 <span class='kw'>AND</span> 23;\n<span class='cm'>-- Eliana (20) e João (22)</span>"},
   {t:"attr",l:"Atenção — LIKE e wildcards",h:"<p><code>%</code> representa zero ou muitos caracteres; <code>_</code> representa exatamente um. <code>'M%'</code> = começa com M. <code>'%a'</code> = termina com a. <code>'_a%'</code> = a segunda letra é a.</p>"},
   {t:"recap",l:"Na prática",h:"<p>O <code>WHERE</code> é o coração da consulta no dia a dia de dados. Combine operadores de comparação com <code>AND/OR/NOT</code> e refine com <code>LIKE</code>, <code>BETWEEN</code>, <code>IN</code> e <code>IS NULL</code>. <strong>Próxima ação:</strong> teste cada exemplo mentalmente na tabela PESSOAS.</p>"}
  ],
  cards:[["Para que serve a cláusula WHERE?","Filtrar linhas: o banco testa a condição linha por linha; se verdadeira, mostra a linha; se falsa, ignora."],
         ["Diferença entre AND e OR?","AND exige que todas as condições sejam verdadeiras. OR basta uma ser verdadeira."],
         ["No LIKE, o que significam % e _?","% = zero ou muitos caracteres; _ = exatamente um caractere. Ex.: 'M%' começa com M."],
         ["O que faz DISTINCT?","Remove duplicatas, retornando apenas valores exclusivos da consulta."],
         ["BETWEEN inclui as pontas do intervalo?","Sim. IDADE BETWEEN 20 AND 23 inclui o 20 e o 23."]] },

{ id:"agg", num:"15", cat:"Consultas avançadas", title:"Funções de agregação e GROUP BY", date:DATE1,
  blocks:[
   {t:"concept",l:"O que são funções de agregação",h:"<p>Calculam um <strong>único resultado</strong> a partir de um <strong>conjunto de valores</strong> (várias linhas). Em vez de ver cada linha, você vê um resumo: total, média, maior, menor.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Função</th><th>O que faz</th></tr><tr><td>COUNT</td><td>Conta linhas. COUNT(*) conta todas; COUNT(DISTINCT col) conta só valores diferentes. Ignora NULL.</td></tr><tr><td>SUM</td><td>Soma os valores de uma coluna.</td></tr><tr><td>AVG</td><td>Calcula a média aritmética.</td></tr><tr><td>MIN</td><td>Menor valor.</td></tr><tr><td>MAX</td><td>Maior valor.</td></tr></table>"},
   {t:"code",h:"<span class='cm'>-- Resumo da tabela PESSOAS:</span>\n<span class='kw'>SELECT</span>\n  <span class='kw'>COUNT</span>(*)      <span class='kw'>AS</span> <span class='fn'>total</span>,\n  <span class='kw'>AVG</span>(<span class='fn'>IDADE</span>)  <span class='kw'>AS</span> <span class='fn'>media_idade</span>,\n  <span class='kw'>MAX</span>(<span class='fn'>FILHOS</span>) <span class='kw'>AS</span> <span class='fn'>max_filhos</span>\n<span class='kw'>FROM</span> <span class='fn'>PESSOAS</span>;\n<span class='cm'>-- total=5, media_idade=33, max_filhos=3</span>"},
   {t:"tip",l:"AS (alias)",h:"<p><code>AS</code> dá um <strong>nome temporário</strong> a uma coluna ou tabela, deixando o resultado mais legível. <code>COUNT(*) AS total</code> faz a coluna aparecer como \"total\".</p>"},
   {t:"concept",l:"GROUP BY — agrupar",h:"<p>Agrupa as linhas por uma coluna para aplicar a agregação <strong>a cada grupo separadamente</strong>. Sem GROUP BY, a agregação trata a tabela inteira como um só grupo.</p>"},
   {t:"code",h:"<span class='cm'>-- Quantas pessoas têm cada quantidade de filhos:</span>\n<span class='kw'>SELECT</span> <span class='fn'>FILHOS</span>, <span class='kw'>COUNT</span>(*) <span class='kw'>AS</span> <span class='fn'>qtd</span>\n<span class='kw'>FROM</span> <span class='fn'>PESSOAS</span>\n<span class='kw'>GROUP BY</span> <span class='fn'>FILHOS</span>;\n<span class='cm'>-- 0->1, 1->1, 2->2, 3->1</span>"},
   {t:"attr",l:"Atenção — COUNT e NULL",h:"<p><code>COUNT(*)</code> conta todas as linhas. <code>COUNT(coluna)</code> conta só as linhas em que a coluna <strong>não é NULL</strong>. Útil para saber quantos registros têm aquele dado preenchido.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Agregação + GROUP BY é a base de qualquer relatório: \"total por categoria\", \"média por mês\", \"contagem por status\". <strong>Próxima ação:</strong> pense numa pergunta do seu trabalho que comece com \"quantos\" ou \"qual a média de\".</p>"}
  ],
  cards:[["O que fazem as funções de agregação?","Calculam um único resultado a partir de muitas linhas: COUNT, SUM, AVG, MIN, MAX."],
         ["COUNT(*) vs COUNT(coluna)?","COUNT(*) conta todas as linhas; COUNT(coluna) conta só as que não são NULL."],
         ["Para que serve GROUP BY?","Agrupar linhas por uma coluna para aplicar a agregação a cada grupo separadamente."],
         ["O que é o AS em SQL?","Um alias: nome temporário para uma coluna ou tabela, deixando o resultado mais legível."]] },

{ id:"order", num:"16", cat:"Consultas avançadas", title:"ORDER BY e operações aritméticas", date:DATE1,
  blocks:[
   {t:"concept",l:"ORDER BY — ordenar",h:"<p>Define a <strong>ordem</strong> dos resultados. <strong>ASC</strong> = crescente (A-Z, 0-9), é o padrão. <strong>DESC</strong> = decrescente.</p><p>É a <strong>última cláusula</strong> do SELECT. Pode ordenar até por colunas não selecionadas e pela <strong>posição numérica</strong> da coluna.</p>"},
   {t:"code",h:"<span class='cm'>-- Do mais velho para o mais novo:</span>\n<span class='kw'>SELECT</span> <span class='fn'>NOME</span>, <span class='fn'>IDADE</span>\n<span class='kw'>FROM</span> <span class='fn'>PESSOAS</span>\n<span class='kw'>ORDER BY</span> <span class='fn'>IDADE</span> <span class='kw'>DESC</span>;\n<span class='cm'>-- Marta(48), Miguel(39), Raquel(36), João(22), Eliana(20)</span>"},
   {t:"concept",l:"Operações aritméticas",h:"<p>Dá para calcular direto no SELECT com <code>+</code> (adição), <code>-</code> (subtração), <code>*</code> (multiplicação), <code>/</code> (divisão) e <code>%</code> (módulo = resto da divisão).</p>"},
   {t:"attr",l:"Atenção — divisão por zero",h:"<p>Dividir por zero <strong>gera erro</strong>. Use o <code>WHERE</code> para descartar esses casos antes do cálculo.</p>"},
   {t:"code",h:"<span class='cm'>-- Evita divisão por zero filtrando FILHOS > 0:</span>\n<span class='kw'>SELECT</span> <span class='fn'>NOME</span>, <span class='fn'>IDADE</span> / <span class='fn'>FILHOS</span> <span class='kw'>AS</span> <span class='fn'>idade_por_filho</span>\n<span class='kw'>FROM</span> <span class='fn'>PESSOAS</span>\n<span class='kw'>WHERE</span> <span class='fn'>FILHOS</span> &gt; 0;\n<span class='cm'>-- Eliana (0 filhos) é desconsiderada</span>"},
   {t:"tip",l:"Ordem de execução (precedência)",h:"<p>Para o cálculo sair certo, o SQL segue esta hierarquia:</p><p>1. Parênteses <code>( )</code><br>2. Expoentes<br>3. Multiplicação <code>*</code> e divisão <code>/</code><br>4. Adição <code>+</code> e subtração <code>-</code></p><p>Use parênteses para deixar a intenção explícita.</p>"},
   {t:"recap",l:"Na prática",h:"<p><code>ORDER BY</code> organiza a leitura; as operações aritméticas geram métricas direto na consulta. <strong>Próxima ação:</strong> filtre com WHERE antes de dividir, para nunca cair em divisão por zero.</p>"}
  ],
  cards:[["Qual a ordem padrão do ORDER BY?","ASC (crescente). Para decrescente, use DESC."],
         ["ORDER BY pode usar a posição da coluna?","Sim. ORDER BY 2 ordena pela segunda coluna do SELECT."],
         ["O que faz o operador % (módulo)?","Retorna o resto da divisão entre dois números."],
         ["Qual a ordem de precedência dos cálculos?","Parênteses, expoentes, multiplicação/divisão, adição/subtração."],
         ["Como evitar erro de divisão por zero?","Filtrar com WHERE para descartar divisores iguais a 0 (ex.: WHERE FILHOS > 0)."]] },

{ id:"tipos", num:"17", cat:"Tipos e funções", title:"Tipos de dados (datatypes)", date:DATE1,
  blocks:[
   {t:"concept",l:"O que são",h:"<p><strong>Tipos de dados</strong> (datatypes) são categorias que definem o tipo de informação que uma coluna pode armazenar. Especificam o <strong>formato, o tamanho e a natureza</strong> do dado, garantindo armazenamento consistente e eficiente.</p>"},
   {t:"h3",h:"Numéricos"},
   {t:"table",h:"<table class='cmd'><tr><th>Tipo</th><th>Tamanho</th><th>Faixa / uso</th></tr><tr><td>BOOLEAN</td><td>1 bit</td><td>0 ou 1 (FALSE/TRUE).</td></tr><tr><td>TINYINT</td><td>1 byte</td><td>-128 a 127.</td></tr><tr><td>SMALLINT</td><td>2 bytes</td><td>-32.768 a 32.767 (0 a 65.535 se UNSIGNED).</td></tr><tr><td>INT</td><td>4 bytes</td><td>cerca de -2,1 bi a +2,1 bi.</td></tr><tr><td>BIGINT</td><td>8 bytes</td><td>números muito grandes.</td></tr><tr><td>FLOAT</td><td>4 bytes</td><td>decimais (ponto flutuante).</td></tr><tr><td>DOUBLE</td><td>8 bytes</td><td>decimais com mais precisão.</td></tr></table>"},
   {t:"h3",h:"Texto (string)"},
   {t:"table",h:"<table class='cmd'><tr><th>Tipo</th><th>Tamanho</th><th>Uso</th></tr><tr><td>CHAR</td><td>fixo</td><td>Texto de tamanho fixo. Ex.: uf CHAR(2).</td></tr><tr><td>VARCHAR</td><td>variável (+1 byte)</td><td>Texto de tamanho variável. Ex.: nome VARCHAR(30).</td></tr></table>"},
   {t:"h3",h:"Data e hora"},
   {t:"table",h:"<table class='cmd'><tr><th>Tipo</th><th>Tamanho</th><th>Guarda</th></tr><tr><td>DATE</td><td>3 bytes</td><td>Só a data (ano, mês, dia).</td></tr><tr><td>TIME</td><td>3 bytes</td><td>Só a hora.</td></tr><tr><td>DATETIME</td><td>8 bytes</td><td>Data e hora juntas.</td></tr><tr><td>TIMESTAMP</td><td>4 bytes</td><td>Um ponto específico no tempo.</td></tr></table>"},
   {t:"tip",l:"CHAR vs VARCHAR",h:"<p><strong>CHAR</strong> é fixo: sempre ocupa o tamanho definido (bom para dados de tamanho constante, como UF ou sexo). <strong>VARCHAR</strong> é variável: ocupa só o necessário, mais 1 byte (bom para nome, e-mail).</p>"},
   {t:"attr",l:"Liga com atributos — UNSIGNED",h:"<p>O atributo <code>UNSIGNED</code> remove os negativos e dobra o limite positivo. Ex.: SMALLINT vai de -32.768 a 32.767, mas UNSIGNED vai de 0 a 65.535. Use quando o valor nunca é negativo (idade, quantidade).</p>"},
   {t:"recap",l:"Na prática",h:"<p>Escolher o tipo certo <strong>economiza espaço</strong> e <strong>evita erros</strong> (guardar data como texto atrapalha ordenação e cálculo). <strong>Próxima ação:</strong> ao criar uma tabela, pergunte para cada coluna: número, texto ou data? E qual o menor tipo que comporta os valores?</p>"}
  ],
  cards:[["O que é um datatype?","Categoria que define o tipo de informação de uma coluna (formato, tamanho e natureza do dado)."],
         ["Quantos bytes ocupa um INT?","4 bytes (faixa aproximada de -2,1 bilhões a +2,1 bilhões)."],
         ["CHAR vs VARCHAR?","CHAR é fixo (sempre ocupa o tamanho definido); VARCHAR é variável (ocupa o necessário + 1 byte)."],
         ["Qual tipo guarda data e hora juntas?","DATETIME (8 bytes). DATE guarda só data; TIME só hora."]] },

{ id:"fstr", num:"18", cat:"Tipos e funções", title:"Funções de string (texto)", date:DATE1,
  blocks:[
   {t:"concept",l:"O que são",h:"<p>Funções de <strong>string</strong> manipulam textos: padronizar, extrair partes, juntar e limpar dados. São rotina no trabalho com dados (normalizar nomes, separar um DDD, etc.).</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Função</th><th>O que faz</th></tr><tr><td>CONCAT / ||</td><td>Une (concatena) textos. SQLite/Oracle: a || b. MySQL/SQL Server: CONCAT(a,b).</td></tr><tr><td>LENGTH / LEN</td><td>Quantidade de caracteres.</td></tr><tr><td>UPPER / LOWER</td><td>Converte para maiúsculas / minúsculas.</td></tr><tr><td>SUBSTRING / SUBSTR</td><td>Extrai um pedaço (posição inicial + quantidade).</td></tr><tr><td>LEFT / RIGHT</td><td>N caracteres da esquerda / direita.</td></tr><tr><td>REPLACE</td><td>Substitui todas as ocorrências de um texto por outro.</td></tr><tr><td>LPAD / RPAD</td><td>Preenche à esquerda / direita até um tamanho.</td></tr><tr><td>LTRIM / RTRIM / TRIM</td><td>Remove espaços (ou caracteres) do início / fim / ambos.</td></tr><tr><td>SPLIT_PART</td><td>Divide por um delimitador e pega a parte na posição escolhida.</td></tr></table>"},
   {t:"code",h:"<span class='cm'>-- Nome em maiúsculas e o tamanho:</span>\n<span class='kw'>SELECT</span> <span class='kw'>UPPER</span>(<span class='fn'>NOME</span>) <span class='kw'>AS</span> <span class='fn'>maiusculo</span>, <span class='kw'>LENGTH</span>(<span class='fn'>NOME</span>) <span class='kw'>AS</span> <span class='fn'>tamanho</span>\n<span class='kw'>FROM</span> <span class='fn'>PESSOAS</span>;"},
   {t:"code",h:"<span class='cm'>-- Juntando texto com || :</span>\n<span class='kw'>SELECT</span> <span class='fn'>NOME</span> || <span class='st'>' tem '</span> || <span class='fn'>IDADE</span> || <span class='st'>' anos'</span>\n<span class='kw'>FROM</span> <span class='fn'>PESSOAS</span> <span class='kw'>WHERE</span> <span class='fn'>ID</span>=1;\n<span class='cm'>-- Eliana tem 20 anos</span>"},
   {t:"tip",l:"Nomes variam por SGBD",h:"<p><code>CONCAT</code> vs <code>||</code>, <code>LEN</code> vs <code>LENGTH</code>, <code>SUBSTRING</code> vs <code>SUBSTR</code>. O conceito é o mesmo; confira a documentação do seu banco. No app (SQLite) use <code>||</code> e <code>LENGTH</code>.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Limpeza e padronização de texto são constantes em Dados. <strong>Próxima ação:</strong> no modo Praticar, teste <code>UPPER</code>, <code>LENGTH</code> e <code>||</code> na tabela PESSOAS.</p>"}
  ],
  cards:[["O que faz LENGTH?","Conta a quantidade de caracteres de um texto."],
         ["Como concatenar textos no SQLite?","Com o operador || . Ex.: NOME || ' anos'."],
         ["Para que serve SUBSTR(texto, inicio, qtd)?","Extrai um pedaço do texto a partir de uma posição inicial, pegando uma quantidade de caracteres."],
         ["O que faz REPLACE?","Substitui todas as ocorrências de um trecho por outro texto."]] },

{ id:"fnum", num:"19", cat:"Tipos e funções", title:"Funções numéricas e de data", date:DATE1,
  blocks:[
   {t:"concept",l:"Funções numéricas",h:"<p>Realizam cálculos e ajustes em valores numéricos.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Função</th><th>O que faz</th></tr><tr><td>POWER / POW</td><td>Potência. POWER(2,3) = 8.</td></tr><tr><td>ROUND</td><td>Arredonda para o mais próximo. ROUND(28.456,1) = 28.5.</td></tr><tr><td>SQRT</td><td>Raiz quadrada. SQRT(9) = 3.</td></tr><tr><td>TRUNC</td><td>Corta os decimais sem arredondar. TRUNC(111.15) = 111.</td></tr><tr><td>ABS</td><td>Valor absoluto (sem sinal). ABS(-7) = 7.</td></tr><tr><td>MOD / %</td><td>Resto da divisão. 10 % 3 = 1.</td></tr></table>"},
   {t:"code",h:"<span class='kw'>SELECT</span> <span class='kw'>ROUND</span>(28.456, 1), <span class='kw'>SQRT</span>(9), <span class='kw'>ABS</span>(-7);\n<span class='cm'>-- 28.5 | 3 | 7</span>"},
   {t:"tip",l:"ROUND vs TRUNC",h:"<p><strong>ROUND</strong> arredonda (28.6 vira 29). <strong>TRUNC</strong> corta (28.6 vira 28). Use ROUND para valores finais; TRUNC quando quer só a parte inteira.</p>"},
   {t:"concept",l:"Funções de data",h:"<p>Manipulam datas e horas: extrair partes, somar intervalos, calcular diferenças.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Função</th><th>O que faz</th></tr><tr><td>CURRENT_DATE</td><td>Data atual.</td></tr><tr><td>DATEADD</td><td>Soma um intervalo a uma data (dias, meses, anos).</td></tr><tr><td>DATEDIFF</td><td>Diferença entre duas datas.</td></tr><tr><td>DATE_PART / EXTRACT</td><td>Extrai uma parte (dia, mês, ano) de uma data.</td></tr><tr><td>DATE_TRUNC</td><td>Zera as partes menores (ex.: trunca por mês).</td></tr><tr><td>TO_TIMESTAMP</td><td>Converte texto em data/hora.</td></tr></table>"},
   {t:"tip",l:"Datas no app (SQLite)",h:"<p>No SQLite (e no modo Praticar) datas se manipulam com <code>date()</code> e <code>strftime()</code>. Ex.: <code>strftime('%Y', data)</code> extrai o ano. <code>DATEADD/DATEDIFF</code> são do SQL Server; <code>EXTRACT/DATE_PART</code> são do PostgreSQL.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Funções de data são essenciais para relatórios por período (vendas por mês, idade da conta). <strong>Próxima ação:</strong> teste <code>ROUND</code> e <code>strftime('%Y', ...)</code> no Praticar.</p>"}
  ],
  cards:[["ROUND vs TRUNC?","ROUND arredonda para o mais próximo; TRUNC corta os decimais sem arredondar."],
         ["Quanto é POWER(2,3)?","8 (2 elevado a 3)."],
         ["Para que serve EXTRACT / DATE_PART?","Extrair uma parte específica de uma data (dia, mês ou ano)."],
         ["Como extrair o ano de uma data no SQLite?","Com strftime('%Y', data)."]] },

{ id:"fcond", num:"20", cat:"Tipos e funções", title:"Conversão e condicionais (CASE, COALESCE)", date:DATE1,
  blocks:[
   {t:"concept",l:"Conversão de tipos",h:"<p>Transformam um dado de um tipo para outro (texto em número, número em texto, etc.).</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Função</th><th>O que faz</th></tr><tr><td>CAST / CONVERT</td><td>Converte tipos compatíveis. CAST('10' AS INTEGER).</td></tr><tr><td>TO_CHAR</td><td>Número ou data em texto formatado.</td></tr><tr><td>TO_DATE</td><td>Texto em data.</td></tr><tr><td>TO_NUMBER</td><td>Texto em número decimal.</td></tr></table>"},
   {t:"concept",l:"CASE — decisão dentro do SQL",h:"<p>Cria lógica condicional na consulta. Sintaxe: <code>CASE WHEN condição THEN resultado [ELSE padrão] END</code>. Economiza código ao evitar tratar condições fora do banco.</p>"},
   {t:"code",h:"<span class='kw'>SELECT</span> <span class='fn'>NOME</span>,\n  <span class='kw'>CASE</span>\n    <span class='kw'>WHEN</span> <span class='fn'>IDADE</span> &gt;= 40 <span class='kw'>THEN</span> <span class='st'>'veterano'</span>\n    <span class='kw'>WHEN</span> <span class='fn'>IDADE</span> &gt;= 30 <span class='kw'>THEN</span> <span class='st'>'adulto'</span>\n    <span class='kw'>ELSE</span> <span class='st'>'jovem'</span>\n  <span class='kw'>END</span> <span class='kw'>AS</span> <span class='fn'>faixa</span>\n<span class='kw'>FROM</span> <span class='fn'>PESSOAS</span>;"},
   {t:"tip",l:"IF / IIF",h:"<p><code>IF(condição, valor_se_verdadeiro, valor_se_falso)</code> faz o mesmo que um CASE simples. No SQLite chama-se <code>IIF</code>. Ex.: <code>IIF(IDADE &gt;= 18, 'maior', 'menor')</code>.</p>"},
   {t:"concept",l:"COALESCE — primeiro valor não-nulo",h:"<p>Percorre uma lista e retorna o <strong>primeiro valor que não for NULL</strong>. <strong>Analogia:</strong> ligar para o cliente: tenta o comercial; se vazio, o celular; se vazio, o fixo. <code>COALESCE(comercial, celular, fixo)</code>.</p>"},
   {t:"concept",l:"NULLIF — NULL se forem iguais",h:"<p>Compara dois valores: se forem <strong>iguais</strong>, retorna <strong>NULL</strong>; se diferentes, retorna o primeiro. Útil para evitar divisão por zero (<code>NULLIF(divisor, 0)</code>) ou destacar diferenças (meta x realizado).</p>"},
   {t:"code",h:"<span class='kw'>SELECT</span> <span class='kw'>COALESCE</span>(<span class='kw'>NULL</span>, <span class='kw'>NULL</span>, <span class='st'>'fixo'</span>);  <span class='cm'>-- fixo</span>\n<span class='kw'>SELECT</span> <span class='kw'>NULLIF</span>(50, 50);  <span class='cm'>-- NULL (iguais)</span>"},
   {t:"recap",l:"Na prática",h:"<p><code>CASE</code> classifica; <code>COALESCE</code> garante um valor mesmo com campos vazios; <code>NULLIF</code> protege cálculos. São o que deixa a consulta \"inteligente\" e segura contra nulos. <strong>Próxima ação:</strong> monte um CASE de faixa etária no Praticar.</p>"}
  ],
  cards:[["Qual a sintaxe do CASE?","CASE WHEN condição THEN resultado ELSE padrão END."],
         ["O que faz COALESCE?","Retorna o primeiro valor não-nulo de uma lista."],
         ["O que faz NULLIF(a, b)?","Retorna NULL se a e b forem iguais; senão retorna a. Bom para evitar divisão por zero."],
         ["Para que serve CAST?","Converter um dado de um tipo para outro (ex.: texto em número)."]] },

{ id:"joins", num:"21", cat:"Juntando tabelas", title:"JOINs — juntando tabelas", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é um JOIN",h:"<p><strong>JOIN</strong> (juntar) combina linhas de <strong>duas ou mais tabelas</strong> com base em colunas em comum (geralmente PK de uma e FK de outra). É o que permite ver, num só resultado, dados espalhados em tabelas diferentes.</p><p><strong>Atenção:</strong> em grandes volumes, JOINs têm <strong>alto custo computacional</strong> e podem deixar a consulta lenta.</p>"},
   {t:"map",l:"Os quatro tipos (diagrama de Venn)",h:SVG_JOINS()},
   {t:"table",h:"<table class='cmd'><tr><th>Tipo</th><th>Retorna</th></tr><tr><td>INNER JOIN</td><td>Só as linhas que casam nas duas tabelas (a interseção).</td></tr><tr><td>LEFT JOIN</td><td>Todas as linhas da tabela da esquerda; o que não casa na direita vem NULL.</td></tr><tr><td>RIGHT JOIN</td><td>Todas as linhas da tabela da direita; o que não casa na esquerda vem NULL.</td></tr><tr><td>FULL OUTER JOIN</td><td>Todas as linhas dos dois lados; preenche com NULL onde não há par.</td></tr></table>"},
   {t:"tip",l:"Como ler um JOIN",h:"<p><code>FROM A JOIN B ON A.chave = B.chave</code>. O <code>ON</code> diz por qual coluna as tabelas se ligam. Use apelidos (A, B) para encurtar.</p>"},
   {t:"code",h:"<span class='cm'>-- Pessoa e produto de cada compra (INNER JOIN):</span>\n<span class='kw'>SELECT</span> <span class='fn'>P</span>.<span class='fn'>NOME</span>, <span class='fn'>PR</span>.<span class='fn'>NOME</span>\n<span class='kw'>FROM</span> <span class='fn'>COMPRAS</span> <span class='fn'>C</span>\n<span class='kw'>JOIN</span> <span class='fn'>PESSOAS</span> <span class='fn'>P</span>  <span class='kw'>ON</span> <span class='fn'>P</span>.<span class='fn'>ID</span> = <span class='fn'>C</span>.<span class='fn'>ID_PESSOA</span>\n<span class='kw'>JOIN</span> <span class='fn'>PRODUTOS</span> <span class='fn'>PR</span> <span class='kw'>ON</span> <span class='fn'>PR</span>.<span class='fn'>ID</span> = <span class='fn'>C</span>.<span class='fn'>ID_PRODUTO</span>;"},
   {t:"code",h:"<span class='cm'>-- Todas as pessoas, mesmo quem não comprou (LEFT JOIN):</span>\n<span class='kw'>SELECT</span> <span class='fn'>P</span>.<span class='fn'>NOME</span>, <span class='fn'>C</span>.<span class='fn'>ID_PRODUTO</span>\n<span class='kw'>FROM</span> <span class='fn'>PESSOAS</span> <span class='fn'>P</span>\n<span class='kw'>LEFT JOIN</span> <span class='fn'>COMPRAS</span> <span class='fn'>C</span> <span class='kw'>ON</span> <span class='fn'>C</span>.<span class='fn'>ID_PESSOA</span> = <span class='fn'>P</span>.<span class='fn'>ID</span>;\n<span class='cm'>-- quem não comprou aparece com ID_PRODUTO = NULL</span>"},
   {t:"tip",l:"Achar o que NÃO tem par",h:"<p>Um <code>LEFT JOIN</code> seguido de <code>WHERE coluna_da_direita IS NULL</code> traz só o que existe <strong>apenas na esquerda</strong>. Ex.: produtos que nunca foram comprados.</p>"},
   {t:"recap",l:"Na prática",h:"<p><strong>INNER</strong> = interseção; <strong>LEFT/RIGHT</strong> = um lado inteiro + o que casa; <strong>FULL</strong> = tudo. Para relatórios reais (cliente + pedidos + produtos) o JOIN é diário. <strong>Próxima ação:</strong> no Praticar, junte PESSOAS, COMPRAS e PRODUTOS.</p>"}
  ],
  cards:[["O que faz um JOIN?","Combina linhas de duas ou mais tabelas com base em colunas em comum (chaves)."],
         ["INNER JOIN retorna o quê?","Apenas as linhas que casam nas duas tabelas (a interseção)."],
         ["LEFT JOIN retorna o quê?","Todas as linhas da tabela da esquerda; onde não há par na direita, vem NULL."],
         ["Como achar registros sem par?","LEFT JOIN e depois WHERE coluna_da_direita IS NULL."],
         ["O que o ON define num JOIN?","A coluna que liga as duas tabelas (ex.: ON P.ID = C.ID_PESSOA)."]] },

{ id:"union", num:"22", cat:"Juntando tabelas", title:"UNION — empilhando resultados", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é UNION",h:"<p><strong>UNION</strong> combina (empilha) as linhas de <strong>duas ou mais consultas</strong> num único resultado. Diferença para o JOIN: o JOIN junta <strong>colunas</strong> (lado a lado); o UNION junta <strong>linhas</strong> (uma embaixo da outra).</p>"},
   {t:"tip",l:"Analogia",h:"<p>Você tem uma lista de compras do mercado e outra da farmácia. O UNION é escrever todos os itens num papel só, um abaixo do outro.</p>"},
   {t:"attr",l:"Duas regras obrigatórias",h:"<p>1. <strong>Mesmo número de colunas</strong> nas duas consultas.<br>2. <strong>Tipos e ordem compatíveis</strong>: a coluna na mesma posição deve ter o mesmo tipo (texto com texto, número com número).</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Comando</th><th>O que faz</th></tr><tr><td>UNION ALL</td><td>Junta tudo sem conferir. Mantém duplicatas. Mais rápido.</td></tr><tr><td>UNION</td><td>Junta e remove as duplicatas. Resultado limpo, mas exige mais esforço do banco.</td></tr></table>"},
   {t:"code",h:"<span class='cm'>-- Empilha todos os IDs (com repetições):</span>\n<span class='kw'>SELECT</span> <span class='fn'>ID_PESSOA</span> <span class='kw'>FROM</span> <span class='fn'>COMPRAS</span>\n<span class='kw'>UNION ALL</span>\n<span class='kw'>SELECT</span> <span class='fn'>ID</span> <span class='kw'>FROM</span> <span class='fn'>PESSOAS</span>;\n\n<span class='cm'>-- Só os valores únicos (sem repetir):</span>\n<span class='kw'>SELECT</span> <span class='fn'>ID_PESSOA</span> <span class='kw'>FROM</span> <span class='fn'>COMPRAS</span>\n<span class='kw'>UNION</span>\n<span class='kw'>SELECT</span> <span class='fn'>ID</span> <span class='kw'>FROM</span> <span class='fn'>PESSOAS</span>;"},
   {t:"tip",l:"Exemplo visual",h:"<p>Lista 1: Verde, Amarelo, Vermelho. Lista 2: Vermelho, Azul, Amarelo.<br><strong>UNION ALL</strong> = 6 itens (Verde, Amarelo, Vermelho, Vermelho, Azul, Amarelo).<br><strong>UNION</strong> = 4 itens únicos (Verde, Amarelo, Vermelho, Azul).</p>"},
   {t:"recap",l:"Na prática",h:"<p>Use <strong>UNION ALL</strong> quando quiser tudo (e é mais rápido); use <strong>UNION</strong> quando precisa de uma lista sem repetições. <strong>Próxima ação:</strong> rode os dois no Praticar e compare a quantidade de linhas.</p>"}
  ],
  cards:[["O que faz UNION?","Empilha (combina) as linhas de duas ou mais consultas num único resultado."],
         ["UNION vs UNION ALL?","UNION remove as duplicatas; UNION ALL mantém todas (e é mais rápido)."],
         ["Quais as regras do UNION?","Mesmo número de colunas e tipos/ordem compatíveis entre as consultas."],
         ["JOIN vs UNION?","JOIN junta colunas (lado a lado); UNION junta linhas (uma embaixo da outra)."]] },

{ id:"subq", num:"23", cat:"Consultas avançadas", title:"Subqueries (subconsultas)", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é",h:"<p>Uma <strong>subquery</strong> (subconsulta) é uma consulta <strong>dentro</strong> de outra. Como uma boneca russa: você faz um SELECT e, dentro dele, coloca outro SELECT.</p>"},
   {t:"concept",l:"Dois usos principais",h:"<p><strong>Como coluna:</strong> traz um valor calculado de outra tabela para cada linha.<br><strong>Como filtro:</strong> limita os resultados com base numa lista gerada por outra consulta (<code>WHERE ... IN (subconsulta)</code>).</p>"},
   {t:"code",h:"<span class='cm'>-- Como filtro: só quem fez alguma compra</span>\n<span class='kw'>SELECT</span> <span class='fn'>NOME</span> <span class='kw'>FROM</span> <span class='fn'>PESSOAS</span>\n<span class='kw'>WHERE</span> <span class='fn'>ID</span> <span class='kw'>IN</span> (<span class='kw'>SELECT</span> <span class='fn'>ID_PESSOA</span> <span class='kw'>FROM</span> <span class='fn'>COMPRAS</span>);"},
   {t:"code",h:"<span class='cm'>-- Como coluna: total de compras de cada pessoa</span>\n<span class='kw'>SELECT</span> <span class='fn'>NOME</span>,\n  (<span class='kw'>SELECT</span> <span class='kw'>COUNT</span>(*) <span class='kw'>FROM</span> <span class='fn'>COMPRAS</span> <span class='kw'>WHERE</span> <span class='fn'>ID_PESSOA</span>=<span class='fn'>P</span>.<span class='fn'>ID</span>) <span class='kw'>AS</span> <span class='fn'>total</span>\n<span class='kw'>FROM</span> <span class='fn'>PESSOAS</span> <span class='fn'>P</span>;"},
   {t:"attr",l:"Atenção — desempenho",h:"<p>Não há limite para aninhar subconsultas, mas <strong>muitas camadas deixam a consulta lenta</strong> (o banco tem muito trabalho extra). Use com parcimônia.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Subconsultas respondem perguntas em duas etapas: \"quem comprou?\" e depois \"traga os nomes desses\". <strong>Próxima ação:</strong> no Praticar, liste quem está acima da média de idade com uma subconsulta.</p>"}
  ],
  cards:[["O que é uma subquery?","Uma consulta dentro de outra (um SELECT dentro de outro SELECT)."],
         ["Quais os dois usos de subquery?","Como coluna (valor calculado por linha) e como filtro (WHERE ... IN (subconsulta))."],
         ["Qual o cuidado com subqueries?","Muitas camadas aninhadas deixam a consulta lenta (alto custo)."]] },

{ id:"views", num:"24", cat:"Consultas avançadas", title:"Views (visões)", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é uma View",h:"<p>Uma <strong>view</strong> (visão) é uma <strong>tabela virtual</strong>: não armazena dados próprios, é apenas um <strong>SELECT salvo</strong> com um nome. Você a consulta como se fosse uma tabela comum.</p>"},
   {t:"concept",l:"Por que usar",h:"<p><strong>Reuso:</strong> escreve a consulta difícil uma vez e salva.<br><strong>Segurança:</strong> mostra só algumas colunas, escondendo dados sensíveis (ex.: salários).<br><strong>Simplificação:</strong> transforma um código gigante em algo limpo de usar.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Característica</th><th>Detalhe</th></tr><tr><td>Dinâmica</td><td>Reflete os dados atuais: se a tabela muda, a view mostra a mudança.</td></tr><tr><td>Permanente</td><td>Continua existindo mesmo após reiniciar o servidor.</td></tr><tr><td>Leve</td><td>Não ocupa espaço extra: é só a instrução salva.</td></tr></table>"},
   {t:"code",h:"<span class='cm'>-- Criar:</span>\n<span class='kw'>CREATE VIEW</span> <span class='fn'>vw_adultos</span> <span class='kw'>AS</span>\n  <span class='kw'>SELECT</span> <span class='fn'>NOME</span>, <span class='fn'>IDADE</span> <span class='kw'>FROM</span> <span class='fn'>PESSOAS</span> <span class='kw'>WHERE</span> <span class='fn'>IDADE</span> &gt;= 18;\n\n<span class='cm'>-- Consultar como se fosse tabela:</span>\n<span class='kw'>SELECT</span> * <span class='kw'>FROM</span> <span class='fn'>vw_adultos</span>;"},
   {t:"tip",l:"Comandos",h:"<p><code>CREATE VIEW nome AS [SELECT]</code> cria; <code>ALTER VIEW</code> altera a consulta; <code>DROP VIEW</code> apaga a view. <strong>DROP VIEW não apaga os dados</strong> das tabelas originais, só a visão.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Views deixam consultas complexas reutilizáveis e seguras (ótimo para esconder colunas sensíveis). <strong>Próxima ação:</strong> no Praticar, crie uma view com as pessoas de um estado.</p>"}
  ],
  cards:[["O que é uma view?","Uma tabela virtual: um SELECT salvo com nome, que não armazena dados próprios."],
         ["Por que usar views?","Reuso (salvar consulta difícil), segurança (esconder colunas) e simplificação."],
         ["DROP VIEW apaga os dados?","Não. Apaga só a view; os dados das tabelas originais permanecem."],
         ["A view reflete mudanças nos dados?","Sim, é dinâmica: mostra sempre os dados atuais das tabelas."]] }
,
{ id:"indices", num:"25", cat:"MySQL na prática", title:"Índices (indexes)", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 05 (DDL), 11 (chaves) e 14 (WHERE).</p>"},
   {t:"concept",l:"O que é",h:"<p>Um índice (em inglês index) é uma estrutura auxiliar que o banco mantém para encontrar linhas rapidamente, sem ler a tabela inteira.</p><p>É como o índice remissivo no fim de um livro: em vez de folhear página por página, você vai direto ao termo e à página.</p>"},
   {t:"concept",l:"Por que é importante",h:"<p>Sem índice, para responder um WHERE o MySQL faz varredura completa (em inglês full table scan): lê todas as linhas. Em tabelas grandes isso é lento.</p><p>Segundo a documentação oficial, o índice é o fator que mais acelera consultas. É também o tema de performance mais cobrado em entrevistas.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Crie índice em colunas usadas com frequência em WHERE, em JOIN (junção de tabelas) e em ORDER BY. A chave primária (PK, primary key) já tem índice automático.</p><p>Não indexe tudo: cada índice ocupa espaço e deixa INSERT, UPDATE e DELETE mais lentos, porque o índice precisa ser atualizado junto.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>O InnoDB (o mecanismo de armazenamento padrão do MySQL) organiza os índices em uma estrutura chamada B-tree, que mantém os valores ordenados para busca rápida.</p><p>Cria-se com CREATE INDEX e verifica-se o uso com EXPLAIN (tema 28).</p>"},
   {t:"code",h:"<span class='cm'>-- Criar um índice na coluna usada no filtro</span>\nCREATE INDEX idx_cliente_email ON cliente (email);\n\n<span class='cm'>-- Agora esta consulta usa o índice</span>\nSELECT * FROM cliente WHERE email = 'a@b.com';\n\n<span class='cm'>-- Índice composto: serve para filtros por (uf, cidade)</span>\nCREATE INDEX idx_uf_cidade ON cliente (uf, cidade);"},
   {t:"table",h:"<table class='cmd'><tr><th>Situação</th><th>Vale indexar?</th></tr><tr><td>Coluna muito usada no WHERE</td><td>Sim</td></tr><tr><td>Coluna de JOIN (chave estrangeira)</td><td>Sim</td></tr><tr><td>Tabela pequena</td><td>Pouco ganho</td></tr><tr><td>Coluna que quase não filtra</td><td>Não compensa</td></tr></table>"},
   {t:"attr",l:"Erros comuns",h:"<p>Indexar todas as colunas achando que sempre acelera: atrasa as gravações e ocupa espaço.</p><p>Usar função na coluna do WHERE (por exemplo YEAR(data)) impede o uso do índice.</p><p>Esquecer de indexar a chave estrangeira usada em JOINs.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Indexe o que aparece em WHERE, JOIN e ORDER BY. Em índice composto, coloque primeiro a coluna mais seletiva. Confirme com EXPLAIN se o índice está sendo usado de verdade, em vez de supor.</p>"},
   {t:"plain",l:"Exercícios graduais",h:"<p><b>1.</b> Crie um índice na coluna cpf da tabela cliente.</p><p><b>2.</b> Crie um índice composto por (uf, cidade).</p><p><b>3.</b> Explique por que WHERE YEAR(data_venda) = 2025 pode não usar o índice da coluna data_venda.</p>"},
   {t:"code",l:"Soluções",h:"<span class='cm'>-- 1</span>\nCREATE INDEX idx_cliente_cpf ON cliente (cpf);\n\n<span class='cm'>-- 2</span>\nCREATE INDEX idx_uf_cidade ON cliente (uf, cidade);\n\n<span class='cm'>-- 3: a função YEAR transforma a coluna, e o índice é sobre o valor original.</span>\n<span class='cm'>-- Melhor filtrar por faixa, preservando o índice:</span>\nSELECT * FROM venda\nWHERE data_venda >= '2025-01-01' AND data_venda < '2026-01-01';"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>Índice acelera leitura, mas pesa na gravação. Indexe WHERE, JOIN e ORDER BY. PK já é indexada. Função na coluna anula o índice. InnoDB usa B-tree.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p>Pergunta clássica: por que não indexar tudo? Porque cada índice ocupa espaço e deixa INSERT, UPDATE e DELETE mais lentos. Outra: por que YEAR(data) no WHERE atrapalha? Porque transforma a coluna e impede o uso do índice.</p>"},
   {t:"plain",l:"Mapa mental",h:"<ul><li>Índice<ul><li>Para que: achar linhas rápido</li><li>Onde: WHERE, JOIN, ORDER BY</li><li>Custo: espaço e gravação mais lenta</li><li>Estrutura: B-tree (InnoDB)</li><li>Cuidado: função na coluna anula</li></ul></li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><b>Mini-projeto:</b> em uma tabela de vendas, crie índices nas colunas de filtro e de JOIN e descreva o que espera melhorar.</p><p><b>Conexão:</b> índice é a base do tema 28 (performance e EXPLAIN). No pandas, o DataFrame também tem index, com a mesma ideia de acesso rápido.</p>"}
  ],
  cards:[
    ["Para que serve um índice?","Encontrar linhas rapidamente, sem varrer a tabela inteira."],
    ["Qual o custo de criar índices demais?","Ocupam espaço e deixam INSERT, UPDATE e DELETE mais lentos."],
    ["Onde mais vale indexar?","Colunas usadas em WHERE, JOIN e ORDER BY."],
