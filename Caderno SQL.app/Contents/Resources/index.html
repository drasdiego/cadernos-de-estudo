 {q:"NULLIF(a, b) retorna o que quando a e b são iguais?",o:["O valor de a","O valor de b","NULL","Um erro"],c:2,e:"NULLIF retorna NULL quando os dois são iguais; senão retorna o primeiro."},
 {q:"Qual a diferença entre ROUND e TRUNC?",o:["São iguais","ROUND arredonda; TRUNC corta os decimais","TRUNC arredonda; ROUND corta","Só funcionam com texto"],c:1,e:"ROUND arredonda para o mais próximo; TRUNC simplesmente corta os decimais."},
 {q:"Para decidir um valor conforme condições dentro do SELECT, usa-se:",o:["WHERE","CASE WHEN ... THEN ... END","GROUP BY","DISTINCT"],c:1,e:"CASE WHEN condição THEN resultado ELSE padrão END cria a lógica condicional na consulta."},
 {q:"O INNER JOIN retorna:",o:["Tudo das duas tabelas","Só as linhas que casam nas duas tabelas","Tudo da tabela da esquerda","Tudo da tabela da direita"],c:1,e:"INNER JOIN traz apenas a interseção: linhas com par nas duas tabelas."},
 {q:"O LEFT JOIN retorna:",o:["Só o que casa","Todas as linhas da esquerda; sem par na direita vem NULL","Todas as linhas da direita","Nada quando não há par"],c:1,e:"LEFT JOIN traz todas as linhas da tabela da esquerda; onde não há correspondência, as colunas da direita ficam NULL."},
 {q:"Para encontrar registros que NÃO têm correspondência em outra tabela, usa-se:",o:["INNER JOIN","LEFT JOIN com WHERE coluna IS NULL","GROUP BY","DISTINCT"],c:1,e:"Um LEFT JOIN seguido de WHERE coluna_da_direita IS NULL isola o que existe só na tabela da esquerda."},
 {q:"Qual a diferença entre UNION e UNION ALL?",o:["São iguais","UNION remove duplicatas; UNION ALL mantém todas","UNION ALL remove duplicatas; UNION mantém","UNION só funciona com números"],c:1,e:"UNION remove as linhas repetidas; UNION ALL mantém tudo e é mais rápido."},
 {q:"Para usar UNION, as duas consultas precisam ter:",o:["O mesmo nome de tabela","O mesmo número de colunas e tipos compatíveis","Um JOIN antes","Uma cláusula GROUP BY"],c:1,e:"As consultas devem ter o mesmo número de colunas, com tipos e ordem compatíveis."},
 {q:"JOIN e UNION se diferenciam porque:",o:["JOIN junta linhas e UNION junta colunas","JOIN junta colunas (lado a lado) e UNION empilha linhas","São a mesma coisa","UNION só funciona com uma tabela"],c:1,e:"JOIN combina colunas de tabelas lado a lado; UNION empilha linhas de consultas, uma embaixo da outra."},
 {q:"O que é uma subquery (subconsulta)?",o:["Uma tabela nova","Uma consulta dentro de outra consulta","Um tipo de JOIN","Uma chave primária"],c:1,e:"É um SELECT dentro de outro SELECT, usado como coluna ou como filtro."},
 {q:"O que é uma View?",o:["Uma cópia física da tabela","Uma tabela virtual: um SELECT salvo que não armazena dados","Um índice","Um backup"],c:1,e:"A view é uma tabela virtual (consulta salva); reflete os dados atuais e não ocupa espaço."},

function freshDB(){ const d=new SQLjs.Database(); d.run(SEED); return d; }
function execLast(db,sql){ const r=db.exec(sql); if(!r.length)return {empty:true}; const l=r[r.length-1]; return {columns:l.columns,values:l.values}; }
function runSQL(sql){ if(!dbReady)return {error:"Motor ainda carregando, tente novamente em instantes."}; try{ return execLast(DB,sql); }catch(e){ return {error:String(e&&e.message||e)}; } }

function setBadge(i,s){ const b=document.getElementById('exbadge'+i); if(!b)return; b.className='ex-badge '+s; b.textContent=s==='ok'?'✓ Correto':s==='no'?'✗ Ainda não':s==='err'?'⚠ Erro':''; }
function checkEx(i){
  const e=activeEx[i]; if(!e)return;
  const out=document.getElementById('exout'+i);
  const sql=(document.getElementById('ex'+i).value||'').trim();
  if(!sql){ setBadge(i,'no'); out.innerHTML='<div class="sql-empty">Escreva uma consulta antes de verificar.</div>'; return; }
  if(!dbReady){ out.innerHTML='<div class="sql-empty">Motor ainda carregando, tente em instantes.</div>'; return; }
  try{
    let got,exp;
    if(e.check){ const g=freshDB(); g.run(sql); got=execLast(g,e.check); g.close(); const x=freshDB(); x.run(e.sol); exp=execLast(x,e.check); x.close(); }
    else { const g=freshDB(); got=execLast(g,sql); g.close(); const x=freshDB(); exp=execLast(x,e.sol); x.close(); }
    const ok=normRows(got.values,e.ordered)===normRows(exp.values,e.ordered)&&(got.columns||[]).length===(exp.columns||[]).length;
    setBadge(i,ok?'ok':'no');
    out.innerHTML=gridHTML(got)+(ok?'<div class="sql-ok-msg">Resultado igual ao esperado. Muito bem.</div>':'<div class="sql-no-msg">Ainda não bate. Compare as linhas e ajuste. Dica: '+esc(e.dica)+'</div>');
  }catch(err){ setBadge(i,'err'); out.innerHTML='<div class="sql-err">'+esc(String(err&&err.message||err))+'</div>'; }
}

{ id:"viz-intro", num:"01", cat:"Fundamentos", title:"O que é Visualização de Dados", date:DATE1,

   {t:"tip",l:"Um pouco de história",h:"<p>No século 14, <strong>Nicole Oresme</strong> criou um dos primeiros gráficos de barras da história (obra \"The Latitude of Forms\") para mostrar a velocidade de um objeto acelerando ao longo do tempo. Ou seja: usar formas para entender fenômenos é coisa de séculos.</p>"},

{ id:"viz-preatentivos", num:"02", cat:"Percepção visual", title:"Atributos pré-atentivos", date:DATE1,
  blocks:[
   {t:"concept",l:"O que são",h:"<p><strong>Atributos pré-atentivos</strong> são informações que o cérebro processa <strong>instantaneamente</strong> (em milissegundos), antes mesmo da atenção consciente. São divididos em quatro grupos: forma, cor, posição e movimento.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Forma</th><th>Como destaca</th></tr><tr><td>Comprimento</td><td>Tamanhos diferentes comparam quantidades (barra maior = valor maior).</td></tr><tr><td>Espessura</td><td>Linhas mais grossas ou finas.</td></tr><tr><td>Orientação</td><td>Mudar o ângulo (uma diagonal entre verticais) chama atenção para anomalias.</td></tr><tr><td>Tamanho</td><td>Círculos maiores/menores indicam volume.</td></tr><tr><td>Forma / Curvatura</td><td>Um quadrado entre círculos; uma curva entre retas.</td></tr><tr><td>Encapsulamento</td><td>Uma borda em volta destaca que o dado pertence a um grupo.</td></tr><tr><td>Desfoque</td><td>Algo borrado parece menos importante / em segundo plano.</td></tr></table>"},
   {t:"table",h:"<table class='cmd'><tr><th>Cor</th><th>Como destaca</th></tr><tr><td>Matiz (hue)</td><td>Cores diferentes separam categorias (Maçã = vermelho, Limão = verde).</td></tr><tr><td>Intensidade</td><td>Tons mais claros ou escuros da mesma cor; escuro costuma indicar valor maior.</td></tr></table>"},
   {t:"table",h:"<table class='cmd'><tr><th>Posição / Movimento</th><th>Como destaca</th></tr><tr><td>Posição 2D</td><td>Um ponto fora da linha indica um outlier (fora da curva).</td></tr><tr><td>Agrupamento espacial</td><td>Elementos próximos formam aglomerados (clusters) relacionados.</td></tr><tr><td>Direção do movimento</td><td>Se todos vão para um lado e um vai para o oposto, este se destaca na hora.</td></tr></table>"},
   {t:"recap",l:"Na prática",h:"<p>Use um atributo pré-atentivo para destacar <strong>o que importa</strong> (uma cor diferente no item crítico, uma barra mais alta). Quem olha percebe na hora.</p>"}
  ],
  cards:[["O que são atributos pré-atentivos?","Informações que o cérebro processa instantaneamente, antes da atenção consciente."],
         ["Quais são os 4 grupos pré-atentivos?","Forma, cor, posição e movimento."],
         ["Para que serve o matiz (hue) da cor?","Separar categorias (cores diferentes para coisas diferentes)."]] },

{ id:"viz-precisao", num:"03", cat:"Percepção visual", title:"Escala de precisão e tipos de análise", date:DATE1,
  blocks:[
   {t:"concept",l:"Escala de precisão visual",h:"<p>Nem toda forma de mostrar dados é igualmente precisa. Existe uma escala do <strong>mais preciso</strong> (acurado) ao <strong>menos preciso</strong> (genérico) para o olho humano comparar.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Codificação</th><th>Precisão</th></tr><tr><td>Comprimento alinhado</td><td>Mais precisa (barras na mesma base — fácil de comparar).</td></tr><tr><td>Comprimento desalinhado</td><td>Precisa, mas exige mais esforço.</td></tr><tr><td>Inclinação / ângulo</td><td>Intermediária (pizza, linhas): difícil distinguir 30° de 35°.</td></tr><tr><td>Área / intensidade de cor</td><td>Menos precisa (bom para \"quem é maior\", não para o valor exato).</td></tr><tr><td>Volume (3D)</td><td>A mais difícil de julgar.</td></tr><tr><td>Matiz de cor</td><td>Serve só para diferenciar categorias, sem ordem de grandeza.</td></tr></table>"},
   {t:"tip",l:"Conclusão de design",h:"<p>Para comparar valores com precisão, prefira <strong>barras alinhadas</strong>. Evite 3D e pizza quando o leitor precisa ler valores exatos.</p>"},
   {t:"concept",l:"Os quatro tipos de análise",h:"<p>O objetivo do gráfico define a escolha. Há quatro perguntas-tipo:</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Tipo</th><th>Pergunta que responde</th></tr><tr><td>Comparação</td><td>Diferenças entre itens ou ao longo do tempo (qual vendeu mais?).</td></tr><tr><td>Relação</td><td>Como uma variável afeta a outra (mais propaganda = mais vendas?).</td></tr><tr><td>Distribuição</td><td>Com que frequência os dados aparecem (qual faixa etária predomina?).</td></tr><tr><td>Composição</td><td>As partes que formam o todo (quanto do gasto foi aluguel?).</td></tr></table>"},
   {t:"map",l:"Mapa de escolha — qual gráfico usar?",h:SVG_VIZ_ANALYSIS()},
   {t:"map",l:"Galeria — os principais gráficos",h:SVG_GALLERY()},
   {t:"recap",l:"Na prática",h:"<p>Antes de escolher o gráfico, defina a pergunta: comparação, relação, distribuição ou composição? Isso já elimina metade das opções. <strong>Exemplo no seu contexto:</strong> \"qual canal de atendimento teve mais chamados?\" é comparação (barras); \"o tempo de espera afeta a nota de satisfação?\" é relação (dispersão).</p>"}
  ],
  cards:[["Qual codificação é a mais precisa para comparar valores?","Comprimento alinhado (barras começando na mesma base)."],
         ["Quais os 4 tipos de análise em visualização?","Comparação, relação, distribuição e composição."],
         ["Análise de \"partes que formam o todo\" é qual tipo?","Composição."],
         ["Análise de \"como uma variável afeta outra\" é qual tipo?","Relação."]] },

{ id:"viz-comparacao", num:"04", cat:"Gráficos", title:"Gráficos de comparação", date:DATE1,
  blocks:[
   {t:"concept",l:"O que são",h:"<p>Gráficos de <strong>comparação</strong> colocam dados <strong>lado a lado</strong> para mostrar diferenças de tamanho ou intensidade. O cérebro identifica rápido o que é maior ou menor, sem ler tabelas longas.</p>"},
   {t:"concept",l:"Quando usar",h:"<p>Para achar o <strong>valor mais alto ou mais baixo</strong> de um conjunto, ou comparar valores atuais com antigos (este ano vs. ano passado) e ver crescimento ou queda.</p>"},
   {t:"h3",h:"Caminho 1 — Comparação entre itens"},
   {t:"plain",h:"<p>Quando você compara categorias que não dependem de ordem no tempo (marcas, produtos, regiões):</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Situação</th><th>Gráfico indicado</th></tr><tr><td>Duas variáveis por item</td><td>Colunas de largura variável (altura = um dado, largura = outro).</td></tr><tr><td>Uma variável, muitas categorias</td><td>Tabela com gráficos embutidos (evita poluição visual).</td></tr><tr><td>Uma variável, poucas categorias</td><td>Barras horizontais ou verticais.</td></tr></table>"},
   {t:"h3",h:"Caminho 2 — Comparação ao longo do tempo"},
   {t:"table",h:"<table class='cmd'><tr><th>Situação</th><th>Gráfico indicado</th></tr><tr><td>Muitos períodos, dados cíclicos (estações, horas)</td><td>Gráfico de área circular (como um relógio).</td></tr><tr><td>Muitos períodos, não-cíclicos (preço ao longo de 10 anos)</td><td>Gráfico de linha.</td></tr><tr><td>Poucos períodos, poucas categorias (jan vs. fev)</td><td>Barras verticais.</td></tr><tr><td>Poucos períodos, muitas categorias</td><td>Gráfico de linhas (para ver se seguem a mesma tendência).</td></tr></table>"},
   {t:"recap",l:"Na prática",h:"<p>Primeiro decida: comparar <strong>entre itens</strong> ou <strong>ao longo do tempo</strong>? E quantas categorias/períodos? Isso aponta direto para o gráfico certo. Para poucas categorias, barra simples resolve.</p>"}
  ],
  cards:[["Para que servem gráficos de comparação?","Colocar dados lado a lado para ver diferenças de tamanho/intensidade (maior/menor, atual vs. antigo)."],
         ["Poucas categorias, uma variável: qual gráfico?","Barras horizontais ou verticais."],
         ["Dados cíclicos ao longo do tempo: qual gráfico?","Gráfico de área circular (funciona como um relógio)."]] },

{ id:"viz-composicao", num:"05", cat:"Gráficos", title:"Gráficos de composição", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é composição",h:"<p>Composição é a análise de como um <strong>valor total se divide em partes</strong>. Mostra a \"fatia\" que cada categoria ocupa e a importância relativa de cada componente.</p>"},
   {t:"attr",l:"Relativo vs. absoluto",h:"<p><strong>Relativo:</strong> foca na porcentagem (\"temos 30% do mercado\").<br><strong>Absoluto:</strong> foca no valor real (\"vendemos 300 de um total de 1.000\"). A escolha do gráfico depende de qual dos dois importa.</p>"},
   {t:"h3",h:"Quando muda ao longo do tempo"},
   {t:"table",h:"<table class='cmd'><tr><th>Gráfico</th><th>Quando usar</th></tr><tr><td>Barras empilhadas 100%</td><td>Poucos períodos, só a diferença relativa (proporção).</td></tr><tr><td>Barras empilhadas</td><td>Poucos períodos, relativo E absoluto importam.</td></tr><tr><td>Área empilhada 100%</td><td>Muitos períodos, só a diferença relativa.</td></tr><tr><td>Área empilhada</td><td>Muitos períodos, relativo e absoluto importam.</td></tr></table>"},
   {t:"h3",h:"Estático (um único momento)"},
   {t:"table",h:"<table class='cmd'><tr><th>Gráfico</th><th>Quando usar</th></tr><tr><td>Pizza</td><td>Divisão simples, poucas categorias que somam 100%.</td></tr><tr><td>Cascata (waterfall)</td><td>Acumulação/subtração até um total (receita &rarr; impostos &rarr; custos &rarr; lucro).</td></tr><tr><td>Barras 100% com subcomponentes</td><td>Analisar os componentes dos componentes (gasto por área e, dentro, por subárea).</td></tr><tr><td>Tree map</td><td>Blocos proporcionais ao valor; bom para muitos dados hierárquicos de uma vez.</td></tr></table>"},
   {t:"tip",l:"Cuidado com a pizza",h:"<p>Pizza só funciona com <strong>poucas fatias</strong> (até 5-6). Com muitas categorias, as fatias ficam pequenas e impossíveis de comparar — prefira barras.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Pergunte: a composição muda <strong>no tempo</strong> ou é uma <strong>fotografia</strong>? E importa a porcentagem, o valor absoluto, ou os dois? Isso define o gráfico.</p>"}
  ],
  cards:[["O que é composição em visualização?","Como um valor total se divide em partes (a fatia de cada categoria)."],
         ["Relativo vs. absoluto?","Relativo = porcentagem; absoluto = valor real."],
         ["Quando o gráfico de pizza é adequado?","Para poucas categorias que somam 100%."],
         ["Para que serve o gráfico de cascata (waterfall)?","Mostrar acumulação/subtração até chegar a um total (ex.: da receita ao lucro)."]] },

{ id:"viz-distrib", num:"06", cat:"Gráficos", title:"Distribuição e relação", date:DATE1,
  blocks:[
   {t:"concept",l:"Distribuição",h:"<p>Mostra como os dados numéricos se <strong>espalham</strong>, do menor ao maior. Revela o \"formato\" dos dados: onde a maioria se concentra, a média e os valores fora do comum.</p>"},
   {t:"tip",l:"Termos",h:"<p><strong>Tendência central:</strong> valor em torno do qual os dados se agrupam. <strong>Outlier:</strong> valor muito fora do padrão. <strong>Range:</strong> distância entre o menor e o maior valor.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Gráfico</th><th>Quando usar</th></tr><tr><td>Histograma de barras</td><td>Uma variável, poucos pontos de dados.</td></tr><tr><td>Histograma de linha</td><td>Uma variável, muitos pontos (linha suaviza o \"contorno da montanha\").</td></tr><tr><td>Dispersão (scatter)</td><td>Distribuição considerando duas variáveis ao mesmo tempo.</td></tr></table>"},
   {t:"concept",l:"Relação",h:"<p>Mostra como duas ou mais variáveis se <strong>conectam ou influenciam</strong>. <strong>Correlação:</strong> padrão de dependência. <strong>Clusters:</strong> grupos que se formam por semelhança.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Gráfico</th><th>Quando usar</th></tr><tr><td>Dispersão simples</td><td>Relação entre duas variáveis (ex.: altura x peso).</td></tr><tr><td>Dispersão com bolha</td><td>Três variáveis: posição X, posição Y e o tamanho da bolha.</td></tr></table>"},
   {t:"recap",l:"Na prática",h:"<p><strong>Distribuição</strong> = formato e frequência (quantos? onde estão?). <strong>Relação</strong> = conexão entre variáveis (como um afeta o outro?).</p>"}
  ],
  cards:[["Para que serve um histograma?","Mostrar a distribuição/frequência de uma variável."],
         ["O que mostra um gráfico de dispersão?","A relação entre duas variáveis."],
         ["O que é um outlier?","Um valor muito fora do padrão do restante dos dados."]] },

{ id:"viz-cores", num:"07", cat:"Design", title:"Cores e posicionamento", date:DATE1,
  blocks:[
   {t:"concept",l:"Atenção e sobrecarga",h:"<p>Quanto <strong>mais gráficos</strong> numa tela, <strong>menos tempo</strong> as pessoas dedicam a cada um. Gráficos maiores prendem a atenção. Muitos elementos causam <strong>sobrecarga cognitiva</strong>.</p>"},
   {t:"attr",l:"Convenção dos 7 elementos",h:"<p>Use no máximo cerca de <strong>7 grandes elementos por dashboard</strong>, para não sobrecarregar a memória de trabalho de quem lê.</p>"},
   {t:"concept",l:"Teoria das cores",h:"<p><strong>Primárias:</strong> amarelo, vermelho, azul. <strong>Secundárias:</strong> laranja, roxo, verde (misturas de duas primárias). <strong>Terciárias:</strong> tons da mistura das anteriores. <strong>Complementares</strong> ficam em lados opostos do círculo e geram o maior contraste.</p>"},
   {t:"map",l:"Círculo cromático",h:SVG_COLORWHEEL()},
   {t:"table",h:"<table class='cmd'><tr><th>Uso da cor</th><th>Como aplicar</th></tr><tr><td>Avaliação qualitativa</td><td>Mostrar categorias/qualidade (\"melhor\", \"pior\"): cor primária + sua complementar (contraste).</td></tr><tr><td>Avaliação quantitativa</td><td>Mostrar números (0 a 100): gradiente (transição suave); só indica magnitude, sem julgamento.</td></tr></table>"},
   {t:"tip",l:"Posicionamento — a regra de ouro",h:"<p>O <strong>canto superior esquerdo</strong> é o melhor lugar para a informação mais importante, porque lemos de cima para baixo e da esquerda para a direita. Não espalhe estatísticas em locais aleatórios.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Menos é mais: poucos elementos grandes, cor com propósito (categoria = matiz; magnitude = gradiente) e o essencial no topo à esquerda.</p>"}
  ],
  cards:[["Quantos grandes elementos por dashboard?","No máximo cerca de 7, para evitar sobrecarga cognitiva."],
         ["Cor para categorias vs. para magnitude?","Categorias: matizes diferentes. Magnitude/números: gradiente da mesma cor."],
         ["Onde colocar a informação mais importante?","No canto superior esquerdo (início da leitura)."]] },

{ id:"viz-story", num:"08", cat:"Análise", title:"Storytelling e EDA", date:DATE1,
  blocks:[
   {t:"concept",l:"Storytelling com dados",h:"<p>Todo gráfico deve servir a uma mensagem. Valide sempre três pontos: a <strong>História</strong> (a narrativa dos dados), o <strong>Público</strong> (quem vai ler) e a <strong>Pergunta</strong> (o que o gráfico responde). Se não ajuda a responder a pergunta, é desnecessário.</p>"},
   {t:"concept",l:"EDA — Análise Exploratória de Dados",h:"<p><strong>EDA</strong> (Exploratory Data Analysis) é a <strong>investigação inicial</strong> dos dados: resumir características, identificar padrões, detectar outliers e entender relações. É o <strong>primeiro passo</strong>, antes de aplicar qualquer modelo.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Ferramentas da EDA</th><th>Exemplos</th></tr><tr><td>Estatística descritiva</td><td>Média, mediana, moda, variância, desvio padrão, quartis.</td></tr><tr><td>Gráficos</td><td>Histograma, dispersão, boxplot.</td></tr></table>"},
   {t:"tip",l:"Tipos de variáveis",h:"<p><strong>Categórica:</strong> rótulos sem ordem (gênero, cor). <strong>Quantitativa contínua:</strong> medições com casas decimais (altura, peso). <strong>Quantitativa discreta:</strong> contagens inteiras (nº de filhos, de carros).</p>"},
   {t:"tip",l:"Ferramentas e prática",h:"<p>Python (pandas, matplotlib, seaborn), R, Power BI e Tableau. Para praticar com dados reais, use o <strong>Kaggle</strong> (datasets públicos e notebooks).</p>"},
   {t:"recap",l:"Na prática",h:"<p>Antes de modelar, faça EDA: conheça o formato, os outliers e as relações. E ao apresentar, lembre da história, do público e da pergunta.</p>"}
  ],
  cards:[["Quais os 3 pilares do storytelling com dados?","História, Público e Pergunta."],
         ["O que é EDA?","Análise Exploratória de Dados: investigação inicial para resumir, achar padrões e outliers antes de modelar."],
         ["Variável contínua vs. discreta?","Contínua = medições com casas decimais (altura); discreta = contagens inteiras (nº de filhos)."]] }
];

{ id:"est-central", num:"01", cat:"Resumo dos dados", title:"Medidas de centralidade", date:DATE1,
  blocks:[
   {t:"concept",l:"O que são",h:"<p>Resumem um conjunto de dados num <strong>único número</strong> representativo (um valor \"típico\" ou central). Servem de referência para comparar grupos.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Medida</th><th>O que é</th></tr><tr><td>Média</td><td>Soma dos valores dividida pela quantidade. Sensível a valores extremos.</td></tr><tr><td>Mediana</td><td>Valor central com os dados ordenados (divide em duas metades). É robusta a extremos.</td></tr><tr><td>Moda</td><td>Valor que mais se repete. Serve até para dados não numéricos (categorias).</td></tr></table>"},
   {t:"tip",l:"Exemplo passo a passo",h:"<p>Dados ordenados: 1, 2, 2, 3, 3, 3, 4, 4, 6, 7 (10 valores).<br><strong>Média:</strong> soma = 35; 35 ÷ 10 = <strong>3,5</strong>.<br><strong>Mediana:</strong> média dos dois centrais (5º e 6º) = (3 + 3) ÷ 2 = <strong>3</strong>.<br><strong>Moda:</strong> o número 3 aparece três vezes = <strong>3</strong>.</p>"},
   {t:"tip",l:"Por que a mediana é robusta",h:"<p>Dados {1,2,2,3,3,3,4,4,6,7}: média 3,5, mediana 3. Trocando o 4 por <strong>40</strong>: a média salta para 7,1, mas a <strong>mediana continua 3</strong>. Por isso, com valores discrepantes, a mediana representa melhor a realidade.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Use a <strong>média</strong> em dados bem distribuídos; use a <strong>mediana</strong> quando houver outliers que distorcem a média.</p>"}
  ],
  cards:[["Média é sensível a quê?","A valores extremos (outliers), que a puxam para cima ou para baixo."],
         ["O que é a mediana?","O valor central com os dados ordenados; divide o conjunto em duas metades."],
         ["Quando preferir a mediana à média?","Quando há valores muito discrepantes (outliers)."],
         ["A moda serve para dados não numéricos?","Sim. A moda é o valor mais frequente e funciona até para categorias (ex.: cor mais vendida)."]] },

{ id:"est-dispersao", num:"02", cat:"Resumo dos dados", title:"Desvio padrão e variância", date:DATE1,
  blocks:[
   {t:"concept",l:"Desvio padrão",h:"<p>Mede o quanto os dados estão <strong>espalhados em relação à média</strong>. Quanto <strong>menor</strong>, mais homogêneos (e previsíveis) são os dados.</p>"},
   {t:"tip",l:"Exemplo",h:"<p>Notas (5, 5, 5): média 5, desvio <strong>zero</strong> (todos iguais). Notas (0, 5, 10): mesma média 5, mas desvio padrão <strong>alto</strong> (dados muito diferentes).</p>"},
   {t:"concept",l:"Variância",h:"<p>É a média dos <strong>quadrados</strong> das distâncias de cada ponto à média. O desvio padrão é a <strong>raiz quadrada</strong> da variância (volta à unidade original).</p>"},
   {t:"recap",l:"Na prática",h:"<p>Só a média não basta: dois grupos podem ter a mesma média e dispersões muito diferentes. O desvio padrão revela a confiabilidade dos dados.</p>"}
  ],
  cards:[["O que mede o desvio padrão?","O quanto os dados estão espalhados em relação à média."],
         ["Desvio padrão pequeno indica o quê?","Dados homogêneos e mais previsíveis."],
         ["Relação entre variância e desvio padrão?","O desvio padrão é a raiz quadrada da variância."]] },

{ id:"est-normal", num:"03", cat:"Distribuições", title:"Distribuição normal e box plot", date:DATE1,
  blocks:[
   {t:"concept",l:"Distribuição normal (curva de sino)",h:"<p>Também chamada de distribuição de <strong>Gauss</strong>: a maioria dos valores se agrupa no centro (em torno da média) e fica mais rara nas extremidades. Muitos fenômenos seguem esse padrão (altura, erros de medição).</p>"},
   {t:"map",l:"A curva de sino",h:SVG_NORMAL()},
   {t:"tip",l:"Testes de normalidade",h:"<p><strong>Shapiro-Wilk</strong> (amostras pequenas) e <strong>Shapiro-Francia</strong> (grandes) verificam se os dados realmente seguem o formato de sino.</p>"},
   {t:"concept",l:"Box plot (diagrama de caixa)",h:"<p>Resume os dados em cinco números: mínimo, 1º quartil (Q1), <strong>mediana</strong>, 3º quartil (Q3) e máximo. A caixa contém os 50% centrais; pontos fora dela são <strong>outliers</strong>.</p>"},
   {t:"map",l:"Anatomia do box plot",h:SVG_BOXPLOT()},
   {t:"tip",l:"Curtose e assimetria",h:"<p><strong>Curtose</strong> = achatamento: leptocúrtica (pico alto, dados concentrados) vs. platicúrtica (achatada, dados espalhados). <strong>Assimetria (skew):</strong> cauda para a esquerda (negativa, média &lt; mediana) ou para a direita (positiva, média &gt; mediana).</p>"},
   {t:"recap",l:"Na prática",h:"<p>O box plot é ótimo para comparar grupos e enxergar dispersão e outliers de relance; a curva normal é a base de muitos testes estatísticos.</p>"}
  ],
  cards:[["Qual o formato da distribuição normal?","De sino: maioria no centro, extremos raros."],
         ["O que o box plot mostra?","Mediana, quartis (Q1, Q3), mínimo, máximo e os outliers."],
         ["Assimetria positiva: média e mediana?","Cauda à direita; a média tende a ser maior que a mediana."]] },

{ id:"est-amostra", num:"04", cat:"Amostragem", title:"População e amostra", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é amostragem",h:"<p>Técnicas para selecionar uma <strong>amostra</strong> (parte) de uma <strong>população</strong> (o todo) e tirar conclusões sobre o todo. Existe porque medir todos costuma ser inviável (custo, tempo, acesso).</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Probabilística (aleatória)</th><th>Como funciona</th></tr><tr><td>Aleatória simples</td><td>Sorteio: todos têm a mesma chance.</td></tr><tr><td>Estratificada</td><td>Divide em estratos homogêneos e sorteia dentro de cada um.</td></tr><tr><td>Sistemática</td><td>Sorteia um início e segue um intervalo fixo (ex.: de 13 em 13).</td></tr><tr><td>Conglomerado</td><td>Divide em grupos heterogêneos e sorteia grupos inteiros.</td></tr></table>"},
   {t:"table",h:"<table class='cmd'><tr><th>Não probabilística</th><th>Como funciona</th></tr><tr><td>Conveniência</td><td>Escolhe os mais acessíveis (rápida e barata, mas pouco representativa).</td></tr><tr><td>Quotas</td><td>Por julgamento, até preencher uma quantidade definida de cada perfil.</td></tr></table>"},
   {t:"attr",l:"Representatividade",h:"<p>Uma boa amostra precisa: <strong>pertencer</strong> à população-alvo, ser <strong>isenta de tendência</strong> (não viciada), ter <strong>aleatoriedade</strong> e <strong>tamanho</strong> suficiente.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Probabilística quando precisa de rigor e generalização; não probabilística quando agilidade e custo importam mais que a precisão.</p>"}
  ],
  cards:[["População vs. amostra?","População = o todo; amostra = uma parte selecionada do todo."],
         ["Estratificada vs. conglomerado?","Estratificada: grupos homogêneos, sorteia dentro de cada. Conglomerado: grupos heterogêneos, sorteia grupos inteiros."],
         ["O que é uma amostra tendenciosa?","Uma amostra viciada, que não representa a população (ex.: entrevistar só torcedores na porta do estádio)."]] },

{ id:"est-correlacao", num:"05", cat:"Relações", title:"Correlação de Pearson", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é",h:"<p>Mede a <strong>força e a direção</strong> da relação <strong>linear</strong> entre duas variáveis quantitativas. O coeficiente <strong>r</strong> varia de <strong>-1 a +1</strong>.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Valor de r</th><th>Interpretação</th></tr><tr><td>+1</td><td>Positiva perfeita (sobem juntas).</td></tr><tr><td>-1</td><td>Negativa perfeita (uma sobe, a outra desce).</td></tr><tr><td>perto de ±1</td><td>Relação forte.</td></tr><tr><td>perto de 0</td><td>Relação fraca ou nenhuma.</td></tr></table>"},
   {t:"map",l:"As três correlações em dispersão",h:SVG_CORR()},
   {t:"attr",l:"Limitações",h:"<p>Só mede relação <strong>linear</strong> (relações curvas ela não enxerga); é <strong>sensível a outliers</strong>; exige variáveis contínuas.</p>"},
   {t:"tip",l:"Correlação não é causalidade",h:"<p>Duas variáveis subirem juntas <strong>não prova</strong> que uma causa a outra. Exemplo clássico: buscas por \"memes de gato\" se correlacionam com recalls de airbag — pura coincidência.</p>"},
   {t:"recap",l:"Na prática",h:"<p>Use Pearson para medir associação linear, mas sempre com olhar crítico: confirme com gráfico de dispersão e nunca confunda correlação com causa.</p>"}
  ],
  cards:[["A correlação de Pearson varia de quanto a quanto?","De -1 a +1."],
         ["r próximo de +1 significa?","Relação linear positiva forte (as variáveis sobem juntas)."],
         ["\"Correlação não implica...\"?","Causalidade. Subir junto não prova causa e efeito."]] },

{ id:"est-hipotese", num:"06", cat:"Inferência", title:"Teste de hipótese e teste t", date:DATE1,
  blocks:[
   {t:"concept",l:"Teste de hipótese",h:"<p>Método para tomar decisões sobre uma <strong>população</strong> a partir de uma <strong>amostra</strong>. Ajuda a separar uma diferença <strong>real</strong> de uma diferença por <strong>acaso</strong>.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Hipótese</th><th>O que afirma</th></tr><tr><td>H0 (nula)</td><td>Não há diferença/efeito (o \"padrão\"). É inocente até prova em contrário.</td></tr><tr><td>H1 (alternativa)</td><td>Há uma diferença/efeito real (o que se quer provar).</td></tr></table>"},
   {t:"concept",l:"Nível de significância (α) e valor-p",h:"<p><strong>α</strong> é o risco aceito de errar ao rejeitar H0 (padrão <strong>0,05</strong> = 5%). Se o <strong>valor-p &lt; α</strong>, rejeitamos H0 (resultado significativo).</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Erro</th><th>O que é</th></tr><tr><td>Tipo I (falso positivo)</td><td>Rejeitar H0 quando ela é verdadeira. Probabilidade = α.</td></tr><tr><td>Tipo II (falso negativo)</td><td>Não rejeitar H0 quando H1 é verdadeira.</td></tr></table>"},
   {t:"tip",l:"Teste t de Student",h:"<p>Compara as <strong>médias de dois grupos</strong> para ver se a diferença é significativa. É útil para <strong>amostras pequenas</strong> (criado por William Gosset, na cervejaria Guinness).</p>"},
   {t:"recap",l:"Na prática",h:"<p>Defina H0 e H1 e o α <strong>antes</strong> de olhar os dados; calcule o valor-p; se for menor que α, há evidência de diferença real. Significância estatística não é o mesmo que importância prática.</p>"}
  ],
  cards:[["O que é a hipótese nula (H0)?","A afirmação de que não há diferença/efeito; mantida até os dados a contrariarem."],
         ["O que é o nível de significância α?","O risco aceito de erro tipo I (falso positivo); padrão 0,05."],
         ["Erro tipo I vs. tipo II?","Tipo I = falso positivo (rejeitar H0 verdadeira). Tipo II = falso negativo (não rejeitar H0 falsa)."],
         ["Para que serve o teste t de Student?","Comparar as médias de dois grupos, útil em amostras pequenas."]] }
];

  blocks:[
   {t:"concept",l:"O que é DAX",h:"<p><strong>DAX</strong> (Data Analysis Expressions) é a linguagem de fórmulas do Power BI (parecida com o Excel, mas mais potente). Você referencia <strong>colunas pelo nome</strong>, não células.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th></th><th>Coluna calculada</th><th>Medida</th></tr><tr><td>Contexto</td><td>De linha (calcula linha a linha)</td><td>De filtro (agrega)</td></tr><tr><td>Armazenamento</td><td>Ocupa espaço (fica salva)</td><td>Calculada na hora</td></tr><tr><td>Filtros</td><td>Fixa, não reage</td><td>Reage aos filtros</td></tr><tr><td>Uso comum</td><td>Filtros e eixos</td><td>Valores e KPIs</td></tr></table>"},
   {t:"code",h:"<span class='cm'>-- Coluna calculada (linha a linha):</span>\n<span class='fn'>Vl. Total</span> = Vendas[Qtde] * Vendas[Vl.Unitario]\n\n<span class='cm'>-- Medidas (agregam):</span>\n<span class='fn'>Soma Vendas</span> = <span class='kw'>SUM</span>(Vendas[Vl. Total])\n<span class='fn'>% Vendas x Metas</span> = [Soma Vendas] / [Soma Metas] - 1"},
   {t:"tip",l:"Lendo a medida de %",h:"<p><code>[Soma Vendas] / [Soma Metas] - 1</code>. Se vendeu <strong>120</strong> e a meta era <strong>100</strong>: 120/100 − 1 = <strong>+0,20 (+20%)</strong>, bateu a meta. Se vendeu 80: 80/100 − 1 = <strong>−0,20 (−20%)</strong>, ficou abaixo. Formate como porcentagem para exibir certo.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Prefira <strong>medidas explícitas</strong> (criadas por você) às implícitas: são reutilizáveis. Organize todas numa tabela só, chamada \"Medidas\".</p>"},
   {t:"recap",l:"Na prática",h:"<p>Regra prática: precisa de um <strong>número que reage aos filtros</strong> (KPI)? Use <strong>medida</strong>. Precisa de algo fixo para <strong>filtrar/eixar</strong>? Use <strong>coluna calculada</strong>.</p>"}
  ],
  cards:[["O que é DAX?","A linguagem de fórmulas do Power BI, para criar cálculos sobre o modelo de dados."],
         ["Coluna calculada vs. medida?","Coluna: calcula linha a linha e ocupa espaço (fixa). Medida: agrega, é calculada na hora e reage aos filtros."],
         ["Quando usar uma medida?","Para valores e KPIs que mudam conforme os filtros do relatório."],
         ["Como ler [Soma Vendas]/[Soma Metas]-1?","É a diferença percentual: positivo bateu a meta, negativo ficou abaixo dela."]] },

{ id:"bi-visuais", num:"05", cat:"Relatórios", title:"Visualizações e filtros", date:DATE1,
  blocks:[
   {t:"concept",l:"Criando um visual (3 passos)",h:"<p>No modo Relatório: 1) escolha o <strong>tipo de gráfico</strong> no painel de Visualizações; 2) arraste os <strong>campos</strong> (ex.: Unidade para Legenda, Valor para Valores); 3) ajuste a aparência com o <strong>pincel</strong> (Formatar).</p>"},
   {t:"tip",l:"Cuidado ao criar",h:"<p>Se um gráfico estiver selecionado e você clicar em outro ícone, o Power BI <strong>muda o tipo</strong> daquele gráfico. Para criar um novo, clique antes numa <strong>área vazia</strong>.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Filtro</th><th>Alcance</th></tr><tr><td>Visual</td><td>Só o gráfico específico.</td></tr><tr><td>Página</td><td>Todos os visuais de uma página.</td></tr><tr><td>Relatório</td><td>Todas as páginas do arquivo.</td></tr><tr><td>Drillthrough</td><td>\"Mergulha\" no detalhe de um item em outra página.</td></tr></table>"},
   {t:"attr",l:"Atenção",h:"<p>Os filtros são <strong>cumulativos</strong> (se somam). Combinações mal planejadas podem deixar um gráfico <strong>vazio</strong> (ex.: filtrar SP na página e RJ no visual).</p>"},
   {t:"recap",l:"Na prática",h:"<p>Escolha o visual conforme a pergunta, formate para clareza e use o nível de filtro certo (visual, página ou relatório).</p>"}
  ],
  cards:[["Os 3 passos para criar um visual?","Escolher o tipo, arrastar os campos, formatar (pincel)."],
         ["Como criar um novo gráfico sem alterar outro?","Clicar numa área vazia antes de escolher o ícone do gráfico."],
         ["Diferença entre filtro de página e de relatório?","Página afeta só uma aba; relatório afeta todas as páginas do arquivo."]] },

  blocks:[
   {t:"concept",l:"Publicar",h:"<p>Do <strong>Desktop</strong> você clica em <strong>Publicar</strong> e escolhe um <strong>workspace</strong> no Service (nuvem). É como subir um vídeo para uma plataforma: o Desktop é o editor, o Service é onde todos assistem.</p>"},
   {t:"attr",l:"Conta",h:"<p>E-mails <strong>pessoais</strong> (Gmail, Outlook, Hotmail) <strong>não</strong> são aceitos. Só e-mails <strong>corporativos ou institucionais</strong>.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Forma</th><th>Característica</th></tr><tr><td>Compartilhamento privado</td><td>Botão Compartilhar. Exige licença Pro dos dois lados. Seguro: só quem tem permissão acessa.</td></tr><tr><td>Publicar na Web</td><td>Gera link público. QUALQUER pessoa com o link acessa. Nunca use para dados sensíveis (LGPD).</td></tr></table>"},
   {t:"recap",l:"Na prática",h:"<p>Para dados internos/sigilosos, use o compartilhamento <strong>privado</strong> (Pro). \"Publicar na Web\" só para conteúdo realmente público.</p>"}
  ],
  cards:[["De onde se publica um relatório?","Do Power BI Desktop (botão Publicar) para um workspace no Service."],
         ["Que tipo de e-mail o Power BI exige?","Corporativo ou institucional; e-mails pessoais não são aceitos."],
         ["O que é \"Publicar na Web\"?","Gera um link público acessível por qualquer pessoa — perigoso para dados sensíveis."]] }

{ id:"ia-llm", num:"02", cat:"Linguagem", title:"LLMs — modelos de linguagem", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é um LLM",h:"<p><strong>LLM</strong> (Large Language Model) é um modelo de NLP treinado em <strong>vastos volumes de texto</strong> com aprendizado profundo, para entender e gerar linguagem humana. Usa redes neurais <strong>transformadoras</strong> para prever a próxima palavra de uma sequência.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Aplicações</th><th>Limitações</th></tr><tr><td>Chatbots e assistentes virtuais.</td><td>Alucinação: inventar fatos com convicção.</td></tr><tr><td>Resumo de documentos.</td><td>Viés herdado dos dados de treino.</td></tr><tr><td>Análise de sentimentos.</td><td>Precisam de verificação humana.</td></tr></table>"},
   {t:"tip",l:"Transformers",h:"<p>É a arquitetura que permite ao modelo <strong>focar nas partes mais importantes</strong> de uma frase para entender o contexto (o \"T\" do GPT).</p>"},
   {t:"recap",l:"Na prática",h:"<p>LLMs são ótimos com texto, mas podem \"alucinar\" e carregar vieses. Use, mas <strong>sempre confira</strong> fatos e números.</p>"}
  ],
  cards:[["O que faz um LLM?","Entende e gera linguagem humana, prevendo a próxima palavra com base em muito texto."],
         ["O que é \"alucinação\" em LLMs?","Inventar fatos incorretos com aparência de verdade."],
         ["O que são transformers?","A arquitetura de IA que foca nas partes importantes da frase para captar o contexto."]] },

{ id:"ia-gen", num:"03", cat:"Geração", title:"IA Generativa", date:DATE1,
  blocks:[
   {t:"concept",l:"O que é",h:"<p>Algoritmos que <strong>criam novos dados</strong> (imagens, textos, música). Diferente da IA tradicional (que só <strong>analisa</strong> o que existe), a generativa <strong>cria</strong> amostras parecidas com os dados de entrada. A tradicional é o crítico de arte; a generativa é o artista.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Como funciona</th><th>Detalhe</th></tr><tr><td>GANs</td><td>Duas redes competem: uma cria, a outra avalia se é real ou falso — forçando precisão.</td></tr><tr><td>Transformers (GPT)</td><td>Excelentes em entender sequência e contexto (texto).</td></tr><tr><td>Treinamento &rarr; Geração</td><td>Aprende com muitos dados; depois gera novas instâncias semelhantes.</td></tr></table>"},
   {t:"table",h:"<table class='cmd'><tr><th>Aplicações para dados</th></tr><tr><td>Dados sintéticos (expandir bases escassas ou proteger privacidade).</td></tr><tr><td>Automação de relatórios com narrativa gerada.</td></tr><tr><td>Cenários hipotéticos (\"e se o dólar subir 20%?\").</td></tr></table>"},
   {t:"attr",l:"Ética e limites",h:"<p>Cuidado com <strong>qualidade</strong> (artefatos/erros), <strong>viés</strong> (amplia preconceitos dos dados) e <strong>privacidade</strong>. Nunca confie 100%: revisão humana é obrigatória.</p>"},
   {t:"recap",l:"Na prática",h:"<p>A IA generativa cria conteúdo e dados sintéticos úteis para análise, mas exige checagem crítica de qualidade, viés e privacidade.</p>"}
  ],
  cards:[["IA generativa, diferente da tradicional, faz o quê?","Cria novos dados (imagens, textos), em vez de apenas analisar os existentes."],
         ["O que são GANs?","Duas redes que competem (uma cria, a outra avalia), melhorando a qualidade do que é gerado."],
         ["Principais riscos da IA generativa?","Erros (artefatos), viés dos dados e privacidade — exige revisão humana."]] }

{ id:"py-tipos", num:"02", cat:"Fundamentos", title:"Tipos embutidos e variáveis", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Tema 01 (saber rodar um print e importar um módulo).</p>"},
   {t:"concept",l:"O que é",h:"<p>Uma <strong>variável</strong> é um nome que aponta para um valor guardado na memória. Um <strong>tipo</strong> diz que espécie de valor é: número, texto, verdadeiro/falso.</p>"},
   {t:"concept",l:"Por que importa",h:"<p>Quase todo programa guarda e transforma dados. Errar o tipo (texto onde devia ser número) é uma das causas mais comuns de bug.</p>"},
   {t:"concept",l:"Quando usar cada tipo",h:"<p>int para contagens, float para medidas com decimais, str para texto, bool para sim/não, None para \"ainda não tem valor\".</p>"},
   {t:"concept",l:"Como funciona",h:"<p>O tipo pertence ao valor, não ao nome. Por isso o mesmo nome pode receber um número e depois um texto. Você descobre o tipo com <code>type(x)</code>.</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Tipo</th><th>Para que serve</th></tr><tr><td>int</td><td>Inteiros, sem limite fixo de tamanho.</td></tr><tr><td>float</td><td>Números com casas decimais.</td></tr><tr><td>str</td><td>Texto (imutável).</td></tr><tr><td>bool</td><td>True ou False (é um subtipo de int).</td></tr><tr><td>None</td><td>Ausência de valor.</td></tr></table>"},
   {t:"code",h:"<span class='cm'># Exemplo concreto</span>\nnome = <span class='st'>\"Ana\"</span>     <span class='cm'># str</span>\nidade = 28        <span class='cm'># int</span>\naltura = 1.65     <span class='cm'># float</span>\nprint(type(idade))           <span class='cm'># &lt;class 'int'&gt;</span>\nprint(<span class='st'>f\"{nome}, {idade} anos\"</span>)  <span class='cm'># f-string</span>"},
   {t:"attr",l:"Erros comuns",h:"<p><strong>float não é exato:</strong> <code>0.1 + 0.2</code> dá 0.30000000000000004. Para dinheiro, arredonde ou use <code>decimal</code>. Comparar com None com <code>==</code>: o certo é <code>is None</code>.</p>"},
   {t:"tip",l:"Boas práticas",h:"<p>Use f-strings (texto começando com <code>f</code> e variáveis entre chaves) para montar mensagens. Dê nomes que dizem o que a variável guarda.</p>"},
   {t:"plain",h:"<p><strong>Exercícios graduais</strong></p><ul><li><strong>Básico:</strong> crie nome (str), idade (int), altura (float) e imprima os três numa f-string.</li><li><strong>Intermediário:</strong> some duas strings de número convertendo com <code>int()</code>.</li><li><strong>Avançado:</strong> mostre que <code>0.1 + 0.2 == 0.3</code> é False e conserte com <code>round(x, 2)</code>.</li></ul>"},
   {t:"code",h:"<span class='cm'># Soluções</span>\nnome, idade, altura = <span class='st'>\"Ana\"</span>, 28, 1.65\nprint(<span class='st'>f\"{nome}, {idade} anos, {altura}m\"</span>)\nprint(int(<span class='st'>\"3\"</span>) + int(<span class='st'>\"4\"</span>))           <span class='cm'># 7</span>\nprint(round(0.1 + 0.2, 2) == 0.3)  <span class='cm'># True</span>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>int (inteiro), float (decimal, inexato), str (texto), bool (True/False), None. O tipo é do valor. Formate com f-strings. Compare None com <code>is</code>.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p><strong>O que cai:</strong> por que 0.1 + 0.2 não é 0.3; diferença entre <code>==</code> (valor) e <code>is</code> (mesmo objeto). <strong>Pergunta de recrutador:</strong> \"Como você guardaria um valor em dinheiro com segurança?\" Resposta: usar <code>decimal.Decimal</code>, não float.</p>"},
   {t:"plain",h:"<p><strong>Mapa mental</strong></p><ul><li>Tipos<ul><li>Números: int, float</li><li>Texto: str (imutável)</li><li>Lógico: bool</li><li>Vazio: None</li></ul></li><li>Ferramentas: type(), f-strings, is None</li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><strong>Mini-projeto:</strong> peça nome e ano de nascimento com <code>input()</code> e imprima a idade. <strong>Conecta com o próximo:</strong> para guardar muitos valores juntos, você usa estruturas de dados, que é o tema 03.</p>"}
  ],
  cards:[["O que é uma variável em Python?","Um nome que aponta para um valor na memória; o tipo pertence ao valor."],
         ["Por que 0.1 + 0.2 não é igual a 0.3?","Porque float usa representação binária, que não guarda esses decimais com exatidão."],
         ["== versus is?","== compara o valor; is compara se é o mesmo objeto. Use is None."],
         ["Como guardar dinheiro com segurança?","Com decimal.Decimal (ou arredondando), nunca com float puro."]] },

{ id:"py-estruturas", num:"03", cat:"Estruturas de dados", title:"list, tuple, dict e set", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 01 e 02 (variáveis e tipos).</p>"},
   {t:"concept",l:"O que é",h:"<p>São coleções: formas de guardar vários valores numa só variável. O Python tem quatro principais: <strong>list, tuple, dict e set</strong>.</p>"},
   {t:"concept",l:"Por que importa",h:"<p>Escolher a coleção certa deixa o código mais claro e mais rápido. É um dos temas que mais aparece em entrevista.</p>"},
   {t:"concept",l:"Quando usar (analogia)",h:"<p><strong>list:</strong> uma fila de tarefas que muda. <strong>tuple:</strong> uma coordenada (x, y) que não muda. <strong>dict:</strong> uma agenda (nome do contato leva ao telefone). <strong>set:</strong> um saco de etiquetas, sem repetidas.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>list e tuple guardam por <strong>ordem</strong> (posição). dict guarda por <strong>chave</strong>. set guarda valores <strong>únicos</strong>. list e dict e set podem mudar; tuple não muda (é imutável).</p>"},
   {t:"table",h:"<table class='cmd'><tr><th>Coleção</th><th>Característica</th></tr><tr><td>list</td><td>Ordenada, muda. [1, 2, 3]</td></tr><tr><td>tuple</td><td>Ordenada, não muda. (1, 2)</td></tr><tr><td>dict</td><td>Chave para valor. {'a': 1}</td></tr><tr><td>set</td><td>Sem repetidos, sem ordem. {1, 2}</td></tr></table>"},
   {t:"code",h:"<span class='cm'># Exemplo concreto de cada uma</span>\nnums = [3, 1, 2]; nums.sort()   <span class='cm'># list -&gt; [1, 2, 3]</span>\nponto = (10, 20)                 <span class='cm'># tuple</span>\npessoa = {<span class='st'>\"nome\"</span>: <span class='st'>\"Ana\"</span>}     <span class='cm'># dict</span>\nprint(pessoa.get(<span class='st'>\"email\"</span>, <span class='st'>\"sem\"</span>))  <span class='cm'># default seguro</span>\nprint(set([1, 1, 2]))            <span class='cm'># {1, 2}</span>"},
   {t:"attr",l:"Erros comuns",h:"<p><strong>Apelido (aliasing):</strong> <code>b = a</code> não copia a lista; mexer em b mexe em a. Copie com <code>a.copy()</code>. Chave de dict precisa ser imutável: tupla pode, lista não. Não apague itens de uma lista enquanto a percorre.</p>"},
   {t:"tip",l:"Boas práticas e performance (fato)",h:"<p>Procurar um item é <strong>O(1)</strong> em set e dict (quase instantâneo) e <strong>O(n)</strong> em list (percorre tudo). O(1) e O(n) descrevem como o tempo cresce com o tamanho. Para muitas buscas, use set ou dict.</p>"},
   {t:"plain",h:"<p><strong>Exercícios graduais</strong></p><ul><li><strong>Básico:</strong> ordene [5, 3, 9, 1] e pegue o maior e o menor.</li><li><strong>Intermediário:</strong> conte quantas vezes cada palavra aparece numa frase, com um dict.</li><li><strong>Avançado:</strong> ache os itens em comum entre duas listas, sem repetir, com set.</li></ul>"},
   {t:"code",h:"<span class='cm'># Soluções</span>\nl = sorted([5, 3, 9, 1]); print(l[0], l[-1])   <span class='cm'># 1 9</span>\n\ncont = {}\n<span class='kw'>for</span> p <span class='kw'>in</span> <span class='st'>\"a casa a flor\"</span>.split():\n    cont[p] = cont.get(p, 0) + 1\nprint(cont)\n\nprint(set([1,2,3]) &amp; set([2,3,4]))   <span class='cm'># {2, 3}</span>"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>list (ordenada, muda), tuple (ordenada, não muda), dict (chave para valor), set (únicos). Busca rápida (O(1)) em dict e set. Cuidado com apelido; use .copy e .get.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p><strong>O que cai:</strong> complexidade de busca em list vs dict/set; por que tupla pode ser chave e lista não. <strong>Pergunta de recrutador:</strong> \"Como você removeria duplicatas de uma lista?\" Resposta: <code>set(lista)</code>.</p>"},
   {t:"plain",h:"<p><strong>Mapa mental</strong></p><ul><li>Coleções<ul><li>Por ordem: list (muda), tuple (não muda)</li><li>Por chave: dict</li><li>Únicos: set</li></ul></li><li>Busca rápida: dict, set (O(1))</li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><strong>Mini-projeto:</strong> guarde 3 contatos num dict (nome para telefone) e imprima cada um. <strong>Conecta com o próximo:</strong> para percorrer essas coleções e decidir o que fazer, você usa controle de fluxo, o tema 04.</p>"}
  ],
  cards:[["Quando usar dict em vez de list?","Quando você busca por uma chave (ex.: nome para telefone) e quer busca rápida (O(1))."],
         ["Por que uma lista não pode ser chave de dict?","Porque chaves precisam ser imutáveis e hashable; a lista muda, a tupla não."],
         ["Como remover duplicatas de uma lista?","Convertendo para set: set(lista)."],
         ["O que é aliasing (apelido) de lista?","Quando b = a faz os dois nomes apontarem para a mesma lista; mudar um muda o outro. Copie com a.copy()."]] },

{ id:"py-fluxo", num:"04", cat:"Lógica", title:"Controle de fluxo e compreensões", date:DATE1,
  blocks:[
   {t:"tip",l:"Pré-requisitos",h:"<p>Temas 02 e 03 (tipos e coleções).</p>"},
   {t:"concept",l:"O que é",h:"<p>Controle de fluxo é decidir <strong>o que o programa faz</strong> em cada situação e <strong>repetir</strong> ações. As peças são <code>if</code> (decisão), <code>for</code> e <code>while</code> (repetição).</p>"},
   {t:"concept",l:"Por que importa",h:"<p>Sem decisão e repetição, um programa só faz uma coisa fixa. É o que dá inteligência ao código.</p>"},
   {t:"concept",l:"Quando usar",h:"<p><code>if</code> quando há caminhos diferentes. <code>for</code> quando você sabe o que percorrer (uma lista). <code>while</code> quando repete até uma condição mudar.</p>"},
   {t:"concept",l:"Como funciona",h:"<p>O Python usa <strong>indentação</strong> (recuo, 4 espaços) para marcar o que está dentro de cada bloco, em vez de chaves. O bloco recuado pertence ao if ou ao for acima.</p>"},
   {t:"code",h:"<span class='cm'># Decisão</span>\nidade = 20\n<span class='kw'>if</span> idade &gt;= 18:\n    print(<span class='st'>\"maior\"</span>)\n<span class='kw'>else</span>:\n    print(<span class='st'>\"menor\"</span>)\n\n<span class='cm'># Repetição com índice e valor</span>\n<span class='kw'>for</span> pos, nome <span class='kw'>in</span> enumerate([<span class='st'>\"Ana\"</span>, <span class='st'>\"Bia\"</span>]):\n    print(pos, nome)   <span class='cm'># 0 Ana / 1 Bia</span>"},
   {t:"concept",l:"Compreensão (comprehension)",h:"<p>Uma <strong>compreensão de lista</strong> (list comprehension) cria uma lista nova a partir de outra, em uma linha. É mais curto e legível que um loop com <code>append</code>.</p>"},
   {t:"code",h:"<span class='cm'># Lógica: para cada n de 0 a 9, se for par, guarde o quadrado</span>\nquad = [n*n <span class='kw'>for</span> n <span class='kw'>in</span> range(10) <span class='kw'>if</span> n % 2 == 0]\nprint(quad)   <span class='cm'># [0, 4, 16, 36, 64]</span>"},
   {t:"attr",l:"Erros comuns",h:"<p>Misturar tabulação e espaços (erro de indentação). Esquecer que <code>range(n)</code> vai de 0 a n-1. Fazer compreensões aninhadas demais, que ficam ilegíveis.</p>"},
   {t:"tip",l:"Boas práticas (comparação de abordagens)",h:"<p>Prefira <code>for item in lista</code> a <code>for i in range(len(lista))</code>. Use <code>enumerate</code> se precisar do índice. Use compreensão quando ela cabe em uma linha clara; senão, um loop normal é melhor.</p>"},
   {t:"plain",h:"<p><strong>Exercícios graduais</strong></p><ul><li><strong>Básico:</strong> imprima os pares de 1 a 10.</li><li><strong>Intermediário:</strong> com uma compreensão, gere o tamanho de cada palavra de uma frase.</li><li><strong>Avançado:</strong> com enumerate, crie um dict que liga cada nome à sua posição.</li></ul>"},
   {t:"code",h:"<span class='cm'># Soluções</span>\nprint([n <span class='kw'>for</span> n <span class='kw'>in</span> range(1, 11) <span class='kw'>if</span> n % 2 == 0])\nprint([len(p) <span class='kw'>for</span> p <span class='kw'>in</span> <span class='st'>\"o gato preto\"</span>.split()])\nnomes = [<span class='st'>\"Ana\"</span>, <span class='st'>\"Bia\"</span>]\nprint({n: i <span class='kw'>for</span> i, n <span class='kw'>in</span> enumerate(nomes)})"},
   {t:"recap",l:"O que preciso lembrar",h:"<p>if decide; for e while repetem; indentação marca os blocos. enumerate dá índice e valor. Compreensão cria listas em uma linha.</p>"},
   {t:"tip",l:"Em entrevistas",h:"<p><strong>O que cai:</strong> diferença entre compreensão de lista (cria tudo na memória) e generator (gera sob demanda); o que é for/else. <strong>Pergunta de recrutador:</strong> \"Como percorrer índice e valor ao mesmo tempo?\" Resposta: <code>enumerate</code>.</p>"},
   {t:"plain",h:"<p><strong>Mapa mental</strong></p><ul><li>Fluxo<ul><li>Decisão: if / elif / else</li><li>Repetição: for, while</li><li>Ajudantes: range, enumerate, zip</li></ul></li><li>Atalho: compreensão (list/dict/set)</li></ul>"},
   {t:"tip",l:"Mini-projeto e conexão",h:"<p><strong>Mini-projeto:</strong> percorra uma lista de notas e imprima \"aprovado\" para nota maior ou igual a 7. <strong>Conecta com o próximo:</strong> para reaproveitar lógica, você agrupa tudo em funções, o próximo passo do caderno.</p>"}
  ],
  cards:[["Como o Python marca blocos de código?","Por indentação (recuo de 4 espaços), em vez de chaves."],
         ["Para que serve enumerate?","Percorrer obtendo índice e valor ao mesmo tempo, sem usar range(len(...))."],
         ["List comprehension versus generator?","A compreensão cria a lista toda na memória; o generator gera item a item sob demanda, poupando memória."],
         ["O que range(5) gera?","Os números de 0 a 4 (de 0 até n-1)."]] }
];

 {q:"Quais destes valores são falsy?",o:["1, 'a', [1]","0, '', [], None","True, 'x'","Apenas None"],c:1,e:"Zero, string e coleções vazias e None são falsy; o resto é truthy."},

const SUBJECTS = {
  sql:        { name:"SQL", code:"SQL", themes:SQL_THEMES, quiz:SQL_QUIZ, themeEx:SQL_THEMEEX, practice:true, ready:true },
  viz:        { name:"Visualização de Dados", code:"VIZ", themes:VIZ_THEMES, quiz:VIZ_QUIZ, themeEx:{}, practice:false, ready:true },
  estatistica:{ name:"Estatística", code:"EST", themes:EST_THEMES, quiz:EST_QUIZ, themeEx:{}, practice:false, ready:true },
  powerbi:    { name:"Power BI", code:"BI", themes:BI_THEMES, quiz:BI_QUIZ, themeEx:{}, practice:false, ready:true },
  ia:         { name:"Inteligência Artificial", code:"IA", themes:IA_THEMES, quiz:IA_QUIZ, themeEx:{}, practice:false, ready:true },
  python:     { name:"Python", code:"PY", themes:PY_THEMES, quiz:PY_QUIZ, themeEx:{}, practice:false, ready:true }
};
let curSubject='sql';
let THEMES=SUBJECTS.sql.themes, QUIZ=SUBJECTS.sql.quiz, THEME_EX=SUBJECTS.sql.themeEx;

const store = {
  get studied(){ try{return JSON.parse(localStorage.getItem('studied_'+curSubject)||'[]')}catch(e){return[]} },
  set studied(v){ localStorage.setItem('studied_'+curSubject, JSON.stringify(v)) },
  get best(){ return +(localStorage.getItem('quizbest_'+curSubject)||0) },
  set best(v){ localStorage.setItem('quizbest_'+curSubject, v) },
  get theme(){ return localStorage.getItem('app_theme')||'light' },
  set theme(v){ localStorage.setItem('app_theme', v) }
};
let mode='study', current=THEMES.length?THEMES[0].id:null;

function loadSubject(id){
  curSubject=id; const s=SUBJECTS[id];
  THEMES=s.themes; QUIZ=s.quiz; THEME_EX=s.themeEx;
  current = THEMES.length? THEMES[0].id : null;
  mode='study';
  const logo=document.querySelector('.logo'); if(logo) logo.textContent=s.code;
  const sub=document.querySelector('.brand p'); if(sub) sub.textContent = s.ready? 'App de estudos · offline' : 'matéria em breve';
  const modes=document.querySelector('.modes'); if(modes) modes.style.display = s.ready?'flex':'none';
  const pb=document.querySelector('.modes button[data-mode="practice"]'); if(pb) pb.style.display = s.practice?'':'none';
  const se=document.getElementById('subjectSel'); if(se) se.value=id;
  fillThemeSel();
  setModeUI(); render();
}

const $=s=>document.querySelector(s);
const content=$('#content'), sidebar=$('#sidebar');

function isDone(id){ return store.studied.includes(id) }
function toggleDone(id){ let s=store.studied; s.includes(id)? s=s.filter(x=>x!==id): s.push(id); store.studied=s }

function renderSidebar(){
  const studied=store.studied, total=THEMES.length, n=studied.length, pct=Math.round(n/total*100);
  const cats=[...new Set(THEMES.map(t=>t.cat))];
  let html=`<div class="progress-card"><div class="row"><b>Seu progresso</b><span class="pct">${pct}%</span></div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div style="font-size:12px;color:var(--muted);margin-top:8px">${n} de ${total} temas estudados</div></div>`;
  cats.forEach(cat=>{
    html+=`<div class="cat-label">${cat}</div>`;
    THEMES.filter(t=>t.cat===cat).forEach(t=>{
      html+=`<button class="nav-item ${t.id===current?'on':''} ${isDone(t.id)?'done':''}" onclick="go('${t.id}')">
        <span class="dot">${isDone(t.id)?'✓':''}</span><span class="nt">${t.num}. ${t.title}</span></button>`;
    });
  });
  sidebar.innerHTML=html;
}

function fillThemeSel(){ const sel=document.getElementById('themeSel'); if(!sel)return; if(!THEMES.length){sel.innerHTML='';return;} sel.innerHTML=THEMES.map(t=>'<option value="'+t.id+'">'+t.num+'. '+t.title+'</option>').join(''); if(current)sel.value=current; }

function blockHTML(b){
  if(b.t==='h3') return `<h3 class="sub">${b.h}</h3>`;
  if(b.t==='plain') return `<div style="margin:10px 0">${b.h}</div>`;
  if(b.t==='table') return b.h;
  if(b.t==='code') return `<div class="code"><span class="label">Código SQL <button class="copy" onclick="copyCode(this)">copiar</button></span><pre>${b.h}</pre></div>`;
  const lab=b.l?`<span class="label">${b.l}</span>`:'';
  return `<div class="block ${b.t}">${lab}${b.h}</div>`;
}

function renderStudy(){
  fillThemeSel();
  const t=THEMES.find(x=>x.id===current);
  const idx=THEMES.indexOf(t), prev=THEMES[idx-1], next=THEMES[idx+1], done=isDone(t.id);
  content.innerHTML=`<div class="theme-wrap">
    <div class="crumb">${t.cat}</div>
    <div class="theme-head"><h2><span class="tnum">${t.num}</span>${t.title}</h2><div class="th-meta"><span class="when">estudado em ${t.date}</span><button class="icon-btn" onclick="toggleTheme()" title="Tema claro/escuro">◐</button></div></div>
    ${t.blocks.map(blockHTML).join('')}
    ${(THEME_EX[t.id]&&THEME_EX[t.id].length)?('<h3 class="sub">Exercícios deste tema</h3>'+renderExList(THEME_EX[t.id])):''}
    <div class="theme-foot">
      <button class="btn ${done?'done':'primary'}" id="doneBtn" onclick="markDone('${t.id}')">${done?'✓ Estudado':'Marcar como estudado'}</button>
      <div class="navbtns">
        ${prev?`<button class="btn" onclick="go('${prev.id}')">← ${prev.num}</button>`:''}
        ${next?`<button class="btn" onclick="go('${next.id}')">${next.num} →</button>`:''}
      </div>
    </div></div>`;
  content.scrollTop=0;
}
function markDone(id){ toggleDone(id); const b=document.getElementById('doneBtn'); const d=isDone(id); if(b){ b.className='btn '+(d?'done':'primary'); b.textContent=d?'✓ Estudado':'Marcar como estudado'; } renderSidebar(); }
function go(id){ current=id; mode='study'; setModeUI(); renderSidebar(); renderStudy(); }
function copyCode(btn){
  const pre=btn.closest('.code').querySelector('pre');
  navigator.clipboard.writeText(pre.innerText).then(()=>{btn.textContent='copiado!';setTimeout(()=>btn.textContent='copiar',1200)});
}

let deck=[], fi=0, flipped=false;
function buildDeck(){ deck=[]; THEMES.forEach(t=>(t.cards||[]).forEach(c=>deck.push({q:c[0],a:c[1],cat:t.title}))); }
function renderCards(){
  if(!deck.length) buildDeck();
  const c=deck[fi];
  content.innerHTML=`<div class="center-wrap">
    <div class="fc-counter">Cartão ${fi+1} de ${deck.length} · ${c.cat}</div>
    <div class="card ${flipped?'flip':''}" id="card" onclick="flip()">
      <div class="card-inner">
        <div class="face front"><span class="tag">Pergunta</span><div class="q">${c.q}</div><div class="hint">clique para ver a resposta</div></div>
        <div class="face back"><span class="tag">Resposta</span><div class="a">${c.a}</div></div>
      </div></div>
    <div class="fc-controls">
      <button class="btn" onclick="prevCard()">← Anterior</button>
      <button class="btn" onclick="shuffle()">↺ Embaralhar</button>
      <button class="btn primary" onclick="nextCard()">Próximo →</button>
    </div></div>`;
}
function flip(){ flipped=!flipped; $('#card').classList.toggle('flip'); }
function nextCard(){ fi=(fi+1)%deck.length; flipped=false; renderCards(); }
function prevCard(){ fi=(fi-1+deck.length)%deck.length; flipped=false; renderCards(); }
function shuffle(){ for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]]} fi=0;flipped=false;renderCards(); }

let qi=0, qscore=0, qorder=[], answered=false;
function startQuiz(){ qi=0;qscore=0;answered=false; qorder=QUIZ.map((_,i)=>i); renderQuiz(); }
function renderQuiz(){
  if(qi>=QUIZ.length) return renderResult();
  const q=QUIZ[qorder[qi]];
  content.innerHTML=`<div class="center-wrap" style="max-width:640px">
    <div class="fc-counter">Pergunta ${qi+1} de ${QUIZ.length} · acertos: ${qscore}</div>
    <div class="quiz-q"><div class="qn">Quiz</div><h3>${q.q}</h3>
      <div id="opts">${q.o.map((o,i)=>`<button class="opt" onclick="answer(${i})">${o}</button>`).join('')}</div>
      <div id="exp"></div>
      <div id="qnav" style="text-align:right;margin-top:14px"></div>
    </div></div>`;
}
function answer(i){
  if(answered) return; answered=true;
  const q=QUIZ[qorder[qi]], opts=document.querySelectorAll('.opt');
  opts.forEach((o,idx)=>{ o.style.pointerEvents='none';
    if(idx===q.c) o.classList.add('correct');
    if(idx===i && i!==q.c) o.classList.add('wrong'); });
  if(i===q.c) qscore++;
  $('#exp').innerHTML=`<div class="explain"><strong>${i===q.c?'Correto. ':'Resposta certa acima. '}</strong>${q.e}</div>`;
  $('#qnav').innerHTML=`<button class="btn primary" onclick="nextQuiz()">${qi+1<QUIZ.length?'Próxima →':'Ver resultado'}</button>`;
}
function nextQuiz(){ qi++; answered=false; renderQuiz(); }
function renderResult(){
  const pct=Math.round(qscore/QUIZ.length*100); const best=Math.max(store.best,qscore); store.best=best;
  let msg = pct>=80?'Excelente domínio.':pct>=50?'Bom caminho. Revise os temas marcados.':'Vale revisar os temas antes de seguir.';
  content.innerHTML=`<div class="center-wrap"><div class="result">
    <div class="score">${qscore}/${QUIZ.length}</div>
    <p style="font-size:16px;color:var(--ink);margin-top:10px">${msg}</p>
    <p>Você acertou ${pct}%. Melhor resultado: ${best}/${QUIZ.length}.</p>
    <div style="margin-top:18px"><button class="btn primary" onclick="startQuiz()">↻ Refazer quiz</button>
    <button class="btn" onclick="setMode('study')">Voltar a estudar</button></div>
  </div></div>`;
}

function setMode(m){ mode=m; setModeUI(); render(); }
function setModeUI(){ document.querySelectorAll('.modes button').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode)); }
function render(){
  const s=SUBJECTS[curSubject];
  if(!s.ready || !THEMES.length){
    sidebar.style.display='none';
    content.innerHTML='<div class="theme-wrap"><div class="theme-head"><h2><span class="tnum">'+s.code+'</span>'+s.name+'</h2></div><div class="block tip"><span class="label">Matéria em breve</span><p>Esta matéria ainda não tem conteúdo. Envie o material de estudo e ela será montada aqui, no mesmo app, com os mesmos recursos: temas com mapas mentais, flashcards, quiz e, quando fizer sentido, o modo Praticar.</p></div></div>';
    return;
  }
  const showSide = mode==='study';
  sidebar.style.display = showSide?'block':'none';
  if(mode==='study'){ renderSidebar(); renderStudy(); }
  else if(mode==='cards'){ fi=0;flipped=false;buildDeck();renderCards(); }
  else if(mode==='quiz'){ startQuiz(); }
  else if(mode==='practice'){ renderPractice(); }
}
document.querySelectorAll('.modes button').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
document.getElementById('subjectSel').onchange=e=>loadSubject(e.target.value);
(function(){var ts=document.getElementById('themeSel'); if(ts) ts.onchange=function(e){ if(e.target.value) go(e.target.value); };})();
function toggleTheme(){ const nt=store.theme==='dark'?'light':'dark'; store.theme=nt; document.documentElement.dataset.theme=nt; }

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(mode==='cards'){ if(e.key==='ArrowRight')nextCard(); if(e.key==='ArrowLeft')prevCard(); if(e.key===' '){e.preventDefault();flip();} }
  if(mode==='study'){ const idx=THEMES.findIndex(t=>t.id===current);
    if(e.key==='ArrowRight'&&THEMES[idx+1])go(THEMES[idx+1].id);
    if(e.key==='ArrowLeft'&&THEMES[idx-1])go(THEMES[idx-1].id); }
});

document.documentElement.dataset.theme=store.theme;
loadSubject('sql');
initDB();
</script>
</body>
</html>
